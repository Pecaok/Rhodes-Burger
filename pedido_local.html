<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Pedidos • Rhodes Burgers</title>
  <link rel="icon" href="images/logo.png" />
  <meta name="theme-color" content="#1C1810"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
   
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --primary:#625A45;
      --gold:#D4A847;--gold-dim:rgba(212,168,71,.12);--gold-border:rgba(212,168,71,.2);
      --bg:#1a1710;--bg2:#201d13;--card:#2a2619;--card2:#302c1e;
      --border:rgba(212,168,71,.13);--border2:rgba(212,168,71,.06);
      --txt:#F0EAE0;--muted:#7a7060;--white:#FAFAF8;
      --fh:'Barlow Condensed',sans-serif;--fb:'DM Sans',sans-serif;
      --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;
      --st-accepted:#fbbf24;--st-in_prep:#f97316;--st-ready:#06b6d4;--st-delivered:#22c55e;--st-cancelled:#ef4444;
      --pay-paid:#15803d;--pay-pending:#ea580c;
      --ring:rgba(212,168,71,.13);
    }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--fb);-webkit-tap-highlight-color:transparent;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.02;mix-blend-mode:overlay;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

    /* LOADER */
    #pageLoader{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease,visibility .5s;}
    #pageLoader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
    #pageLoader video{width:250px;max-width:80%;height:auto;object-fit:contain;mix-blend-mode:screen;}

    /* HEADER */
    header{position:sticky;top:0;z-index:200;background:rgba(26,23,16,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .topbar{max-width:1200px;margin:0 auto;height:58px;padding:0 14px;display:flex;align-items:center;gap:6px;overflow:visible;}
    .brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;margin-right:6px;}
    .brand img{width:30px;height:30px;border-radius:7px;object-fit:cover;}
    .brand span{font-family:var(--fh);font-weight:900;font-size:19px;color:var(--white);text-transform:uppercase;letter-spacing:.06em;}
    .brand em{font-style:normal;color:var(--gold);}
    .spacer{flex:1;}
    .nav-btn{padding:7px 11px;border-radius:8px;text-decoration:none;color:var(--muted);font-weight:600;font-size:13px;transition:all .2s;border:1px solid transparent;flex-shrink:0;display:inline-flex;align-items:center;gap:5px;cursor:pointer;background:transparent;white-space:nowrap;}
    .nav-btn:hover{background:var(--gold-dim);color:var(--gold);}
    .nav-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border);}
    .nav-btn.import-btn{background:var(--orange);color:#fff;border-color:var(--orange);}
    .nav-btn.import-btn:hover{background:#ea6a10;}

    /* ICON BTNS */
    .icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer;font-size:15px;flex-shrink:0;transition:all .2s;}
    .icon-btn:hover{background:var(--gold-dim);border-color:var(--gold-border);}
    .icon-btn#btnBell.active{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3);color:var(--blue);}
    .icon-btn#btnAutoPrint.active{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:var(--green);}

    /* DROPDOWN */
    .dropdown{position:relative;display:inline-block;}
    .dropdown-content{display:none;position:absolute;background:var(--card2);min-width:160px;box-shadow:0 10px 30px rgba(0,0,0,.5);border-radius:10px;border:1px solid var(--border);z-index:2000;top:115%;right:0;padding:5px;}
    .dropdown.show .dropdown-content{display:block;animation:slideDown .2s ease;}
    .dropdown-content a{display:block;padding:10px 12px;text-decoration:none;color:var(--txt);font-size:13px;font-weight:500;border-radius:7px;}
    .dropdown-content a:hover{background:var(--gold-dim);color:var(--gold);}
    @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

    /* LAYOUT */
    .container{max-width:800px;margin:20px auto;padding:0 16px 80px;position:relative;z-index:1;}
    h1{font-family:var(--fh);font-size:32px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--white);margin-bottom:16px;}

    /* TABS */
    .tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:5px;}
    .tab{padding:8px 18px;border-radius:99px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--fb);transition:all .15s;}
    .tab:hover{border-color:var(--gold-border);color:var(--txt);}
    .tab.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border);}

    /* ORDER CARD */
    .order{background:var(--card);border-radius:14px;margin-bottom:16px;overflow:hidden;border:1px solid var(--border);animation:fadeIn .3s ease-out;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .order.cancelled{opacity:.6;border-color:rgba(239,68,68,.2);}

    .order-head{padding:14px 16px;border-bottom:1px dashed var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
    .order-title{font-family:var(--fh);font-size:20px;font-weight:900;color:var(--white);line-height:1.2;text-transform:uppercase;letter-spacing:.02em;}
    .order-meta{font-size:12px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .chip{padding:2px 8px;border-radius:5px;background:rgba(255,255,255,.06);font-weight:700;font-size:10px;color:var(--muted);font-family:var(--fh);letter-spacing:.04em;text-transform:uppercase;}
    .chip.mostrador{background:rgba(59,130,246,.15);color:var(--blue);}
    .chip.time{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);}
    .chip.pedidosya{background:rgba(236,72,153,.15);color:#ec4899;}
    .chip.rappi{background:rgba(249,115,22,.15);color:var(--orange);}
    .chip.web{background:rgba(139,92,246,.15);color:#8b5cf6;}
    .price-tag{font-family:var(--fh);font-size:22px;font-weight:900;color:var(--gold);white-space:nowrap;}

    /* ITEMS */
    .items{padding:14px 16px;background:rgba(255,255,255,.02);}
    .cat-group{margin-bottom:10px;}
    .cat-title{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
    .it-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
    .it-qty{background:var(--gold-dim);border:1px solid var(--gold-border);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:7px;font-family:var(--fh);font-weight:900;font-size:14px;color:var(--gold);flex-shrink:0;}
    .it-det{flex:1;}
    .it-name{font-weight:600;font-size:15px;color:var(--white);line-height:1.3;}
    .it-sub{font-size:12px;color:var(--muted);display:block;margin-top:2px;}
    .it-price{font-family:var(--fh);font-weight:700;font-size:15px;color:var(--gold);margin-left:auto;white-space:nowrap;}
    .it-note{font-size:11px;color:var(--red);font-weight:700;background:rgba(239,68,68,.1);display:inline-block;padding:2px 7px;border-radius:4px;margin-top:3px;border:1px solid rgba(239,68,68,.2);}

    /* ACTIONS */
    .actions-area{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
    .stateBtns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
    .state-btn{padding:10px 4px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);border-radius:10px;font-weight:700;font-size:11px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:var(--fh);letter-spacing:.04em;text-transform:uppercase;}
    .state-btn:active{transform:scale(.96);}
    .state-btn.on.state-accepted{background:rgba(251,191,36,.2);color:#fbbf24;border-color:rgba(251,191,36,.4);box-shadow:0 0 12px rgba(251,191,36,.15);}
    .state-btn.on.state-in_prep{background:rgba(249,115,22,.2);color:var(--orange);border-color:rgba(249,115,22,.4);box-shadow:0 0 12px rgba(249,115,22,.15);}
    .state-btn.on.state-ready{background:rgba(6,182,212,.2);color:#06b6d4;border-color:rgba(6,182,212,.4);box-shadow:0 0 12px rgba(6,182,212,.15);}
    .state-btn.on.state-delivered{background:rgba(34,197,94,.2);color:var(--green);border-color:rgba(34,197,94,.4);box-shadow:0 0 12px rgba(34,197,94,.15);}
    .state-btn.cancelled{grid-column:span 4;border-color:rgba(239,68,68,.3);color:var(--red);background:rgba(239,68,68,.06);}
    .state-btn.cancelled:hover{background:rgba(239,68,68,.12);}

    /* CONTROLS */
    .control-row{display:flex;gap:8px;margin-bottom:4px;}
    .pay-select,.source-select{padding:10px 12px;border-radius:9px;border:1px solid var(--border);font-size:13px;background:rgba(255,255,255,.04);color:var(--txt);-webkit-appearance:none;font-weight:600;flex:1;font-family:var(--fb);outline:none;transition:border-color .2s;}
    .pay-select:focus,.source-select:focus{border-color:var(--gold);}
    .pay-select option,.source-select option{background:#2a2619;color:var(--txt);}
    .pay-btn{padding:0 16px;border-radius:9px;border:none;font-family:var(--fh);font-weight:800;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;justify-content:center;transition:all .2s;}
    .pay-btn.pending{background:var(--pay-pending);}
    .pay-btn.paid{background:var(--pay-paid);}
    .icon-btn-lg{width:42px;height:42px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;transition:all .2s;}
    .icon-btn-lg:hover{border-color:var(--gold-border);background:var(--gold-dim);}

    /* EMPTY */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-family:var(--fh);font-size:18px;letter-spacing:.06em;}

    @media(max-width:768px){
      .brand span{display:none;}
      .nav-btn{padding:7px;font-size:12px;}
      .nav-btn span{display:none;}
      .dropdown{position:static;}
      .order-head{flex-direction:column;gap:10px;}
      .price-tag{align-self:flex-end;margin-top:-30px;}
      .stateBtns{grid-template-columns:1fr 1fr;}
      .control-row{flex-wrap:wrap;}
      .pay-select,.source-select{min-width:48%;}
    }
  </style>

  <script>
    (function checkAuth() {
        const TTL_HOURS = 20;
        const TTL_MS = TTL_HOURS * 60 * 60 * 1000;
        const ok = localStorage.getItem('rb_admin_ok') === 'true';
        const ts = Number(localStorage.getItem('rb_admin_t') || 0);
        const live = (Date.now() - ts) < TTL_MS;
        if (!ok || !live) {
            localStorage.removeItem('rb_admin_ok');
            localStorage.removeItem('rb_admin_t');
            window.location.replace('login.html?next=' + encodeURIComponent(location.pathname + location.search));
        } else {
            localStorage.setItem('rb_admin_t', String(Date.now()));
        }
    })();
  </script>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {apiKey:"AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",authDomain:"rhodes-burguers.firebaseapp.com",projectId:"rhodes-burguers",storageBucket:"rhodes-burguers.firebasestorage.app",messagingSenderId:"951646688091",appId:"1:951646688091:web:05db5fadb4150d1fa9c07e"};
    try{ firebase.initializeApp(firebaseConfig); }catch(e){ console.error("Error Firebase:", e); }
    
    const db = firebase.firestore();
    try {
        db.settings({
            experimentalForceLongPolling: true, 
            experimentalAutoDetectLongPolling: false
        });
        db.enablePersistence({synchronizeTabs:true}).catch(err => {
            console.log("No se pudo activar el caché offline: ", err);
        });
    } catch(e) {}

    window.idToDoc = new Map();

    let RECETAS_DB = {}; 
    let SUB_RECIPES_DB = {}; 
    let INVENTARIO_DB = {}; 
    let ID_TO_COLLECTION = {}; 
    let STOCK_NAME_TO_ID = {}; 
    let PRODUCT_CATALOG = {}; 
    let PRICES_DB = { patty: 2500, cheddar: 300 }; 
    let ALIASES_DB = []; 

    function normalize(str) {
        return String(str || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    }

    db.collection('products').onSnapshot(snap => {
        PRODUCT_CATALOG = {};
        snap.forEach(doc => { 
            const d = doc.data();
            const cat = normalize(d.category);
            const name = normalize(d.name);
            PRODUCT_CATALOG[doc.id] = cat;
            if(name) PRODUCT_CATALOG[name] = cat;
            // Also store price by id and name for price lookup
            if(d.price) {
                PRODUCT_CATALOG['price_' + doc.id] = d.price;
                if(name) PRODUCT_CATALOG['price_' + name] = d.price;
            }
        });
        if(window.lastSnap && window.renderList) window.renderList(window.lastSnap); 
    });

    db.collection('recipes').onSnapshot(snap => {
        RECETAS_DB = {};
        snap.forEach(doc => {
            const d = doc.data();
            // Store whichever array format exists
            RECETAS_DB[doc.id] = d.ingredients || d.items || [];
        });
    });

    db.collection('subrecipes').onSnapshot(snap => {
        snap.forEach(doc => {
            const d = doc.data();
            SUB_RECIPES_DB[doc.id] = d;
            ID_TO_COLLECTION[doc.id] = 'subrecipes'; 
            if(d.name) STOCK_NAME_TO_ID[normalize(d.name)] = doc.id;
        });
    });

    db.collection('inventory').onSnapshot(snap => {
        snap.forEach(doc => { 
            const d = doc.data();
            INVENTARIO_DB[normalize(d.name)] = doc.id; 
            ID_TO_COLLECTION[doc.id] = 'inventory'; 
            if(d.name) STOCK_NAME_TO_ID[normalize(d.name)] = doc.id;
        });
    });
    
    db.collection('config').doc('gerencia').onSnapshot(doc => {
        if(doc.exists && doc.data().aliases) {
            ALIASES_DB = doc.data().aliases;
        }
    });
    
    db.collection('config').doc('prices').onSnapshot(doc => {
        if(doc.exists) { PRICES_DB = doc.data(); if(window.lastSnap && window.renderList) window.renderList(window.lastSnap); }
    });

    function findSmartId(keywords) {
        for (const key of keywords) {
            const norm = normalize(key);
            if (STOCK_NAME_TO_ID[norm]) return STOCK_NAME_TO_ID[norm];
        }
        const allNormNames = Object.keys(STOCK_NAME_TO_ID);
        for (const dbName of allNormNames) {
            for (const key of keywords) {
                const normKey = normalize(key);
                if (dbName.includes(normKey) || normKey.includes(dbName)) return STOCK_NAME_TO_ID[dbName];
            }
        }
        return null;
    }

    // Cantidades configurables desde Gerencia → ⚙️ Reglas de Stock
    let STOCK_RULES = {
        papasGrPerBurger: 200, papasGrPerPorcion: 350,
        arosUndPerBurger: 10,  salGPerBurger: 2,
        doritoGPerBurger: 5,   bolsasRatioBurger: 0.5,
        ganchitosPerBolsa: 3,  tintaPerUnidad: 0.25
    };
    db.collection('config').doc('stockRules').onSnapshot(doc => {
        if(!doc.exists) return;
        const d = doc.data();
        // Solo reemplazar si el valor no es vacío, para no pisar los defaults
        ['papasGrPerBurger','papasGrPerPorcion','arosUndPerBurger','salGPerBurger',
         'doritoGPerBurger','bolsasRatioBurger','ganchitosPerBolsa','tintaPerUnidad'
        ].forEach(k => { if(d[k] !== undefined && d[k] !== '' && d[k] !== null) STOCK_RULES[k] = Number(d[k]); });
    });

    // =================================================================
    // 🔥 GESTIÓN DE STOCK — basado en el original que funcionaba
    // + crinkles/rejillas separados + pan + extras estructurados
    // =================================================================
    async function gestionarStock(pedido, factor) {
        if (!pedido || !pedido.items) return;
        if(factor === -1 && pedido.stockDescontado) return;
        if(factor === 1 && !pedido.stockDescontado) return;

        const batch = db.batch();
        let huboCambios = false;
        let logs = [];

        let rawItems = Array.isArray(pedido.items) ? [...pedido.items] : [];
        if(Array.isArray(pedido.bebidas)) rawItems = rawItems.concat(pedido.bebidas);
        if(Array.isArray(pedido.drinks))  rawItems = rawItems.concat(pedido.drinks);

        // Expandir aliases/promos y comboItems
        let itemsCalc = [];
        rawItems.forEach(item => {
            if(!item || !item.name) return;

            // Si es una promo combo con comboItems, expandir sus items para stock
            if(item.isPromo && Array.isArray(item.comboItems) && item.comboItems.length) {
                const qtyPromo = Math.ceil(Number(item.qty || 1));
                item.comboItems.forEach(sub => {
                    itemsCalc.push({
                        name: sub.name || sub.id,
                        qty: Number(sub.qty || 1) * qtyPromo,
                        notes: '', fries: null, friesRaw: null, sideType: null, extras: {}
                    });
                    logs.push(`   ↳ Combo promo: ${Number(sub.qty||1)*qtyPromo} x ${sub.name||sub.id}`);
                });
                return;
            }

            const nameNorm = normalize(item.name);
            const foundAlias = ALIASES_DB.find(a => normalize(a.external) === nameNorm);
            if(foundAlias && foundAlias.items?.length) {
                const qtyPromo = Math.ceil(Number(item.qty || 1));
                foundAlias.items.forEach(sub => {
                    itemsCalc.push({ name: sub.id, qty: Number(sub.qty) * qtyPromo,
                        notes: item.notes, fries: item.fries, friesRaw: item.friesRaw,
                        sideType: item.sideType, extras: item.extras });
                    logs.push(`   ↳ Promo: +${Number(sub.qty)*qtyPromo} x ${sub.id}`);
                });
            } else {
                itemsCalc.push(item);
            }
        });

        // Contadores — igual que el original
        let totalBurgers  = 0; // burgers con papas genéricas
        let crinklesCount = 0; // burgers con crinkles
        let rejillasCount = 0; // burgers con rejillas
        let doritosCount  = 0;
        let portionsCount = 0;
        let saltCount     = 0;
        let onionRingsCount = 0;

        const applyDecrement = (targetID, amount, logName) => {
            if(!targetID || !amount) return false;
            const col = ID_TO_COLLECTION[targetID] || 'inventory';
            const ref = db.collection(col).doc(targetID);
            // batch.set con merge para evitar error si el doc no existe
            batch.set(ref, { qty: firebase.firestore.FieldValue.increment(amount * factor) }, {merge:true});
            huboCambios = true;
            logs.push(`   - ${logName}: ${amount}`);
            return true;
        };

        const autoDesc = (keys, qty, name) => {
            const id = findSmartId(keys);
            if(id) applyDecrement(id, qty, name);
            else logs.push(`   ⚠️ ${name}: no encontrado [${keys.join(',')}]`);
        };

        itemsCalc.forEach(item => {
            const rawName  = item.name || '';
            const nameNorm = normalize(rawName);
            const notesNorm= normalize(item.notes || '');
            const fullText = nameNorm + ' ' + notesNorm;
            const qty      = Math.ceil(Number(item.qty || 1));
            // friesOpt = string display: "Papas Crinkles (Sazonadas)" — igual que el original
            const friesOpt    = String(item.fries    || '').toLowerCase();
            const friesRawOpt = String(item.friesRaw || item.sideType || '').toLowerCase();

            logs.push(`📦 ${rawName} (x${qty}) | fries: "${friesOpt || friesRawOpt || '-'}"`);

            // Detección hardcodeada — igual que el original, sin depender de Firebase
            const isBurger = nameNorm.includes('hamb') || nameNorm.includes('burger') ||
                             nameNorm.includes('doble') || nameNorm.includes('simple') ||
                             nameNorm.includes('royal') || nameNorm.includes('cheese') ||
                             nameNorm.includes('cuarto')|| nameNorm.includes('big')    ||
                             nameNorm.includes('crispy')|| nameNorm.includes('billy')  ||
                             nameNorm.includes('morgan')|| nameNorm.includes('core')   ||
                             nameNorm.includes('rhodes')|| nameNorm.includes('pollo');
            const isSandwich = nameNorm.includes('sandwich') || nameNorm.includes('sandwi');
            const isMain     = isBurger || isSandwich;

            const pideAros     = friesRawOpt.includes('aros') || friesOpt.includes('aros') || nameNorm.includes('aros');
            const pideCrinkles = friesRawOpt.includes('crinkle') || friesOpt.includes('crinkle');
            const pideRejillas = friesRawOpt.includes('rejilla') || friesOpt.includes('rejilla');

            // Acumular contadores
            if(isMain) {
                if(pideAros) {
                    onionRingsCount += qty * Number(STOCK_RULES.arosUndPerBurger||10);
                    // Packaging aros directo (no se acumula)
                    autoDesc(['carton','caja papa','caja','cajita'], Math.ceil(qty), "Cartón Aros");
                    autoDesc(['parafinado','papel'], Math.ceil(qty), "Papel Aros");
                    const bolsas = Math.ceil(qty * Number(STOCK_RULES.bolsasRatioBurger||0.5));
                    autoDesc(['bolsa','packaging','kraft'], bolsas, "Bolsas Aros");
                    autoDesc(['ganchito','grampa','broche'], bolsas * Number(STOCK_RULES.ganchitosPerBolsa||3), "Ganchitos Aros");
                    autoDesc(['tinta','sello'], (qty+bolsas) * Number(STOCK_RULES.tintaPerUnidad||0.25), "Tinta Aros");
                } else {
                    if(pideCrinkles)      crinklesCount += qty;
                    else if(pideRejillas) rejillasCount += qty;
                    else                  totalBurgers  += qty;
                }
            }

            // Porciones independientes
            if(nameNorm.includes('porcion') && nameNorm.includes('aros')) {
                onionRingsCount += qty * Number(STOCK_RULES.arosUndPerBurger||10);
            } else if(nameNorm.includes('porcion') && (nameNorm.includes('papa') || nameNorm.includes('frita'))) {
                if(pideCrinkles)      crinklesCount += qty;
                else if(pideRejillas) rejillasCount += qty;
                else                  portionsCount += qty;
            }

            // Nuggets
            if(nameNorm.includes('nugget')) {
                autoDesc(['nugget','nuggets','nuggets de pollo'], qty, `Nuggets (${qty}u)`);
            }

            // Sal/sazonador — igual que el original pero mutuamente excluyentes
            // Usa friesOpt (display string) igual que el original — "Sazonadas" contiene "sazon"
            const hasSazon  = friesOpt.includes('sazon') || friesRawOpt.includes('sazon') ||
                              nameNorm.includes('dorito')|| nameNorm.includes('sazon') || notesNorm.includes('sazon');
            const hasNoSalt = (friesOpt.includes('sin') && (friesOpt.includes('sal') || friesOpt.includes('sodio'))) ||
                              friesRawOpt.includes('sin_sal') ||
                              nameNorm.includes('sin sal') || notesNorm.includes('sin sal');
            const isPotatoItem = isMain || nameNorm.includes('papa') || nameNorm.includes('frita') || nameNorm.includes('bastones');

            if(isPotatoItem && !pideAros) {
                if(hasSazon)              doritosCount += qty;
                else if(!hasNoSalt)       saltCount    += qty;
            }

            // ── Receta desde Firebase ──
            let recipeName = Object.keys(RECETAS_DB).find(k => normalize(k) === nameNorm)
                          || Object.keys(RECETAS_DB).find(k => nameNorm.includes(normalize(k)));
            let recipeFound = false;

            if(recipeName) {
                const ingredientes = RECETAS_DB[recipeName];
                if(Array.isArray(ingredientes) && ingredientes.length) {
                    logs.push(`   ✅ Receta: "${recipeName}"`);
                    recipeFound = true;
                    ingredientes.forEach(ing => {
                        if(typeof ing === 'string') return; // strings son solo display (formato admin)
                        let targetID  = ing.id;
                        let targetQty = Number(ing.qty);
                        if(!targetID && ing.ingrediente) { targetID = findSmartId([ing.ingrediente]); targetQty = Number(ing.cantidad); }
                        if(targetID) applyDecrement(targetID, targetQty * qty, 'Receta');
                    });
                }
            }

            // ── Fallback si no hay receta ──
            if(!recipeFound && isMain) {
                let patties = 1;
                if(nameNorm.includes('doble'))     patties = 2;
                if(nameNorm.includes('triple'))    patties = 3;
                if(nameNorm.includes('cuadruple')) patties = 4;
                const pattyId = findSmartId(['medallon','carne','patty']);
                if(pattyId) applyDecrement(pattyId, patties * qty, `Auto-Medallón x${patties}`);

                // Pan según nombre del producto
                if(nameNorm.includes('baguetin') || nameNorm.includes('baguet'))
                    autoDesc(['baguetin','baguette'], qty, 'Pan Baguetín');
                else if(nameNorm.includes('sesamo'))
                    autoDesc(['sesamo','pan sesamo'], qty, 'Pan Sésamo');
                else if(nameNorm.includes('burgerluna') || nameNorm.includes('burger luna'))
                    autoDesc(['burgerluna','burger luna'], qty, 'BurgerLuna');
                else
                    autoDesc(['brioche','pan brioche'], qty, 'Pan Brioche');

                // Cheddar si el nombre dice cheese
                if(nameNorm.includes('cheese') || nameNorm.includes('cheddar'))
                    autoDesc(['cheddar feteado','cheddar','queso cheddar'], qty, 'Auto-Cheddar');
            }

            // ── Extras estructurados (carne/cheddar/bacon adicionales) ──
            if(item.extras) {
                const extraPatty   = Number(item.extras.patty   || item.extras.carne   || 0);
                const extraCheddar = Number(item.extras.cheddar || 0);
                const extraBacon   = Number(item.extras.bacon   || item.extras.panceta || 0);
                if(extraPatty > 0) {
                    const id = findSmartId(['medallon','carne','patty']);
                    if(id) applyDecrement(id, extraPatty * qty, `Extra carne x${extraPatty}`);
                }
                if(extraCheddar > 0) autoDesc(['cheddar feteado','cheddar','queso cheddar'], extraCheddar * qty, `Extra cheddar x${extraCheddar}`);
                if(extraBacon   > 0) {
                    const id = findSmartId(['bacon','panceta','tocino']);
                    if(id) applyDecrement(id, extraBacon * qty, `Extra bacon x${extraBacon}`);
                }
            }
        });

        // ── Procesar contadores acumulados — igual que el original ──
        const autoDescFinal = (keys, qty, name) => {
            const id = findSmartId(keys);
            if(id) applyDecrement(id, qty, name);
            else logs.push(`   ⚠️ ${name}: no encontrado [${keys.join(',')}]`);
        };

        // Papas por tipo
        const papasGr      = Number(STOCK_RULES.papasGrPerBurger||200);
        const papasGrPorc  = Number(STOCK_RULES.papasGrPerPorcion||350);
        if(crinklesCount > 0) autoDescFinal(['crinkles','papas crinkles'], crinklesCount * papasGr, `Crinkles (${crinklesCount*papasGr}g)`);
        if(rejillasCount > 0) autoDescFinal(['rejillas','papas rejillas'], rejillasCount * papasGr, `Rejillas (${rejillasCount*papasGr}g)`);
        if(totalBurgers  > 0) autoDescFinal(['papas fritas','papa frita','papas','papa','bastones','congelada','fritas'], totalBurgers * papasGr, `Papas (${totalBurgers*papasGr}g)`);
        if(portionsCount > 0) autoDescFinal(['papas fritas','papa frita','papas','papa','bastones'], portionsCount * papasGrPorc, `Papas Porción (${portionsCount*papasGrPorc}g)`);

        // Aros, sal, sazonador
        if(onionRingsCount > 0) autoDescFinal(['aros de cebolla','aros','cebolla aro'], onionRingsCount, `Aros (${onionRingsCount}u)`);
        if(saltCount    > 0) autoDescFinal(['sal','sal fina','sodio'], saltCount * Number(STOCK_RULES.salGPerBurger||2), `Sal (${saltCount * Number(STOCK_RULES.salGPerBurger||2)}g)`);
        if(doritosCount > 0) autoDescFinal(['sazonador doritos','doritos','dorito','sazonador'], doritosCount * Number(STOCK_RULES.doritoGPerBurger||5), `Sazonador (${doritosCount * Number(STOCK_RULES.doritoGPerBurger||5)}g)`);

        // Packaging burgers con papas
        const totalConPapas = totalBurgers + crinklesCount + rejillasCount;
        if(totalConPapas > 0) {
            const bolsas = Math.ceil(totalConPapas * Number(STOCK_RULES.bolsasRatioBurger||0.5));
            autoDescFinal(['carton','caja papa','caja','cajita'], Math.ceil(totalConPapas), "Cartón");
            autoDescFinal(['parafinado','papel'], Math.ceil(totalConPapas), "Papel");
            autoDescFinal(['bolsa','packaging','kraft'], bolsas, "Bolsas");
            autoDescFinal(['ganchito','grampa','broche'], bolsas * Number(STOCK_RULES.ganchitosPerBolsa||3), "Ganchitos");
            autoDescFinal(['tinta','sello'], (totalConPapas+bolsas) * Number(STOCK_RULES.tintaPerUnidad||0.25), "Tinta");
        }

        if(huboCambios) {
            batch.set(db.collection('orders').doc(pedido.id), { stockDescontado: (factor===-1) }, {merge:true});
            await batch.commit();

            // Guardar movimiento en Firestore para historial en gerencia
            const accion = factor === -1 ? 'descuento' : 'reposicion';
            await db.collection('stock_movements').add({
                orderId:    pedido.id,
                orderNum:   pedido.orderNumber || pedido.number || '',
                accion,
                log:        logs,
                createdAt:  firebase.firestore.FieldValue.serverTimestamp()
            });

            showStockToast(factor === -1 ? '📦 Stock descontado' : '♻️ Stock repuesto', logs, 'success');
        } else {
            const inv = Object.keys(STOCK_NAME_TO_ID);
            const msg = inv.length
                ? `Inventario cargado (${inv.length} items) pero ningún keyword coincidió`
                : 'Inventario VACÍO — verificá que cargó correctamente';
            showStockToast('⚠️ Stock sin cambios', [...logs, '', msg], 'warn');
        }
    }

    // Toast no bloqueante para feedback de stock
    function showStockToast(title, lines, type) {
        let toast = document.getElementById('stockToast');
        if(!toast) {
            toast = document.createElement('div');
            toast.id = 'stockToast';
            toast.style.cssText = `
                position:fixed; bottom:20px; right:20px; z-index:9999;
                background:#1f2937; color:#fff; border-radius:12px;
                padding:14px 18px; max-width:380px; font-family:var(--font);
                box-shadow:0 10px 30px rgba(0,0,0,0.3); font-size:13px;
                border-left:4px solid #22c55e; transition:opacity 0.3s;
            `;
            document.body.appendChild(toast);
        }
        toast.style.borderLeftColor = type === 'warn' ? '#f97316' : '#22c55e';
        const preview = lines.slice(0, 8).join('\n');
        const more = lines.length > 8 ? `\n+${lines.length - 8} más...` : '';
        toast.innerHTML = `
            <div style="font-weight:800;font-size:14px;margin-bottom:6px">${title}</div>
            <pre style="margin:0;font-size:11px;opacity:0.8;white-space:pre-wrap;max-height:150px;overflow-y:auto">${preview}${more}</pre>
        `;
        toast.style.opacity = '1';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.opacity = '0'; }, 6000);
    }

    window.setOrderStatus = async (id, next, isPaid) => {
        if(next==='delivered' && !isPaid){ alert("⚠️ COBRAR PRIMERO: El pedido figura pendiente."); return; }
        try{ 
            const docSnap = await db.collection('orders').doc(id).get();
            if(!docSnap.exists) return;
            const pedidoData = { id: docSnap.id, ...docSnap.data() };

            if(next === 'delivered'){ await gestionarStock(pedidoData, -1); } 
            else if(next === 'cancelled'){ await gestionarStock(pedidoData, 1); }

            await db.collection("orders").doc(id).update({status:next}); 
        }catch(e){
            console.error(e);
            alert("Error al actualizar estado: " + e.message);
        }
    };

    window.deleteOrder = async (id) => {
        if(!confirm("⚠️ ¿Estás seguro de eliminar este pedido permanentemente?\n\nEsta acción borrará el pedido de la base de datos y no se puede deshacer.")) return;
        try {
            await db.collection("orders").doc(id).delete();
        } catch(e) {
            console.error(e);
            alert("Error al eliminar: " + e.message);
        }
    };

    window.setPaymentStatus = async (id, currentPaid, currentMethod) => {
        if(!currentPaid && (!currentMethod || currentMethod === "")){ 
            alert("⚠️ Seleccioná un MÉTODO DE PAGO primero."); return; 
        }
        try{ await db.collection("orders").doc(id).update({ paid: !currentPaid, payment_status: !currentPaid ? 'paid' : 'pending_payment' }); }catch(e){}
    };
    
    window.updatePago = async (id, val) => { 
        try { 
            const updateData = { pago: val };
            if (val && val !== "") {
                updateData.paid = true;
                updateData.payment_status = 'paid';
            }
            await db.collection("orders").doc(id).update(updateData); 
        } catch(e) { console.error(e); } 
    };

    window.updateSource = async (id, val) => { 
        try { await db.collection("orders").doc(id).update({ source: val }); } catch(e) {} 
    };

    window.printOrder = (id) => { const doc = window.idToDoc.get(id); if(doc) window.trySilentPrint(doc); };
    
    window.pickDate = (o) => { 
        if(!o) return new Date();
        if(o.createdAt?.toDate) return o.createdAt.toDate(); 
        if(typeof o.createdAt==='string') return new Date(o.createdAt); 
        return new Date(); 
    };
    
    window.cleanFries = (raw) => { if(!raw) return ""; const s = String(raw).toLowerCase().replace(/[_-]/g,' ').trim(); if(s.includes('sazon')) return "Sazonadas"; if(s.includes('sin sal')) return "Sin sal"; if(s.includes('con sal')||s.includes('sal')) return "Con Sal"; return s.charAt(0).toUpperCase() + s.slice(1); };
    
    window.getCat = (item) => {
        const n = String(item.name || "").trim().toLowerCase();
        const t = String(item.type || "").toLowerCase();
        const id = item.id;

        if (t === 'drink' || t === 'bebida') return 'd';
        if (t === 'side' || t === 'guarnicion' || t === 'papa') return 'f';
        if (t === 'burger' || t === 'hamburguesa') return 'b';

        let catDB = PRODUCT_CATALOG[id] || PRODUCT_CATALOG[n];
        if (catDB) {
            catDB = String(catDB).toLowerCase().trim();
            if (catDB.includes('bebida') || catDB.includes('drink')) return 'd';
            if (catDB.includes('guarnicion') || catDB.includes('papa') || catDB.includes('side')) return 'f';
            if (catDB.includes('hamburguesa') || catDB.includes('burger')) return 'b';
        }
        
        if (item.category) {
            const catItem = String(item.category).toLowerCase();
            if (catItem.includes('bebida')) return 'd';
            if (catItem.includes('guarnicion')) return 'f';
        }

        const drinks = ['coca', 'agua', 'cerveza', 'andes', 'aquarius', 'pepsi', '7up', 'heineken', 'corona', 'patagonia', 'brahma', 'quilmes', 'stella', 'imperial', 'sprite', 'levite', 'paso de los toros', 'vino', 'fanta', 'gaseosa', 'lata', 'botella', 'ml', '1.5', 'schweppes', 'mirinda', 'jugo', 'baggio', 'monster', 'speed', 'red bull', 'energizante', 'manaos', 'secuko', 'limonada', 'exprimido'];
        if (drinks.some(k => n.includes(k))) return 'd';
        if (n.includes('papas') || n.includes('fritas') || n.includes('aros') || n.includes('nugget')) return 'f';
        return 'b'; 
    };

    function consolidateItems(list) {
        const map = new Map();
        list.forEach(it => {
            let exKey = "";
            if(it.extras) { const keys = Object.keys(it.extras).sort(); exKey = keys.map(k => `${k}:${it.extras[k]}`).join("-"); }
            const noteKey = String(it.notes || "").trim().toLowerCase();
            const nameKey = String(it.name || "").trim();
            const friesKey = String(it.friesRaw || it.fries || "").trim().toLowerCase(); 
            const key = `${nameKey}_${exKey}_${noteKey}_${friesKey}`; 
            if(map.has(key)){ map.get(key).qty += (Number(it.qty)||1); } else { map.set(key, { ...it, qty: (Number(it.qty)||1) }); }
        });
        return Array.from(map.values());
    }

    function getCleanTime(o, defaultTime) {
        if (o.pickup_slot && typeof o.pickup_slot === 'string' && o.pickup_slot.includes(':')) return o.pickup_slot;
        let raw = o.pickup_time_pretty || o.pickup_time;
        if (raw && typeof raw === 'string') {
            if (raw.includes('_')) { const parts = raw.split('_'); const timePart = parts[parts.length - 1]; if (timePart.length === 4 && !isNaN(timePart)) return timePart.substring(0, 2) + ':' + timePart.substring(2, 4); }
            if (raw.includes(':') && raw.length <= 5) return raw;
        }
        return defaultTime;
    }

    async function importarPedidosYa() {
        const input = document.getElementById('excelInput');
        if (!input.files.length) return;
        const file = input.files[0];
        const reader = new FileReader();

        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, {range: 1, defval:""});

            let imported = 0; let skipped = 0;
            const loader = document.getElementById('pageLoader');
            if(loader) loader.classList.remove("hidden");

            for (const row of rows) {
                const r = {};
                Object.keys(row).forEach(k => r[k.toLowerCase().trim()] = row[k]);
                const id = r['nro de pedido'] || r['nº de pedido'] || r['id']; 
                if (!id) continue;
                const existing = await db.collection('orders').where('py_id', '==', String(id)).get();
                if (!existing.empty) { skipped++; continue; }
                let total = r['total del pedido']; let neto = r['ingreso estimado'];        
                if(typeof total !== 'number') total = Number(String(total||'0').replace(/\./g, '').replace(',', '.'));
                if(typeof neto !== 'number') neto = Number(String(neto||'0').replace(/\./g, '').replace(',', '.'));
                if (!total || total <= 0) continue;
                const dateStr = r['fecha del pedido'] || r['fecha'];
                let clientName = r['nombre del cliente'] || "Cliente Py";
                const statusStr = r['estado del pedido'] || "";
                let status = 'delivered'; let isCancelled = false;
                if (statusStr.toLowerCase().includes('cancelado') || statusStr.toLowerCase().includes('rechazado')) { status = 'cancelled'; isCancelled = true; }
                const itemsStr = r['artículos'] || r['articulos'] || "";
                let itemsList = [];

                if(itemsStr) {
                    // Formato PedidosYa: "1 Nombre Producto [1 Opcion, 1 Otra], 2 Otro Producto [...]"
                    // Separar por coma solo cuando NO estamos dentro de corchetes
                    const rawItems = String(itemsStr).split(/,(?![^\[]*\])/);

                    rawItems.forEach(line => {
                        line = line.trim();
                        if(!line) return;

                        // Extraer cantidad y nombre
                        let qty = 1, name = line;
                        const qtyMatch = line.match(/^(\d+)\s+(.+)$/);
                        if(qtyMatch) { qty = Number(qtyMatch[1]); name = qtyMatch[2]; }

                        // Extraer contenido de corchetes: [1 Crinkle, 1 Con sal, 1 Medallón con cheddar]
                        let bracketsContent = '';
                        const bracketMatch = name.match(/\[([^\]]+)\]/);
                        if(bracketMatch) {
                            bracketsContent = bracketMatch[1].toLowerCase();
                            name = name.replace(/\[([^\]]+)\]/, '').trim();
                        }

                        const nameClean = normalize(name);

                        // ── Detectar tipo de papa desde los corchetes ──
                        let sideType = null, seasonRaw = null;

                        if(bracketsContent.includes('crinkle'))       sideType = 'crinkles';
                        else if(bracketsContent.includes('rejilla'))  sideType = 'rejillas';
                        else if(bracketsContent.includes('aros') || bracketsContent.includes('cebolla')) sideType = 'aros';

                        if(bracketsContent.includes('sabor queso') || bracketsContent.includes('sazon')) seasonRaw = 'con_sazon';
                        else if(bracketsContent.includes('sin sal'))   seasonRaw = 'sin_sal';
                        else if(bracketsContent.includes('con sal') || bracketsContent.includes('sal')) seasonRaw = 'con_sal';

                        // Construir friesRaw combinado para burgers (crinkles_con_sazon, rejillas_sin_sal, etc.)
                        let friesRaw = null;
                        const isBurgerItem = /(hamb|burger|burguesa|doble|simple|royal|cheese|cuarto|big|crispy|billy|morgan|core|rhodes|pollo)/.test(nameClean);
                        const isSideItem   = /(papas|fritas|aros|nugget)/.test(nameClean);

                        if(isBurgerItem) {
                            if(sideType === 'aros')          friesRaw = 'aros';
                            else if(sideType && seasonRaw)   friesRaw = `${sideType}_${seasonRaw}`;
                            else if(sideType)                friesRaw = `${sideType}_con_sal`;
                            else if(seasonRaw)               friesRaw = `crinkles_${seasonRaw}`;
                        } else if(isSideItem) {
                            // Porción independiente — friesRaw es solo la sazón
                            friesRaw = seasonRaw || 'con_sal';
                        }

                        const fries = friesRaw ? window.cleanFries(friesRaw) : '';

                        // ── Detectar extras desde corchetes ──
                        const extras = {};
                        if(bracketsContent.includes('medallón con cheddar') || bracketsContent.includes('medallon con cheddar')) {
                            extras.cheddar = (extras.cheddar || 0) + 1;
                        }
                        if(bracketsContent.includes('medallón adicional') || bracketsContent.includes('medallon adicional') || bracketsContent.includes('carne extra')) {
                            extras.patty = (extras.patty || 0) + 1;
                        }
                        if(bracketsContent.includes('bacon') || bracketsContent.includes('panceta')) {
                            extras.bacon = (extras.bacon || 0) + 1;
                        }

                        // Detectar si es bebida, guarnición o burger
                        const catCode = window.getCat({name});
                        let type = catCode === 'b' ? 'burger' : catCode === 'f' ? 'side' : catCode === 'd' ? 'drink' : 'other';

                        itemsList.push({
                            qty, name,
                            price: 0,
                            type,
                            sideType: sideType || undefined,
                            fries: fries || undefined,
                            friesRaw: friesRaw || undefined,
                            extras,
                            notes: ''
                        });
                    });
                }

                if(!itemsList.length) itemsList = [{ name: 'Pedido Importado', qty: 1, price: total }];

                let isoDate = new Date().toISOString();
                if(dateStr) {
                    if(typeof dateStr === 'number') {
                        const utcDays = dateStr - 25569; const dateInfo = new Date(utcDays * 86400 * 1000); const tzOffset = dateInfo.getTimezoneOffset() * 60000; isoDate = new Date(dateInfo.getTime() + tzOffset).toISOString();
                    } else {
                        let dStr = String(dateStr).trim();
                        const match = dStr.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})(?:\s+(.*))?$/);
                        if (match) { let hhmm = match[4] || "00:00:00"; dStr = `${match[3]}-${match[2].padStart(2,'0')}-${match[1].padStart(2,'0')}T${hhmm}`; } else { dStr = dStr.replace(' ', 'T'); }
                        const parsedD = new Date(dStr); if (!isNaN(parsedD.getTime())) { isoDate = parsedD.toISOString(); }
                    }
                }

                try {
                    const orderRef = await db.collection('orders').add({ orderNumber: String(id), py_id: String(id), source: 'pedidosya', status: status, payment_status: 'paid', paid: true, pago: 'pedidosya_online', entrega: 'delivery', nombre: clientName, total: total, neto_excel: neto, createdAt: isoDate, items: itemsList, stockDescontado: false });
                    if (!isCancelled) { const pedidoParaStock = { id: orderRef.id, items: itemsList, stockDescontado: false }; await gestionarStock(pedidoParaStock, -1); }
                    imported++;
                } catch (err) { console.error("Error importando:", err); }
            }

            if(loader) loader.classList.add("hidden");
            alert(`✅ IMPORTACIÓN FINALIZADA\n\nSe cargaron ${imported} pedidos correctamente.`);
            input.value = ""; location.reload();
        };
        reader.readAsArrayBuffer(file);
    }
  </script>

<body>
  <div id="pageLoader">
    <video autoplay loop muted playsinline>
      <source src="images/loader.mp4" type="video/mp4">
      <img src="images/logo.png" alt="Cargando..." style="width:100px;">
    </video>
  </div>

  <input type="file" id="excelInput" style="display:none" accept=".xlsx, .xls, .csv" onchange="importarPedidosYa()">

  <header>
    <div class="topbar">
      <a class="brand" href="#"><img src="images/logo.png" alt=""><span>Rhodes<em>.</em></span></a>
      <div class="spacer"></div>
      <button onclick="document.getElementById('excelInput').click()" class="nav-btn import-btn">📥 Importar Excel</button>
      <a href="pedido_local.html" class="nav-btn active">📦 <span>Pedidos</span></a>
      <a href="finanzas.html" class="nav-btn">📈 <span>Finanzas</span></a>
      <div class="dropdown">
        <button onclick="document.querySelector('.dropdown').classList.toggle('show')" class="nav-btn">📋 <span>Stock ▾</span></button>
        <div class="dropdown-content"><a href="stock.html">📦 Stock</a><a href="ingresos.html">📥 Ingresos</a></div>
      </div>
      <a href="mostrador.html" class="nav-btn">🧾 <span>Mostrador</span></a>
      <a href="admin.html" class="nav-btn">⚙️ <span>Admin</span></a>
      <button id="btnBell" class="icon-btn" title="Sonido">🔔</button>
      <button id="btnAutoPrint" class="icon-btn" title="Autoimprimir">🖨️</button>
    </div>
  </header>

  <main class="container">
    <h1>Últimos pedidos</h1>
    <div class="tabs" id="tabs">
      <button class="tab active" data-f="recibidos">Cocina / Recibidos</button>
      <button class="tab" data-f="entregados">Entregados</button>
      <button class="tab" data-f="cancelled">Cancelados</button>
      <button class="tab" data-f="all">Todos</button>
    </div>
    <div id="orders"><div class="empty-state">Cargando...</div></div>
  </main>

 <script>
  window.addEventListener('DOMContentLoaded', () => {
    let audioCtx = null;
    const initAudio = () => { if (!audioCtx) { const AudioContext = window.AudioContext || window.webkitAudioContext; audioCtx = new AudioContext(); } if (audioCtx.state === 'suspended') audioCtx.resume(); };
    document.body.addEventListener('click', initAudio, { once: true });
    document.body.addEventListener('touchstart', initAudio, { once: true });

    const playBeep = () => {
        let soundOn = JSON.parse(localStorage.getItem("rb_sound")||"true"); if(!soundOn) return;
        initAudio(); if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const createBeep = (startTime) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'square'; osc.frequency.setValueAtTime(1000, startTime); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(startTime); gain.gain.setValueAtTime(0.5, startTime); gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15); osc.stop(startTime + 0.15); };
        createBeep(now); createBeep(now + 0.25); createBeep(now + 0.50); createBeep(now + 0.75);
    };

    const money = n => (Number(n)||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});
    let currentFilter = "recibidos"; let lastSnap = null;
    
    document.getElementById("tabs").addEventListener("click", (e)=>{ const btn = e.target.closest(".tab"); if(!btn) return; document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); currentFilter = btn.dataset.f; if(window.lastSnap) renderList(window.lastSnap); });

    const btnBell = document.getElementById("btnBell");
    let soundOn = JSON.parse(localStorage.getItem("rb_sound")||"true");
    const updBell = ()=>{ btnBell.classList.toggle("active", soundOn); btnBell.innerText = soundOn ? '🔔' : '🔕'; }; 
    updBell();
    btnBell.onclick = ()=>{ initAudio(); soundOn = !soundOn; localStorage.setItem("rb_sound", soundOn); updBell(); if(soundOn) playBeep(); };

    const btnAP = document.getElementById("btnAutoPrint");
    let autoP = JSON.parse(localStorage.getItem("rb_autop")||"false");
    const updAP = ()=>{ btnAP.classList.toggle("active", autoP); }; 
    updAP();
    btnAP.onclick = ()=>{ autoP = !autoP; localStorage.setItem("rb_autop", autoP); updAP(); };

    let isInit=true; setTimeout(()=>isInit=false, 3000);
    db.collection("orders").orderBy("createdAt", "desc").limit(300).onSnapshot(snap => {
        window.lastSnap = snap;
        renderList(snap);
        const loader = document.getElementById('pageLoader');
        if(loader) loader.classList.add("hidden");
        snap.docChanges().forEach(ch => {
            if(ch.type === 'added' && !isInit){
                const data = ch.doc.data();
                const fechaPedido = window.pickDate(data);
                const ahora = new Date();
                const diferenciaMinutos = (ahora - fechaPedido) / 1000 / 60; 
                if(diferenciaMinutos < 20) { if(navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]); playBeep(); if(autoP) window.trySilentPrint(window.idToDoc.get(ch.doc.id)); }
            }
        });
    }, err => { document.getElementById("orders").innerHTML = `<div class="empty-state" style="color:red">Error: ${err.message}</div>`; const loader = document.getElementById('pageLoader'); if(loader) loader.classList.add("hidden"); });

    function renderList(snap){
        window.renderList = renderList;
        let docs = snap.docs.map(d => ({ data: d.data(), id: d.id, ref: d }));
        window.idToDoc = new Map(snap.docs.map(d=>[d.id,d]));
        docs.sort((a,b) => window.pickDate(b.data) - window.pickDate(a.data));
        const filtered = docs.filter(o => { const s = o.data.status || 'accepted'; if(currentFilter === 'recibidos') return ['accepted','in_prep','ready','pending_payment'].includes(s); if(currentFilter === 'entregados') return s === 'delivered'; if(currentFilter === 'cancelled') return s === 'cancelled'; return true; });
        const cont = document.getElementById("orders");
        if(filtered.length===0){ cont.innerHTML = '<div class="empty-state">No hay pedidos.</div>'; return; }
        cont.innerHTML = filtered.map(x => buildOrderHTML(x.ref)).join("");
    }

    function buildOrderHTML(doc){
        const o = doc.data();
        const dt = window.pickDate(o);
        const dateStr = dt.toLocaleDateString("es-AR", {day:'2-digit', month:'2-digit'}); 
        const timeStr = dt.toLocaleTimeString("es-AR", {hour:'2-digit', minute:'2-digit'});
        const st = o.status || 'accepted';
        const isPaid = (o.payment_status==='paid') || !!o.paid;
        const displayTime = getCleanTime(o, ""); 
        const LABELS = {accepted:'Recibido', in_prep:'Cocina', ready:'Listo', delivered:'Entregado'};
        const btns = ['accepted','in_prep','ready','delivered'].map(k => { const isOn = (k === st) ? 'on' : ''; const opacity = (k==='delivered' && !isPaid) ? 'opacity:0.5' : ''; return `<div class="state-btn ${isOn} state-${k}" style="${opacity}" onclick="setOrderStatus('${doc.id}', '${k}', ${isPaid})"><span>${LABELS[k]}</span></div>`; }).join('');

        let payVal = o.pago; if(payVal === 'mostrador_sin_especificar') payVal = "";
        let srcVal = o.source || 'web'; 

        let items = Array.isArray(o.items) ? [...o.items] : [];
        if(Array.isArray(o.bebidas)) items = items.concat(o.bebidas);
        if(Array.isArray(o.drinks)) items = items.concat(o.drinks);

        let cats = { b:[], f:[], d:[], o:[] };
        items.forEach(it => { const cat = window.getCat(it); if(cat==='b') cats.b.push(it); else if(cat==='f') cats.f.push(it); else if(cat==='d') cats.d.push(it); else cats.o.push(it); });
        cats.b = consolidateItems(cats.b); cats.f = consolidateItems(cats.f); cats.d = consolidateItems(cats.d); cats.o = consolidateItems(cats.o);

        const renderSec = (list, icon, title) => {
            if(!list.length) return "";
            const rows = list.map(it => {
                let ex = [];
                let basePrice = Number(it.price) || PRODUCT_CATALOG['price_' + it.id] || PRODUCT_CATALOG['price_' + normalize(it.name)] || 0;
                let extraPatty = (it.extras?.patty || 0) * (PRICES_DB.patty || 2500);
                let extraCheddar = (it.extras?.cheddar || 0) * (PRICES_DB.cheddar || 300);
                let unitFinal = basePrice + extraPatty + extraCheddar;
                let lineTotal = unitFinal * (it.qty || 1);
                if(it.extras?.patty) ex.push(`+${it.extras.patty} carne`);
                if(it.extras?.cheddar) ex.push(`+${it.extras.cheddar} cheddar`);
                if (it.fries || it.friesRaw) { const map = {con_sazon:"Sazonadas", con_sal:"Con Sal", sin_sal:"Sin Sal"}; const rawVal = it.friesRaw || it.fries; const displayVal = map[rawVal] || it.fries; ex.push(`🍟 ${displayVal}`); }
                let dName = esc(it.name);
                const extrasHtml = ex.map(e => `<div class="it-sub" style="color:var(--gold); font-weight:600">• ${e}</div>`).join('');
                let displayPrice = (title.includes("PAPAS") && lineTotal === 0) ? "" : money(lineTotal);
                return `<div class="it-row"><div class="it-qty">${it.qty||1}</div><div class="it-det"><div class="it-name">${dName}</div>${extrasHtml}${it.notes ? `<div class="it-note">${esc(it.notes)}</div>` : ''}</div><div class="it-price">${displayPrice}</div></div>`;
            }).join("");
            return `<div class="cat-group"><div class="cat-title">${icon} ${title}</div>${rows}</div>`;
        };

        const esc = s => (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;');
        const itemsHTML = renderSec(cats.b,'🍔','HAMBURGUESAS') + renderSec(cats.f,'🍟','PAPAS') + renderSec(cats.d,'🥤','BEBIDAS') + renderSec(cats.o,'🔸','OTROS');
        const total = o.total || items.reduce((a,i)=>a+((i.price||0)*(i.qty||1)),0);

        let discountHTML = "";
        if (o.discount > 0) { discountHTML = `<div style="display:flex;justify-content:space-between;color:#16a34a;font-weight:700;padding:0 16px;margin-bottom:8px"><span>🏷️ Descuento (${esc(o.coupon||'')}):</span><span>-${money(o.discount)}</span></div>`; }

        let netHtml = "";
        if(o.neto_excel && o.neto_excel > 0) { netHtml = `<div style="font-size:12px; color:#15803d; text-align:right; font-weight:700;">Neto: ${money(o.neto_excel)}</div>`; }

        const telHtml = o.telefono ? `<div style="margin-top:4px; font-size:13px; font-weight:600; color:#4b5563;">📞 <a href="https://wa.me/${o.telefono.replace(/\D/g,'')}" target="_blank" style="text-decoration:none; color:inherit;">${esc(o.telefono)}</a></div>` : '';

        return `<div class="order ${st==='cancelled'?'cancelled':''}">
           <div class="order-head">
              <div><div class="order-title">#${o.orderNumber||'--'} — ${o.source==='mostrador'?esc(o.nombre)+' (Local)':esc(o.nombre)}</div>${telHtml}<div class="order-meta"><span>${dateStr} ${timeStr}</span> <span class="chip ${srcVal}">${esc(srcVal)}</span> ${displayTime ? `<span class="chip time">⏰ ${esc(displayTime)}</span>` : ''}</div></div>
              <div style="text-align:right"><div class="price-tag">${money(total)}</div>${netHtml}</div>
           </div>
           <div class="items">${itemsHTML || '<div class="it-sub">Sin ítems</div>'}</div>
           ${discountHTML}
           <div class="actions-area">
              <div class="control-row">
                 <select class="pay-select" onchange="updatePago('${doc.id}', this.value)">
                    <option value="" ${!payVal?'selected':''}>Pago...</option>
                    <option value="efectivo" ${payVal==='efectivo'?'selected':''}>Efectivo</option>
                    <option value="mercado_pago" ${payVal==='mercado_pago'?'selected':''}>QR (MP)</option>
                    <option value="debito" ${payVal==='debito'?'selected':''}>Débito</option>
                    <option value="transferencia" ${payVal==='transferencia'?'selected':''}>Transferencia</option>
                 </select>
                 <select class="source-select" onchange="updateSource('${doc.id}', this.value)">
                    <option value="web" ${srcVal==='web'?'selected':''}>Web</option>
                    <option value="mostrador" ${srcVal==='mostrador'?'selected':''}>Local</option>
                    <option value="pedidosya" ${srcVal==='pedidosya'?'selected':''}>PedidosYa</option>
                    <option value="rappi" ${srcVal==='rappi'?'selected':''}>Rappi</option>
                 </select>
              </div>
              <div class="control-row">
                 <button class="pay-btn ${isPaid?'paid':'pending'}" onclick="setPaymentStatus('${doc.id}', ${isPaid}, '${payVal}')">${isPaid ? 'PAGADO' : 'COBRAR'}</button>
                 <div class="icon-btn-lg" onclick="printOrder('${doc.id}')">🖨️</div>
                 <div class="icon-btn-lg" style="color:#d32f2f; border-color:#ffcdd2; background:#ffebee;" onclick="deleteOrder('${doc.id}')">🗑️</div>
              </div>
              <div class="stateBtns">${btns}<div class="state-btn cancelled" onclick="setOrderStatus('${doc.id}', 'cancelled', ${isPaid})">CANCELAR</div></div>
           </div>
        </div>`;
    }

    window.trySilentPrint = function(docSnap){
       const o = docSnap.data();
       const esc = s => (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;');
       const m = n => (Number(n)||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});
       const dt = window.pickDate(o);
       const dateStr = dt.toLocaleDateString("es-AR");
       const timeStr = dt.toLocaleTimeString("es-AR",{hour12:false});
       const horarioRetiro = getCleanTime(o, timeStr.substring(0, 5));
       let payTxt = o.pago;
       if(!payTxt || payTxt==='mostrador_sin_especificar' || payTxt==="") payTxt="A COBRAR EN CAJA";
       else if(payTxt==='mercado_pago') payTxt="QR (MP)";
       else payTxt = payTxt.toUpperCase();
       const isPaid = (o.payment_status === 'paid') || o.paid;
       const stPay = isPaid ? "PAGADO" : "PENDIENTE";
       let items = Array.isArray(o.items) ? [...o.items] : [];
       if(Array.isArray(o.bebidas)) items = items.concat(o.bebidas);
       if(Array.isArray(o.drinks)) items = items.concat(o.drinks);
       let cats = { b:[], f:[], d:[], o:[] };
       items.forEach(it => { const cat = window.getCat(it); if(cat==='b') cats.b.push(it); else if(cat==='f') cats.f.push(it); else if(cat==='d') cats.d.push(it); else cats.o.push(it); });
       cats.b = consolidateItems(cats.b); cats.f = consolidateItems(cats.f); cats.d = consolidateItems(cats.d); cats.o = consolidateItems(cats.o);
       const rSec = (l, ti) => {
         if(!l.length) return "";
         const r = l.map(i => {
            let dName = esc(i.name);
            let basePrice = Number(i.price) || PRODUCT_CATALOG['price_' + i.id] || PRODUCT_CATALOG['price_' + normalize(i.name)] || 0; let extraPatty = (i.extras?.patty || 0) * (PRICES_DB.patty || 2500); let extraCheddar = (i.extras?.cheddar || 0) * (PRICES_DB.cheddar || 300); let unitFinal = basePrice + extraPatty + extraCheddar; let lineTotal = unitFinal * (i.qty || 1);
            let displayPrice = m(lineTotal); if(ti.includes("PAPA") && lineTotal === 0) displayPrice = "";
            let h = `<div class="row name"><div class="l">${i.qty||1} × ${dName}</div><div class="r">${displayPrice}</div></div>`;
            if (i.fries || i.friesRaw) { const map = {con_sazon:"Sazonadas", con_sal:"Con Sal", sin_sal:"Sin Sal"}; const rawVal = i.friesRaw || i.fries; const displayVal = map[rawVal] || i.fries; h += `<div class="sub">🍟 ${displayVal}</div>`; }
            if(!ti.includes("PAPA")){ if(i.extras?.patty) h+=`<div class="sub">➕ ${i.extras.patty} CARNE</div>`; if(i.extras?.cheddar) h+=`<div class="sub">➕ ${i.extras.cheddar} CHEDDAR</div>`; }
            if(i.notes) h+=`<div class="sub">📝 ${esc(i.notes)}</div>`;
            h+=`<div class="sep"></div>`;
            return h;
         }).join("");
         return `<div class="blk"><div class="lbl" style="border-bottom:1px solid #000;display:inline-block;margin-top:6px">${ti}</div></div>${r}`;
       };
       const body = rSec(cats.b,'HAMBURGUESAS') + rSec(cats.f,'PAPAS') + rSec(cats.d,'BEBIDAS') + rSec(cats.o,'OTROS');
       const total = o.total || items.reduce((a,i)=>a+((i.price||0)*(i.qty||1)),0);
       const name = o.source==='mostrador' ? (o.nombre+' (Local)') : o.nombre;
       let discountRow = "";
       if (o.discount > 0) { discountRow = `<div class="row"><div class="l">DESC. (${esc(o.coupon||'')})</div><div class="r">-${m(o.discount)}</div></div>`; }
       const html = `<!doctype html><html><head><style>@page{size:58mm auto;margin:0} body{width:58mm;margin:0 auto;padding:5px;font-family:monospace;font-size:14px;font-weight:700;color:#000;line-height:1.2}.c{text-align:center} .hr{border-top:2px dashed #000;margin:8px 0} .row{display:flex;justify-content:space-between; align-items:center}.lbl{font-size:12px;text-transform:uppercase} .name{font-size:16px; font-weight:900; margin-top:8px;}.sub{font-size:20px; font-weight:900; padding-top:6px; padding-bottom:6px; text-transform:uppercase; line-height:1.1; border-bottom: 2px solid #000;} .sep{margin:4px 0}.r{text-align:right}</style></head><body>
         <div class="c" style="font-size:16px;margin-bottom:4px">Rhodes Burgers</div>
         <div class="c" style="font-size:14px">#${o.orderNumber||'--'}</div>
         <div class="c" style="font-size:18px;margin:5px 0">[ ${stPay} ]</div>
         <div class="hr"></div>
         <div><span class="lbl">CLIENTE:</span> ${esc(name)}</div>
         <div class="c" style="font-size:16px;margin:6px 0;font-weight:900">Retira: ${esc(horarioRetiro)}</div>
         <div><span class="lbl">PAGO:</span> ${payTxt}</div>
         ${o.notes ? `<div class="hr"></div><div><span class="lbl">NOTA:</span> ${esc(o.notes)}</div>` : ''}
         <div class="hr"></div>
         ${body}
         <div class="hr"></div>
         ${discountRow}
         <div class="row"><div class="l">TOTAL</div><div class="r">${m(total)}</div></div>
         <div class="c" style="margin-top:10px;font-size:10px">${dateStr} ${timeStr}</div>
         <script>window.onload=()=>{setTimeout(()=>{window.print()},200)}<\/script>
       </body></html>`;
       const f = document.createElement('iframe'); f.style.cssText='position:fixed;left:0;top:0;width:0;height:0;border:0';
       document.body.append(f); const d=f.contentWindow.document; d.open();d.write(html);d.close();
       setTimeout(()=>f.remove(), 10000);
    };
  });
 </script>
