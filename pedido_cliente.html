<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Confirmar Pedido • Rhodes Burgers</title>
  <link rel="icon" href="images/logo.png"/>
  <meta name="theme-color" content="#1C1810"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,700;0,800;0,900;1,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --brand:#625A45; --brand-dk:#3d3829;
      --gold:#D4A847; --gold-dim:rgba(212,168,71,.12);
      --bg:#1a1710; --bg2:#201d13; --card:#2a2619;
      --border:rgba(212,168,71,.13); --border2:rgba(212,168,71,.06);
      --txt:#F0EAE0; --muted:#7a7060; --white:#FAFAF8;
      --fh:'Barlow Condensed',sans-serif; --fb:'DM Sans',sans-serif;
      --green:#22c55e; --red:#ef4444;
    }
    *,*::before,*::after{box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--fb);-webkit-tap-highlight-color:transparent;overflow-x:hidden;min-height:100vh;}

    /* ── NOISE ── */
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity:.025;mix-blend-mode:overlay;}

    /* ── LOADER ── */
    #pageLoader{position:fixed;inset:0;z-index:99999;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s;}
    #pageLoader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
    #pageLoader video{width:220px;max-width:80%;mix-blend-mode:screen;}

    /* ── HEADER ── */
    .hdr{position:sticky;top:0;z-index:800;background:rgba(26,23,16,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .topbar{max-width:1100px;margin:0 auto;height:58px;padding:0 18px;display:flex;align-items:center;gap:14px;}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .brand img{width:30px;height:30px;border-radius:7px;object-fit:cover;}
    .brand-txt{font-family:var(--fh);font-weight:900;font-size:22px;color:var(--white);text-transform:uppercase;letter-spacing:.06em;line-height:1;}
    .brand-txt em{font-style:normal;color:var(--gold);}
    .spacer{flex:1;}
    .back-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--fb);font-weight:500;font-size:13px;text-decoration:none;cursor:pointer;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    /* ── MAIN LAYOUT ── */
    .page{max-width:1060px;margin:0 auto;padding:32px 18px 60px;display:grid;grid-template-columns:1fr 400px;gap:24px;position:relative;z-index:1;}
    @media(max-width:860px){.page{grid-template-columns:1fr;padding:20px 14px 60px;}}

    /* ── CARDS ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
    .card-head{padding:22px 24px 0;}
    .card-body{padding:20px 24px 24px;}
    .section-title{font-family:var(--fh);font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--white);margin:0 0 4px;}
    .section-title em{font-style:normal;color:var(--gold);}
    .section-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}

    /* ── FORM FIELDS ── */
    .field{margin-bottom:18px;}
    .field label{display:block;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .field input,.field textarea,.field select{
      width:100%;padding:13px 16px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:12px;
      color:var(--white);
      font-family:var(--fb);font-size:15px;
      outline:none;transition:border-color .2s,background .2s;
    }
    .field input::placeholder,.field textarea::placeholder{color:var(--muted);}
    .field input:focus,.field textarea:focus{border-color:var(--gold);background:rgba(212,168,71,.05);}
    .field textarea{resize:none;min-height:80px;}

    /* ── DIVIDER ── */
    .divider{height:1px;background:var(--border);margin:24px 0;}

    /* ── PAGO INFO ── */
    .pago-badge{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(212,168,71,.07);border:1px solid rgba(212,168,71,.25);border-radius:12px;}
    .pago-ico{font-size:24px;flex-shrink:0;}
    .pago-txt{font-family:var(--fh);font-size:17px;font-weight:700;text-transform:uppercase;color:var(--gold);letter-spacing:.04em;}
    .pago-sub{font-size:12px;color:var(--muted);margin-top:2px;}

    /* ── SLOTS ── */
    .slot-row{display:flex;align-items:center;gap:10px;}
    .slot-arrow{width:44px;height:44px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gold);font-size:18px;transition:all .2s;flex-shrink:0;user-select:none;}
    .slot-arrow:hover{background:var(--gold-dim);border-color:var(--gold);}
    .slot-display{flex:1;padding:13px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;text-align:center;font-family:var(--fh);font-size:28px;font-weight:900;color:var(--white);letter-spacing:.04em;transition:all .2s;}
    .slot-display.full{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.07);}
    .slot-refresh{width:44px;height:44px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;transition:all .2s;flex-shrink:0;}
    .slot-refresh:hover{color:var(--gold);border-color:var(--gold);}
    .slot-note{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;}
    .slot-note.warn{color:var(--red);}

    /* ── COUPON ── */
    .coupon-row{display:flex;gap:10px;}
    .coupon-row input{flex:1;}
    .coupon-btn{padding:13px 18px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-family:var(--fb);font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;transition:all .2s;}
    .coupon-btn:hover{border-color:var(--gold);color:var(--gold);}
    .coupon-msg{font-size:13px;margin-top:8px;}
    /* PROPINA */
    .tip-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
    .tip-btn{padding:9px 16px;border-radius:99px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);font-family:var(--fh);font-size:15px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
    .tip-btn:hover{border-color:var(--gold-border);color:var(--gold);}
    .tip-btn.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold);}
    .tip-custom{display:flex;gap:8px;align-items:center;margin-top:8px;}
    .tip-custom input{flex:1;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--txt);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s;}
    .tip-custom input:focus{border-color:var(--gold);}
    .tip-custom input::placeholder{color:var(--muted);}
    .res-tip{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;color:var(--green);font-weight:600;}
    .res-tip span:last-child{font-family:var(--fh);font-size:15px;font-weight:800;}
    .coupon-msg.ok{color:var(--green);}
    .coupon-msg.err{color:var(--red);}

    /* ── CONFIRM BTN ── */
    .confirm-btn{
      width:100%;margin-top:8px;padding:17px;
      background:var(--gold);border:none;border-radius:14px;
      font-family:var(--fh);font-size:22px;font-weight:900;
      text-transform:uppercase;letter-spacing:.08em;
      color:#1a1710;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all .2s;box-shadow:0 4px 20px rgba(212,168,71,.25);
    }
    .confirm-btn:hover:not(:disabled){background:#e0b44f;box-shadow:0 6px 28px rgba(212,168,71,.35);}
    .confirm-btn:active:not(:disabled){transform:scale(.98);}
    .confirm-btn:disabled{opacity:.5;cursor:not-allowed;}

    /* ── RESUMEN ── */
    .summary-card{position:sticky;top:78px;align-self:start;}
    @media(max-width:860px){.summary-card{position:static;order:-1;}}
    .summary-title{font-family:var(--fh);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--white);margin-bottom:16px;}
    .res-item{padding:12px 0;border-bottom:1px solid var(--border2);display:flex;flex-direction:column;gap:3px;}
    .res-item:last-child{border-bottom:none;}
    .res-name{font-weight:600;font-size:15px;color:var(--white);}
    .res-detail{font-size:12px;color:var(--muted);}
    .res-price{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--gold);text-align:right;margin-top:2px;}
    .res-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:16px;margin-top:8px;border-top:1px solid var(--border);}
    .res-total-lbl{font-family:var(--fh);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
    .res-total-val{font-family:var(--fh);font-size:32px;font-weight:900;color:var(--gold);}
    .res-discount{font-size:13px;color:var(--green);font-weight:600;margin-top:8px;}
    .empty-cart{text-align:center;padding:32px 0;color:var(--muted);font-size:14px;}

    /* ── CART ITEMS COUNT BADGE ── */
    .items-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold-dim);border:1px solid rgba(212,168,71,.2);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--gold);font-family:var(--fh);letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px;}
  </style>
</head>
<body>

<div id="pageLoader">
  <video autoplay loop muted playsinline>
    <source src="images/loader.mp4" type="video/mp4">
    <img src="images/logo.png" style="width:100px">
  </video>
</div>

<header class="hdr">
  <div class="topbar">
    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="Rhodes">
      <span class="brand-txt">Rhodes<em>.</em></span>
    </a>
    <div class="spacer"></div>
    <a href="index.html" class="back-btn">← Volver al menú</a>
  </div>
</header>

<div class="page">

  <!-- ── FORMULARIO ── -->
  <div>
    <div class="card">
      <div class="card-head">
        <div class="section-title">Tu <em>Pedido</em></div>
        <div class="section-sub">Completá tus datos para confirmar</div>
      </div>
      <div class="card-body">

        <!-- Datos personales -->
        <div class="field">
          <label>Nombre y Apellido</label>
          <input id="inpNombre" type="text" placeholder="Ej: Juan Pérez" autocomplete="name">
        </div>
        <div class="field">
          <label>Teléfono <span style="font-weight:400;text-transform:none;font-family:var(--fb);font-size:11px">(opcional)</span></label>
          <input id="inpTelefono" type="tel" placeholder="Para contactarte si hace falta" autocomplete="tel">
        </div>

        <div class="divider"></div>

        <!-- Pago -->
        <div class="field">
          <label>Medio de Pago</label>
          <div class="pago-badge">
            <div class="pago-ico">💵</div>
            <div>
              <div class="pago-txt">Abonás en el local</div>
              <div class="pago-sub">Efectivo · Débito · Transferencia · MercadoPago</div>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Horario -->
        <div class="field">
          <label>Horario de Retiro</label>
          <div class="slot-row">
            <div class="slot-arrow" id="slotPrev">◀</div>
            <div class="slot-display" id="slotLabel">--:--</div>
            <div class="slot-arrow" id="slotNext">▶</div>
            <div class="slot-refresh" id="btnRefreshSlots" title="Actualizar turnos">🔁</div>
          </div>
          <div class="slot-note" id="slotNote">Cargando turnos disponibles...</div>
        </div>

        <div class="divider"></div>

        <!-- Notas -->
        <div class="field">
          <label>Notas <span style="font-weight:400;text-transform:none;font-family:var(--fb);font-size:11px">(opcional)</span></label>
          <textarea id="inpNotas" placeholder="Aclaraciones para tu pedido..."></textarea>
        </div>

        <!-- Cupón -->
        <div class="field">
          <label>Cupón de Descuento</label>
          <div class="coupon-row">
            <input id="inpCupon" type="text" placeholder="CÓDIGO" style="text-transform:uppercase;letter-spacing:1px;font-weight:700;">
            <button id="btnAplicarCupon" class="coupon-btn">Aplicar</button>
          </div>
          <div id="msgCupon" class="coupon-msg"></div>
        </div>

        <!-- Propina -->
        <div class="divider"></div>
        <div class="field">
          <label>Propina <span style="font-weight:400;text-transform:none;font-family:var(--fb);font-size:11px">(opcional)</span></label>
          <div class="tip-btns">
            <button type="button" class="tip-btn" data-pct="10" onclick="setTip(10,this)">10%</button>
            <button type="button" class="tip-btn" data-pct="15" onclick="setTip(15,this)">15%</button>
            <button type="button" class="tip-btn" data-pct="20" onclick="setTip(20,this)">20%</button>
            <button type="button" class="tip-btn" data-pct="0" onclick="setTip(0,this)">Sin propina</button>
          </div>
          <div class="tip-custom">
            <input type="number" id="inpTipCustom" placeholder="Monto libre ($)" min="0" oninput="setTipCustom(this.value)">
          </div>
          <div id="tipPreview" style="font-size:12px;color:var(--green);margin-top:6px;font-weight:600;display:none"></div>
        </div>

        <button class="confirm-btn" id="btnConfirmar">
          <span>🤠</span> Confirmar Pedido
        </button>

      </div>
    </div>
  </div>

  <!-- ── RESUMEN ── -->
  <aside>
    <div class="card summary-card">
      <div class="card-body">
        <div class="summary-title">Resumen</div>
        <div id="itemsBadge" class="items-badge">0 items</div>
        <div id="resumenList"></div>
        <div class="res-total-row">
          <span class="res-total-lbl">Total</span>
          <span class="res-total-val" id="resTotal">$0</span>
        </div>
        <div id="resDiscount"></div>
        <div id="resTip"></div>
      </div>
    </div>
  </aside>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",authDomain:"rhodes-burguers.firebaseapp.com",projectId:"rhodes-burguers",storageBucket:"rhodes-burguers.firebasestorage.app",messagingSenderId:"951646688091",appId:"1:951646688091:web:05db5fadb4150d1fa9c07e"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
db.settings({experimentalForceLongPolling:true,experimentalAutoDetectLongPolling:false});

const CART_KEY="rhodes_cart_v5";
const WHATSAPP_NUMBER="5491170596483";
const GRAMOS_POR_BLOQUE=1500, G_POR_BURGER=200, G_POR_SIDE=350;
const SLOT_START="19:15", SLOT_END="23:45", SLOT_INTERVAL_MIN=15;

const $=s=>document.querySelector(s);
const money=n=>(Number(n)||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});

let activeDiscount=0, activeCouponCode="";
let activeTip=0, activeTipPct=0;
let slotObjects=[], visibles=[], currentIndex=0, listeners=[];

window.setTip = function(pct, btn) {
    activeTipPct = pct;
    document.querySelectorAll('.tip-btn').forEach(b=>b.classList.remove('active'));
    if(pct > 0) btn.classList.add('active');
    document.getElementById('inpTipCustom').value = '';
    calcTip();
};

window.setTipCustom = function(val) {
    activeTipPct = 0;
    document.querySelectorAll('.tip-btn').forEach(b=>b.classList.remove('active'));
    activeTip = Math.max(0, Number(val)||0);
    renderResumen();
};

function calcTip() {
    const cart = loadCart();
    const subtotal = cart.items.reduce((s,i)=>s+(( i.finalPrice||i.price||0)*i.qty),0);
    const afterDiscount = Math.max(0, subtotal - activeDiscount);
    activeTip = activeTipPct > 0 ? Math.round(afterDiscount * activeTipPct / 100) : 0;
    renderResumen();
}

/* ── CART ── */
function loadCart(){
  try{
    const raw=JSON.parse(localStorage.getItem(CART_KEY));
    if(!raw) return {items:[]};
    if(Array.isArray(raw.items)) return raw;
    let flat=[];
    const proc=(obj,type)=>{
      if(!obj) return;
      for(let id in obj){
        const e=obj[id];
        flat.push({id:e.item.id,name:e.item.name,price:Number(e.item.price),category:e.item.category,
          qty:e.qty,fries:e.fries,friesRaw:e.friesRaw,sideType:e.sideType,
          extras:e.extras||{},notes:e.notes,finalPrice:e.finalPrice,type});
      }
    };
    proc(raw.burger,'burger'); proc(raw.side,'side'); proc(raw.drink,'drink');
    return {items:flat};
  }catch{return {items:[]};}
}

function renderResumen(){
  const cart=loadCart();
  const list=$('#resumenList');
  list.innerHTML='';
  let subtotal=0;

  if(!cart.items.length){
    list.innerHTML='<div class="empty-cart">🛒 Carrito vacío</div>';
    $('#resTotal').textContent='$0';
    $('#itemsBadge').textContent='0 items';
    return 0;
  }

  cart.items.forEach(item=>{
    const unit=item.finalPrice||item.price||0;
    const total=unit*item.qty;
    subtotal+=total;
    const details=[];
    if(item.fries) details.push('🍟 '+item.fries);
    if(item.extras?.patty) details.push(`+${item.extras.patty} Carne`);
    if(item.extras?.cheddar) details.push(`+${item.extras.cheddar} Cheddar`);
    if(item.type==='drink') details.push('Bebida');
    list.innerHTML+=`
      <div class="res-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div>
            <div class="res-name">${item.qty}× ${item.name}</div>
            ${details.length?`<div class="res-detail">${details.join(' · ')}</div>`:''}
            ${item.notes?`<div class="res-detail" style="color:#c28a2a">📝 ${item.notes}</div>`:''}
          </div>
          <div class="res-price">${money(total)}</div>
        </div>
      </div>`;
  });

  const totalItems=cart.items.reduce((a,i)=>a+(i.qty||1),0);
  $('#itemsBadge').textContent=`${totalItems} item${totalItems!==1?'s':''}`;

  let final=Math.max(0, subtotal-activeDiscount);
  // Recalculate tip if percentage-based
  if(activeTipPct > 0) activeTip = Math.round(final * activeTipPct / 100);
  const finalWithTip = final + activeTip;
  $('#resTotal').textContent=money(finalWithTip);

  const discEl=$('#resDiscount');
  if(activeDiscount>0){
    discEl.innerHTML=`<div class="res-discount">🏷️ Cupón (${activeCouponCode}): -${money(activeDiscount)}</div>`;
  } else {
    discEl.innerHTML='';
  }

  const tipEl = document.getElementById('resTip');
  if(activeTip > 0){
    tipEl.innerHTML=`<div class="res-tip"><span>🤝 Propina${activeTipPct>0?' ('+activeTipPct+'%)':''}</span><span>+${money(activeTip)}</span></div>`;
    document.getElementById('tipPreview').style.display='block';
    document.getElementById('tipPreview').textContent=`Propina: +${money(activeTip)}`;
  } else {
    tipEl.innerHTML='';
    document.getElementById('tipPreview').style.display='none';
  }
  return finalWithTip;
}

/* ── PESO ── */
function calculateWeight(){
  const cart=loadCart(); let g=0;
  cart.items.forEach(i=>{
    const cat=(i.category||'').toLowerCase();
    if(cat.includes('burger')||cat.includes('hamburguesa')||cat.includes('sandwich')) g+=i.qty*G_POR_BURGER;
    else if(cat.includes('guarnicion')||cat.includes('side')||cat.includes('papas')) g+=i.qty*G_POR_SIDE;
  });
  return g;
}

/* ── SLOTS ── */
function parseHHMM(str){const[h,m]=str.split(':').map(Number);const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate(),h,m,0);}
function slotKey(d){const p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;}
function fmtHHMM(d){return d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',hour12:false});}

function limpiarListeners(){listeners.forEach(u=>{try{u();}catch{}});listeners=[];}

async function cargarSlots(){
  limpiarListeners();
  const slots=[]; let cur=new Date(parseHHMM(SLOT_START)); const end=parseHHMM(SLOT_END);
  while(cur<=end){slots.push(new Date(cur));cur=new Date(cur.getTime()+SLOT_INTERVAL_MIN*60000);}
  slotObjects=slots.map(d=>({date:d,key:slotKey(d),gramsUsed:0,full:false}));
  $('#slotLabel').textContent='...';
  slotObjects.forEach(s=>{
    const ref=db.collection('slots_grams').doc(s.key);
    const unsub=ref.onSnapshot(doc=>{
      if(!doc.exists) ref.set({gramsUsed:0},{merge:true});
      s.gramsUsed=Number((doc.data()||{}).gramsUsed||0);
      reconstruirVisibles();
    });
    listeners.push(unsub);
  });
}

function reconstruirVisibles(){
  const peso=calculateWeight();
  const cutoff=new Date(Date.now()+20*60000);
  visibles=slotObjects.filter(s=>{
    if(s.date<cutoff) return false;
    const resta=GRAMOS_POR_BLOQUE-s.gramsUsed;
    if(peso>GRAMOS_POR_BLOQUE) return true;
    return resta>=peso;
  });
  if(visibles.length===0) currentIndex=-1;
  else if(currentIndex>=visibles.length) currentIndex=0;
  actualizarUI();
}

function actualizarUI(){
  const lbl=$('#slotLabel'), note=$('#slotNote');
  if(visibles.length===0){
    lbl.textContent='Cerrado';
    lbl.className='slot-display full';
    note.textContent='No hay turnos disponibles por ahora';
    note.className='slot-note warn';
    $('#slotsCarousel_data').selectedSlot=null;
    return;
  }
  const s=visibles[currentIndex];
  lbl.textContent=fmtHHMM(s.date);
  lbl.className='slot-display';
  note.textContent=`Turno ${currentIndex+1} de ${visibles.length} disponibles`;
  note.className='slot-note';
  window._selectedSlot={key:s.key,pretty:fmtHHMM(s.date)};
}

$('#slotPrev').onclick=()=>{if(currentIndex>0){currentIndex--;actualizarUI();}};
$('#slotNext').onclick=()=>{if(currentIndex<visibles.length-1){currentIndex++;actualizarUI();}};
$('#btnRefreshSlots').onclick=cargarSlots;

/* ── CUPÓN ── */
$('#btnAplicarCupon').onclick=async()=>{
  const code=$('#inpCupon').value.trim().toUpperCase();
  const msg=$('#msgCupon');
  if(!code) return;
  $('#btnAplicarCupon').textContent='...';
  try{
    const snap=await db.collection('coupons').where('code','==',code).where('enabled','==',true).get();
    if(snap.empty){
      msg.textContent='❌ Cupón no válido'; msg.className='coupon-msg err';
      activeDiscount=0; activeCouponCode='';
    } else {
      const d=snap.docs[0].data();
      activeDiscount=Number(d.value); activeCouponCode=code;
      msg.textContent=`✅ Cupón aplicado: -${money(activeDiscount)}`; msg.className='coupon-msg ok';
    }
  }catch(e){console.error(e);}
  $('#btnAplicarCupon').textContent='Aplicar';
  renderResumen();
};

/* ── CONFIRMAR ── */
async function reservarSlot(key,peso){
  const ref=db.collection('slots_grams').doc(key);
  await db.runTransaction(async t=>{
    const doc=await t.get(ref);
    const actual=doc.exists?(doc.data().gramsUsed||0):0;
    if(actual+peso>GRAMOS_POR_BLOQUE&&peso<GRAMOS_POR_BLOQUE) throw 'El turno se acaba de llenar. Elegí otro.';
    t.set(ref,{gramsUsed:actual+peso},{merge:true});
  });
}

async function getNextOrderNumber(){
  const ref=db.collection('config').doc('counters');
  let next=1;
  await db.runTransaction(async t=>{
    const doc=await t.get(ref);
    next=(doc.exists?(doc.data().orderNumber||0):0)+1;
    t.set(ref,{orderNumber:next},{merge:true});
  });
  return next;
}

$('#btnConfirmar').onclick=async()=>{
  const btn=$('#btnConfirmar');
  const nombre=$('#inpNombre').value.trim();
  const tel=$('#inpTelefono').value.trim();
  const notas=$('#inpNotas').value.trim();
  const slot=window._selectedSlot;
  const cart=loadCart();

  if(!cart.items.length){alert('El carrito está vacío');return;}
  if(!nombre){alert('Por favor escribí tu nombre');return;}
  if(!slot){alert('Por favor elegí un horario de retiro');return;}

  btn.disabled=true;
  btn.innerHTML='<span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Procesando...';

  try{
    await reservarSlot(slot.key,calculateWeight());
    const orderNum=await getNextOrderNumber();
    const trackToken=Math.random().toString(36).substr(2)+Date.now().toString(36);
    const finalTotal=renderResumen();

    const now=new Date();
    const localISO=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,-1);

    const orderData={
      orderNumber:orderNum, nombre, telefono:tel||'', source:'web',
      entrega:'take_away', pago:'local', payment_status:'pending', status:'accepted',
      createdAt:localISO, total:finalTotal,
      subtotal:finalTotal+(activeDiscount||0)-(activeTip||0),
      discount:activeDiscount||0, coupon:activeCouponCode||'',
      tip:activeTip||0, tipPct:activeTipPct||0,
      pickup_slot:slot.key||'', pickup_time_pretty:slot.pretty||'',
      trackToken, items:cart.items.map(i=>({
        id:i.id||'', name:i.name||'', qty:i.qty||1, price:i.price||0,
        category:i.category||'', type:i.type||'burger',
        fries:i.fries||'', friesRaw:i.friesRaw||'',
        sideType:i.sideType||'',
        extras:{patty:i.extras?.patty||0, cheddar:i.extras?.cheddar||0},
        notes:i.notes||''
      }))
    };

    const docRef=await db.collection('orders').add(orderData);
    await db.collection('order_public').doc(trackToken).set({
      orderNumber:orderNum, nombre, status:'accepted', updatedAt:localISO
    });

    // WhatsApp
    let msg=`*NUEVO PEDIDO WEB #${orderNum}*\n👤 ${nombre}\n🕒 Retiro: ${slot.pretty}\n${'─'.repeat(28)}\n`;
    cart.items.forEach(i=>{
      msg+=`${i.qty}x *${i.name}*\n`;
      if(i.fries) msg+=`   🍟 ${i.fries}\n`;
      if(i.extras?.patty) msg+=`   🥩 +${i.extras.patty} Carne\n`;
      if(i.extras?.cheddar) msg+=`   🧀 +${i.extras.cheddar} Cheddar\n`;
      if(i.notes) msg+=`   📝 ${i.notes}\n`;
    });
    if(activeDiscount>0) msg+=`🏷️ Cupón: -${money(activeDiscount)}\n`;
    if(activeTip>0) msg+=`🤝 Propina${activeTipPct>0?' ('+activeTipPct+'%)':''}: +${money(activeTip)}\n`;
    msg+=`${'─'.repeat(28)}\n*TOTAL: ${money(finalTotal)}*\n(Abona en el local)\n\n`;
    const base=window.location.href.substring(0,window.location.href.lastIndexOf('/'));
    const trackLink=`${base}/gracias.html?id=${docRef.id}&t=${trackToken}`;
    msg+=`🔗 Seguí tu pedido:\n${trackLink}`;

    localStorage.removeItem(CART_KEY);
    localStorage.setItem('rb_user_name',nombre);
    if(tel) localStorage.setItem('rb_user_phone',tel);
    activeTip=0; activeTipPct=0;

    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`,'_blank');
    setTimeout(()=>{window.location.href=trackLink;},800);

  }catch(err){
    console.error(err);
    alert('Error al procesar: '+err);
    btn.disabled=false;
    btn.innerHTML='<span>🤠</span> Confirmar Pedido';
    cargarSlots();
  }
};

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',()=>{
  cargarSlots();
  renderResumen();
  const n=localStorage.getItem('rb_user_name');
  const p=localStorage.getItem('rb_user_phone');
  if(n) $('#inpNombre').value=n;
  if(p) $('#inpTelefono').value=p;
  setTimeout(()=>{
    const l=document.getElementById('pageLoader');
    if(l){l.classList.add('hidden');setTimeout(()=>l.remove(),500);}
  },800);
  // Safety: ocultar loader pase lo que pase
  setTimeout(()=>{
    const l=document.getElementById('pageLoader');
    if(l){l.classList.add('hidden');setTimeout(()=>l.remove(),500);}
  },3000);
});
</script>
