<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Mi Perfil • Rhodes Burgers</title>
  <link rel="icon" href="images/logo.png"/>
  <meta name="theme-color" content="#1C1810"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,700;0,800;0,900;1,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --gold:#D4A847; --gold-dim:rgba(212,168,71,.12);
      --bg:#1a1710; --bg2:#201d13; --card:#2a2619;
      --border:rgba(212,168,71,.13); --border2:rgba(212,168,71,.06);
      --txt:#F0EAE0; --muted:#7a7060; --white:#FAFAF8;
      --fh:'Barlow Condensed',sans-serif; --fb:'DM Sans',sans-serif;
      --green:#22c55e; --red:#ef4444;
    }
    *,*::before,*::after{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--fb);-webkit-tap-highlight-color:transparent;overflow-x:hidden;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity:.025;mix-blend-mode:overlay;}

    /* HEADER */
    .hdr{position:sticky;top:0;z-index:800;background:rgba(26,23,16,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .topbar{max-width:900px;margin:0 auto;height:58px;padding:0 18px;display:flex;align-items:center;gap:14px;}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .brand img{width:30px;height:30px;border-radius:7px;object-fit:cover;}
    .brand-txt{font-family:var(--fh);font-weight:900;font-size:22px;color:var(--white);text-transform:uppercase;letter-spacing:.06em;}
    .brand-txt em{font-style:normal;color:var(--gold);}
    .spacer{flex:1;}
    .back-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:500;font-size:13px;text-decoration:none;cursor:pointer;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    .page{max-width:900px;margin:0 auto;padding:28px 18px 60px;position:relative;z-index:1;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 24px;margin-bottom:22px;}
    .card-title{font-family:var(--fh);font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--white);margin:0 0 16px;}
    .card-title em{font-style:normal;color:var(--gold);}

    /* GOOGLE BTN / login screen */
    .gbtn{display:inline-flex;align-items:center;gap:10px;padding:12px 20px;border-radius:12px;border:none;background:#fff;color:#3c4043;font-family:var(--fb);font-weight:600;font-size:15px;cursor:pointer;transition:all .2s;}
    .gbtn:hover{box-shadow:0 4px 16px rgba(0,0,0,.25);}
    .gbtn svg{width:18px;height:18px;}
    .login-wrap{text-align:center;padding:60px 20px;}
    .login-wrap .logo{width:70px;height:70px;border-radius:16px;margin-bottom:18px;}
    .login-wrap h1{font-family:var(--fh);font-size:30px;font-weight:900;text-transform:uppercase;color:var(--white);margin:0 0 6px;}
    .login-wrap p{color:var(--muted);font-size:14px;margin:0 0 24px;line-height:1.6;}

    /* PROFILE */
    .prof-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
    .prof-ava{width:58px;height:58px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
    .prof-name{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--white);text-transform:uppercase;letter-spacing:.03em;line-height:1.1;}
    .prof-email{font-size:13px;color:var(--muted);}
    .logout-btn{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:99px;font-size:12px;cursor:pointer;}
    .logout-btn:hover{color:var(--gold);border-color:var(--gold);}
    .field{margin-bottom:14px;}
    .field label{display:block;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
    .field input{width:100%;padding:12px 15px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;color:var(--white);font-family:var(--fb);font-size:15px;outline:none;transition:border-color .2s;}
    .field input:focus{border-color:var(--gold);}
    .field input:disabled{opacity:.55;cursor:not-allowed;}
    .save-btn{padding:12px 22px;background:var(--gold);border:none;border-radius:12px;font-family:var(--fh);font-size:17px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#1a1710;cursor:pointer;transition:all .2s;}
    .save-btn:hover{background:#e0b44f;}
    .save-msg{font-size:13px;color:var(--green);margin-left:12px;font-weight:600;}

    /* STAMPS */
    .stamps{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:8px 0 14px;}
    .stamp{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px dashed var(--border);background:rgba(255,255,255,.02);transition:all .25s;}
    .stamp.on{border-style:solid;border-color:var(--gold);background:var(--gold-dim);}
    .loy-count{text-align:center;font-family:var(--fh);font-size:18px;font-weight:700;color:var(--muted);letter-spacing:.04em;}
    .loy-count em{font-style:normal;color:var(--gold);}
    .reward-box{margin-top:14px;padding:16px;text-align:center;background:linear-gradient(135deg,rgba(212,168,71,.18),rgba(212,168,71,.06));border:1px solid var(--gold);border-radius:12px;}
    .reward-box .t{font-family:var(--fh);font-size:20px;font-weight:900;color:var(--gold);text-transform:uppercase;letter-spacing:.04em;}
    .reward-box .s{font-size:13px;color:var(--txt);margin-top:4px;}
    .reward-box a{display:inline-block;margin-top:12px;padding:10px 20px;background:var(--gold);color:#1a1710;border-radius:99px;text-decoration:none;font-family:var(--fh);font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:15px;}

    /* ORDERS */
    .order{border:1px solid var(--border);border-radius:14px;padding:15px 17px;margin-bottom:12px;display:block;text-decoration:none;color:inherit;transition:border-color .2s,background .2s;}
    .order:hover{border-color:var(--gold);background:rgba(212,168,71,.04);}
    .order-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px;}
    .order-num{font-family:var(--fh);font-size:19px;font-weight:900;color:var(--white);}
    .order-total{font-family:var(--fh);font-size:19px;font-weight:900;color:var(--gold);}
    .order-meta{font-size:12px;color:var(--muted);}
    .order-items{font-size:13px;color:var(--txt);margin-top:5px;line-height:1.4;}
    .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;font-family:var(--fh);}
    .badge.ok{background:rgba(34,197,94,.14);color:var(--green);border:1px solid rgba(34,197,94,.3);}
    .badge.loy{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,168,71,.3);margin-left:6px;}
    .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;line-height:1.6;}
    .loader-line{text-align:center;color:var(--muted);padding:20px;font-size:13px;}
  </style>
</head>
<body>

<header class="hdr">
  <div class="topbar">
    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="Rhodes">
      <span class="brand-txt">Rhodes<em>.</em></span>
    </a>
    <div class="spacer"></div>
    <a href="index.html" class="back-btn">← Volver al menú</a>
  </div>
</header>

<div class="page" id="page">
  <div class="loader-line">Cargando…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="loyalty.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",authDomain:"rhodes-burguers.firebaseapp.com",projectId:"rhodes-burguers",storageBucket:"rhodes-burguers.firebasestorage.app",messagingSenderId:"951646688091",appId:"1:951646688091:web:05db5fadb4150d1fa9c07e"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
db.settings({experimentalForceLongPolling:true,experimentalAutoDetectLongPolling:false});
if(window.rbLoyalty) rbLoyalty.init();

const $=s=>document.querySelector(s);
const money=n=>(Number(n)||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});

const GOOGLE_SVG=`<svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>`;

function fmtDate(iso){
  if(!iso) return '';
  const d=new Date(iso);
  if(isNaN(d)) return '';
  return d.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function statusLabel(s){
  const map={accepted:'Recibido',preparing:'En preparación',ready:'Listo',delivered:'Entregado',cancelled:'Cancelado'};
  return map[s]||s||'Recibido';
}

function loginScreen(){
  $('#page').innerHTML=`
    <div class="card">
      <div class="login-wrap">
        <img class="logo" src="images/logo.png" alt="">
        <h1>Mi Perfil</h1>
        <p>Iniciá sesión para ver tus sellos, completar tus datos<br>y revisar tus pedidos anteriores.</p>
        <button class="gbtn" id="btnLogin">${GOOGLE_SVG} Iniciar sesión con Google</button>
      </div>
    </div>`;
  $('#btnLogin').onclick=()=>rbLoyalty.login();
}

function stampsHTML(n){
  let h='<div class="stamps">';
  for(let i=0;i<10;i++) h+=`<div class="stamp ${i<n?'on':''}">${i<n?'🍔':''}</div>`;
  return h+'</div>';
}

function profileScreen(user,data){
  const d=data||{};
  const n=Math.min(10,Number(d.stamps||0));
  const ava=user.photoURL?`<img class="prof-ava" src="${user.photoURL}" referrerpolicy="no-referrer" alt="">`:'';
  $('#page').innerHTML=`
    <!-- DATOS -->
    <div class="card">
      <div class="prof-head">
        ${ava}
        <div>
          <div class="prof-name">${(d.name||user.displayName||'').toString()}</div>
          <div class="prof-email">${user.email||''}</div>
        </div>
        <button class="logout-btn" id="btnLogout">Cerrar sesión</button>
      </div>
      <div class="field">
        <label>Nombre y Apellido</label>
        <input id="inpName" type="text" value="${(d.name||user.displayName||'').replace(/"/g,'&quot;')}" placeholder="Tu nombre">
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input id="inpPhone" type="tel" value="${(d.phone||'').replace(/"/g,'&quot;')}" placeholder="Ej: 11 2345-6789">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" value="${user.email||''}" disabled>
      </div>
      <div style="display:flex;align-items:center">
        <button class="save-btn" id="btnSave">Guardar</button>
        <span class="save-msg" id="saveMsg"></span>
      </div>
    </div>

    <!-- SELLOS -->
    <div class="card">
      <div class="card-title">Mis <em>Sellos</em></div>
      ${stampsHTML(n)}
      <div class="loy-count">${d.rewardAvailable?'<em>¡10 de 10!</em> 🎉':`<em>${n}</em> de 10 sellos`}</div>
      ${d.rewardAvailable
        ? `<div class="reward-box"><div class="t">🎉 Tenés 10% OFF</div><div class="s">Se aplica en tu próximo pedido</div><a href="index.html">Pedir ahora</a></div>`
        : `<div class="loy-count" style="margin-top:10px;font-size:14px">Te faltan <em>${10-n}</em> para tu 10% de descuento 🍔</div>`}
    </div>

    <!-- PEDIDOS -->
    <div class="card">
      <div class="card-title">Mis <em>Pedidos</em></div>
      <div id="ordersBox"><div class="loader-line">Cargando pedidos…</div></div>
    </div>`;

  $('#btnLogout').onclick=()=>rbLoyalty.logout();
  $('#btnSave').onclick=async()=>{
    const btn=$('#btnSave'), msg=$('#saveMsg');
    btn.disabled=true; btn.textContent='Guardando…';
    try{
      await rbLoyalty.updateProfile({name:$('#inpName').value, phone:$('#inpPhone').value});
      // Guardar también para autocompletar el checkout
      if($('#inpName').value.trim()) localStorage.setItem('rb_user_name',$('#inpName').value.trim());
      if($('#inpPhone').value.trim()) localStorage.setItem('rb_user_phone',$('#inpPhone').value.trim());
      msg.textContent='✅ Guardado';
    }catch(e){ console.error(e); msg.textContent='❌ Error al guardar'; }
    btn.disabled=false; btn.textContent='Guardar';
    setTimeout(()=>{msg.textContent='';},2500);
  };

  loadOrders();
}

async function loadOrders(){
  const box=$('#ordersBox'); if(!box) return;
  try{
    const orders=await rbLoyalty.getOrders();
    if(!orders.length){
      box.innerHTML=`<div class="empty">Todavía no tenés pedidos registrados con tu cuenta.<br>Tus próximos pedidos van a aparecer acá. 🍔</div>`;
      return;
    }
    box.innerHTML=orders.map(o=>{
      const items=(o.items||[]).map(i=>`${i.qty||1}× ${i.name||''}`).join(' · ');
      const link=o.trackToken?`gracias.html?id=${o.id}&t=${o.trackToken}`:'#';
      return `<a class="order" href="${link}">
        <div class="order-top">
          <span class="order-num">#${o.orderNumber||'—'}</span>
          <span class="order-total">${money(o.total)}</span>
        </div>
        <div class="order-meta">${fmtDate(o.createdAt)} · <span class="badge ok">${statusLabel(o.status)}</span>${o.loyaltyApplied?'<span class="badge loy">10% sellos</span>':''}</div>
        ${items?`<div class="order-items">${items}</div>`:''}
      </a>`;
    }).join('');
  }catch(e){
    console.error(e);
    box.innerHTML=`<div class="empty">No se pudieron cargar los pedidos. Probá recargar la página.</div>`;
  }
}

let lastUid=undefined;
if(window.rbLoyalty){
  rbLoyalty.onChange((user,data)=>{
    if(!user){ lastUid=null; loginScreen(); return; }
    // Re-renderiza al cambiar de sesión o cuando llegan los datos
    if(user.uid!==lastUid || !document.getElementById('inpPhone')){
      lastUid=user.uid;
      profileScreen(user,data);
    }
  });
}
</script>
</body>
</html>
