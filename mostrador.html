<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mostrador • Rhodes Burgers</title>
  <link rel="icon" href="images/logo.png"/>
  <meta name="theme-color" content="#1C1810"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#625E52;
      --gold:#D4A847;--gold-dim:rgba(212,168,71,.12);--gold-border:rgba(212,168,71,.2);
      --bg:#1a1710;--bg2:#201d13;--card:#2a2619;--card2:#302c1e;
      --border:rgba(212,168,71,.13);--border2:rgba(212,168,71,.06);
      --txt:#F0EAE0;--muted:#7a7060;--white:#FAFAF8;
      --fh:'Barlow Condensed',sans-serif;--fb:'DM Sans',sans-serif;
      --green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;
      --danger:#ef4444;--success:#22c55e;--warn:#f97316;
      --ring:rgba(212,168,71,.13);
    }
    *{box-sizing:border-box;}
    html,body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--fb);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.02;mix-blend-mode:overlay;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

    /* HEADER */
    header{position:sticky;top:0;z-index:100;background:rgba(26,23,16,.97);border-bottom:1px solid var(--border);height:58px;backdrop-filter:blur(20px);}
    .topbar{max-width:1400px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:10px;height:100%;}
    .brand{display:flex;align-items:center;text-decoration:none;gap:9px;flex-shrink:0;}
    .brand img{width:30px;height:30px;border-radius:7px;object-fit:cover;}
    .brand-txt{font-family:var(--fh);font-weight:900;font-size:20px;color:var(--white);text-transform:uppercase;letter-spacing:.06em;line-height:1;}
    .brand-txt em{font-style:normal;color:var(--gold);}
    .spacer{flex:1;}
    .btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);padding:7px 13px;border-radius:8px;cursor:pointer;font-weight:600;text-decoration:none;color:var(--muted);font-size:13px;transition:all .2s;}
    .btn:hover{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border);}
    .btn.primary{background:var(--gold);color:#1a1710;border-color:var(--gold);font-family:var(--fh);font-size:16px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
    .btn.primary:hover{background:#e0b44f;}

    /* LAYOUT */
    .container{display:grid;grid-template-columns:1fr 480px;height:calc(100vh - 58px);position:relative;z-index:1;}

    /* MENU SECTION */
    .menu-section{padding:20px 24px;overflow-y:auto;}
    h1{font-family:var(--fh);font-size:30px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--white);margin:0 0 12px;}
    h2{font-family:var(--fh);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}

    /* PRODUCT CARD */
    .card{background:var(--card);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border);transition:all .2s;}
    .card:hover{border-color:var(--gold-border);transform:translateY(-1px);}
    .card img{width:100%;height:120px;object-fit:cover;}
    .content{padding:11px;display:flex;flex-direction:column;flex:1;}
    .content h3{margin:0 0 3px;font-family:var(--fh);font-size:16px;font-weight:800;color:var(--white);text-transform:uppercase;letter-spacing:.02em;}
    .row{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;}
    .price{font-family:var(--fh);font-weight:900;font-size:16px;color:var(--gold);}
    .addBtn{padding:6px 12px;font-size:12px;font-family:var(--fh);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}

    /* ASIDE / CARRITO */
    aside.side{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow:hidden;}

    .cart-header{padding:16px 18px;background:rgba(26,23,16,.9);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
    .cart-title{font-family:var(--fh);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--white);}
    #cartTotal{font-family:var(--fh);font-size:24px;font-weight:900;color:var(--gold);}

    #cartScrollArea{flex:1;min-height:0;overflow-y:auto;padding:14px;}
    #cartScrollArea::-webkit-scrollbar{width:4px;}
    #cartScrollArea::-webkit-scrollbar-track{background:transparent;}
    #cartScrollArea::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

    /* FORM AREA */
    .form-area{padding:16px 18px;background:rgba(32,29,19,.95);border-top:1px solid var(--border);overflow-y:auto;max-height:58vh;flex-shrink:0;}
    .form-area::-webkit-scrollbar{width:4px;}
    .form-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

    .form-grid{display:grid;gap:10px;}
    .field label{display:block;font-family:var(--fh);font-weight:700;margin-bottom:5px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
    .field input,.field select{width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--border);font-size:14px;background:rgba(255,255,255,.04);color:var(--txt);font-family:var(--fb);outline:none;transition:border-color .2s;}
    .field input:focus,.field select:focus{border-color:var(--gold);background:rgba(212,168,71,.04);}
    .field input::placeholder{color:var(--muted);}
    .field select option{background:#2a2619;color:var(--txt);}

    /* CART ITEM */
    .cart-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;gap:10px;transition:border-color .2s;}
    .cart-item:hover{border-color:var(--gold-border);}
    .cart-item-info{flex:1;}
    .cart-item-name{font-family:var(--fh);font-weight:800;font-size:15px;display:block;margin-bottom:4px;color:var(--white);text-transform:uppercase;letter-spacing:.02em;}
    .cart-item-desc{font-size:12px;color:var(--muted);line-height:1.4;}
    .cart-item-price{font-family:var(--fh);font-weight:900;font-size:15px;color:var(--gold);white-space:nowrap;text-align:right;}
    .cart-actions{margin-top:6px;display:flex;gap:10px;justify-content:flex-end;}
    .btn-icon{background:none;border:none;cursor:pointer;font-size:14px;opacity:.5;transition:opacity .2s;padding:2px;color:var(--txt);}
    .btn-icon:hover{opacity:1;}

    /* SLOT */
    .slot-row{display:flex;gap:8px;align-items:center;}
    .slot-display{flex:1;text-align:center;font-family:var(--fh);font-weight:900;font-size:20px;padding:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--gold);letter-spacing:.04em;transition:all .2s;}
    .arrow{width:38px;height:38px;display:grid;place-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;font-size:16px;cursor:pointer;user-select:none;color:var(--muted);transition:all .2s;}
    .arrow:hover{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold);}

    #btnCargarPedido{width:100%;margin-top:12px;padding:15px;font-size:18px;border-radius:11px;letter-spacing:.06em;}

    /* PAYMENT TOGGLE */
    .payment-status-toggle{display:flex;gap:8px;}
    .toggle-btn{flex:1;padding:11px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:10px;cursor:pointer;font-family:var(--fh);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.04em;transition:all .2s;opacity:.6;color:var(--muted);}
    .toggle-btn:hover{opacity:1;}
    .toggle-btn.paid.active{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:var(--green);opacity:1;box-shadow:0 0 12px rgba(34,197,94,.1);}
    .toggle-btn.pending.active{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.4);color:var(--orange);opacity:1;box-shadow:0 0 12px rgba(249,115,22,.1);}

    /* MODAL */
    .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px);}
    .modal{width:440px;max-width:95%;background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto;}
    .modal h3{font-family:var(--fh);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--white);margin:0 0 18px;}
    .modal::-webkit-scrollbar{width:4px;}
    .modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

    /* CHIPS */
    .chip-group{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
    .chip{display:inline-flex;align-items:center;gap:5px;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:99px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid var(--border);color:var(--muted);transition:all .15s;}
    .chip:has(input:checked){background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold);}

    /* QTY CONTROL */
    .qty-ctrl{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);padding:4px;border-radius:8px;border:1px solid var(--border);}
    .qtybtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.06);cursor:pointer;font-weight:700;color:var(--txt);transition:all .15s;}
    .qtybtn:hover{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold);}

    textarea{width:100%;min-height:70px;padding:10px;border-radius:9px;border:1px solid var(--border);font-family:var(--fb);resize:none;background:rgba(255,255,255,.04);color:var(--txt);font-size:13px;outline:none;}
    textarea:focus{border-color:var(--gold);}
    textarea::placeholder{color:var(--muted);}

    .modal .field label{color:var(--muted);font-size:11px;font-family:var(--fh);font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:6px;}

    /* UNIT PREVIEW */
    #unitPreview{font-family:var(--fh);font-weight:900;font-size:24px;color:var(--gold);}

    /* MISSING FRIES */
    .missing-fries-alert{color:var(--red);font-weight:700;font-size:11px;background:rgba(239,68,68,.1);padding:3px 7px;border-radius:4px;display:inline-block;margin-top:4px;border:1px solid rgba(239,68,68,.2);}

    /* MODAL BOTTOM */
    .modal-bottom{margin-top:18px;border-top:1px solid var(--border);padding-top:14px;display:flex;justify-content:space-between;align-items:center;}
    .modal-total-label{font-size:13px;color:var(--muted);}

    /* ROW IN MODAL */
    .modal .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid var(--border2);}
    .modal .row:last-of-type{border-bottom:none;}

    /* CLIENTE / SELLOS */
    #clienteResults{max-height:210px;overflow-y:auto;margin-top:4px;}
    .cli-result{padding:9px 11px;border:1px solid var(--border);border-radius:8px;margin-top:6px;cursor:pointer;background:rgba(255,255,255,.03);transition:all .15s;}
    .cli-result:hover{border-color:var(--gold-border);background:var(--gold-dim);}
    .cli-result b{color:var(--white);font-weight:600;}
    .cli-result small{display:block;color:var(--muted);font-size:11px;margin-top:2px;}
    .cli-st{color:var(--gold);font-size:11px;font-weight:700;}
    .cli-empty{padding:9px 4px;font-size:12px;color:var(--muted);}
    .cli-card{margin-top:8px;padding:11px 13px;border:1px solid var(--gold-border);border-radius:10px;background:var(--gold-dim);}
    .cli-card-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
    .cli-card-top strong{font-family:var(--fh);font-size:16px;color:var(--white);letter-spacing:.02em;}
    .cli-change{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;text-decoration:underline;padding:2px;}
    .cli-change:hover{color:var(--gold);}
    .cli-stamps{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--gold);margin-top:5px;letter-spacing:.03em;}
    .cli-reward{color:var(--green);}
    .cli-reward-toggle{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:13px;color:var(--txt);cursor:pointer;}
    .cli-hint{font-size:11.5px;color:var(--muted);margin-top:7px;}
    .cli-hint strong{color:var(--gold);}
    .cli-hint.ok{color:var(--green);font-weight:700;}

    @media(max-width:900px){
      .container{grid-template-columns:1fr;}
      aside.side{position:fixed;bottom:0;left:0;right:0;height:auto;max-height:50vh;z-index:50;}
    }
  </style>

  <script>
    (function checkAuth(){
      const TTL=20*60*60*1000,ok=localStorage.getItem('rb_admin_ok')==='true',ts=Number(localStorage.getItem('rb_admin_t')||0);
      if(!ok||(Date.now()-ts)>=TTL){localStorage.removeItem('rb_admin_ok');localStorage.removeItem('rb_admin_t');window.location.replace('login.html?next='+encodeURIComponent(location.pathname+location.search));}
      else localStorage.setItem('rb_admin_t',String(Date.now()));
    })();
  </script>
</head>
<body>

<header>
  <div class="topbar">
    <a class="brand" href="#">
      <img src="images/logo.png" alt="Rhodes">
      <span class="brand-txt">Rhodes<em>.</em></span>
    </a>
    <div class="spacer"></div>
    <a class="btn" href="pedido_local.html">📦 Pedidos</a>
    <a class="btn" href="salon.html">🍔 Salón en vivo</a>
    <a class="btn" href="finanzas.html">📈 Finanzas</a>
    <a class="btn" href="admin.html">⚙️ Admin</a>
    <span style="font-family:var(--fh);font-size:14px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-left:4px">Mostrador</span>
  </div>
</header>

<div class="container">

  <!-- MENU -->
  <section class="menu-section">
    <h1>Menú</h1>
    <div id="promosSection" style="display:none">
      <h2 style="color:var(--gold);border-color:rgba(212,168,71,.3)">🔥 Promos Activas</h2>
      <div id="promosGrid" class="grid"></div>
    </div>
    <h2>Hamburguesas</h2>
    <div id="burgersGrid" class="grid"></div>

    <h2 style="margin-top:28px">Sándwiches</h2>
    <div id="sandwichesGrid" class="grid"></div>

    <h2 style="margin-top:28px">Guarniciones</h2>
    <div id="sidesGrid" class="grid"></div>

    <h2 style="margin-top:28px">Bebidas</h2>
    <div id="drinksGrid" class="grid"></div>
  </section>

  <!-- CARRITO -->
  <aside class="side">
    <div class="cart-header">
      <span class="cart-title">Tu Pedido</span>
      <span id="cartTotal">$0</span>
    </div>

    <div id="cartScrollArea">
      <div id="cartItems" style="text-align:center;padding-top:36px;font-size:14px;color:var(--muted);font-family:var(--fh);letter-spacing:.06em;text-transform:uppercase">
        Carrito vacío.
      </div>
    </div>

    <div class="form-area">
      <div class="form-grid">
        <div class="field" id="clienteBox">
          <label>🍔 Cliente con sellos (opcional)</label>
          <input id="inpClienteSearch" type="text" placeholder="Buscar por nombre, email o teléfono…" autocomplete="off">
          <div id="clienteResults" style="display:none"></div>
          <div id="clienteSelected" style="display:none"></div>
        </div>
        <div class="field">
          <label>Nombre del Cliente</label>
          <input id="inpNombre" type="text" placeholder="Ej: Juan" autocomplete="off">
        </div>
        <div class="field">
          <label>Teléfono (Opcional)</label>
          <input id="inpTel" type="tel" placeholder="">
        </div>
        <div class="field">
          <label>Método de Pago</label>
          <select id="selPago">
            <option value="">(En caja / Sin especificar)</option>
            <option value="efectivo">Efectivo</option>
            <option value="mercado_pago">Mercado Pago</option>
            <option value="debito">Débito</option>
            <option value="transferencia">Transferencia</option>
          </select>
        </div>
        <div class="field">
          <label>Estado del Pago</label>
          <div class="payment-status-toggle">
            <button class="toggle-btn paid" id="btnPayPaid" onclick="setPaymentStatus(true)">✅ Pagado</button>
            <button class="toggle-btn pending active" id="btnPayPending" onclick="setPaymentStatus(false)">⏳ Pendiente</button>
          </div>
        </div>
        <div class="field">
          <label>Descuento (%)</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="inpDiscountPct" type="number" min="0" max="100" step="1" placeholder="0" style="width:80px;flex-shrink:0" oninput="renderCart()">
            <div id="discountPreview" style="flex:1;padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:rgba(34,197,94,.06);color:var(--green);font-family:var(--fh);font-size:15px;font-weight:700;text-align:center;min-height:42px;display:flex;align-items:center;justify-content:center">—</div>
          </div>
        </div>
        <div class="field">
          <label>Descripción del Descuento</label>
          <input id="inpDiscountDesc" type="text" placeholder="Ej: Empleado, Promo, Cupón...">
        </div>
          <div class="slot-row">
            <div class="arrow" id="slotPrev">◀</div>
            <div class="slot-display" id="slotLabel">--:--</div>
            <div class="arrow" id="slotNext">▶</div>
          </div>
          <div id="miniSlotSub" style="text-align:center;margin-top:5px;font-size:11px;color:var(--muted)">Seleccionado: —</div>
        </div>
      </div>

      <input id="manualTime" type="hidden">
      <button id="btnCargarPedido" class="btn primary">CONFIRMAR PEDIDO</button>
    </div>
  </aside>
</div>

<!-- MODAL PAPAS DE PROMO -->
<div class="overlay" id="promoPotatoOvl">
  <div class="modal">
    <h3 id="promoPotatoTitle">Elegí tus papas</h3>
    <div id="promoPotatoSub" style="font-size:12px;color:var(--muted);margin:-10px 0 14px"></div>
    <div id="promoPotatoSteps"></div>
    <div style="margin-top:18px;display:flex;gap:10px">
      <button class="btn" style="flex:1;justify-content:center" onclick="closePromoPotato()">Cancelar</button>
      <button class="btn primary" style="flex:1;justify-content:center" id="btnPromoPotatoConfirm">Agregar al pedido</button>
    </div>
  </div>
</div>

<!-- MODAL PERSONALIZAR -->
<div class="overlay" id="overlayCustomize">
  <div class="modal">
    <h3 id="modTitle">Personalizar</h3>

    <div class="field" id="sideTypeSection" style="display:none;margin-bottom:14px">
      <label style="margin-bottom:7px">Guarnición que acompaña</label>
      <div class="chip-group" id="sideTypeOptions">
        <label class="chip"><input type="radio" name="sideType" value="crinkles" onchange="toggleSeasoning()"> 🍟 Papas Crinkles</label>
        <label class="chip"><input type="radio" name="sideType" value="rejillas" onchange="toggleSeasoning()"> 🍟 Papas Rejillas</label>
        <label class="chip"><input type="radio" name="sideType" value="aros" onchange="toggleSeasoning()"> 🧅 Aros de Cebolla <span id="lblPriceOnion" style="font-size:11px;color:var(--gold)"></span></label>
      </div>
    </div>

    <div class="field" id="seasoningSection" style="display:none;">
      <label style="margin-bottom:7px" id="lblSeasoning">Elegí la preparación</label>
      <div class="chip-group" id="friesOptions"></div>
    </div>

    <div id="rowPatties" class="row" style="display:none;margin-top:16px;">
      <div style="font-size:14px"><strong style="color:var(--white)">Carne extra</strong> <span id="lblPricePatty" style="color:var(--muted);font-weight:400;font-size:12px"></span></div>
      <div class="qty-ctrl">
        <button id="patDec" class="qtybtn">-</button>
        <span id="patVal" style="font-weight:900;min-width:18px;text-align:center;color:var(--gold);font-family:var(--fh);font-size:16px">0</span>
        <button id="patInc" class="qtybtn">+</button>
      </div>
    </div>

    <div id="rowCheddar" class="row" style="display:none;margin-top:8px;">
      <div style="font-size:14px"><strong style="color:var(--white)">Cheddar extra</strong> <span id="lblPriceCheddar" style="color:var(--muted);font-weight:400;font-size:12px"></span></div>
      <div class="qty-ctrl">
        <button id="cheDec" class="qtybtn">-</button>
        <span id="cheVal" style="font-weight:900;min-width:18px;text-align:center;color:var(--gold);font-family:var(--fh);font-size:16px">0</span>
        <button id="cheInc" class="qtybtn">+</button>
      </div>
    </div>

    <div id="rowBacon" class="row" style="display:none;margin-top:8px;">

      <div class="qty-ctrl">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",authDomain:"rhodes-burguers.firebaseapp.com",projectId:"rhodes-burguers",storageBucket:"rhodes-burguers.firebasestorage.app",messagingSenderId:"951646688091",appId:"1:951646688091:web:05db5fadb4150d1fa9c07e"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
db.settings({experimentalForceLongPolling:true,experimentalAutoDetectLongPolling:false});
db.enablePersistence({synchronizeTabs:true}).catch(err=>{console.log("No se pudo activar el caché offline: ",err);});

const $=s=>document.querySelector(s);
const money=n=>(Number(n)||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});
const FALLBACK_IMG="images/logo.png";

let EXTRA_PRICE_PATTY=2500,EXTRA_PRICE_CHEDDAR=300,EXTRA_PRICE_BACON=1200,EXTRA_PRICE_ONION=1600;

db.collection("config").doc("prices").onSnapshot(doc=>{
  if(doc.exists){const d=doc.data();if(d.patty)EXTRA_PRICE_PATTY=Number(d.patty);if(d.cheddar)EXTRA_PRICE_CHEDDAR=Number(d.cheddar);if(d.bacon)EXTRA_PRICE_BACON=Number(d.bacon);if(d.onionRings)EXTRA_PRICE_ONION=Number(d.onionRings);
  if($("#lblPricePatty"))$("#lblPricePatty").textContent=`(+$${EXTRA_PRICE_PATTY})`;if($("#lblPriceCheddar"))$("#lblPriceCheddar").textContent=`(+$${EXTRA_PRICE_CHEDDAR})`;if($("#lblPriceBacon"))$("#lblPriceBacon").textContent=`(+$${EXTRA_PRICE_BACON})`;if($("#lblPriceOnion"))$("#lblPriceOnion").textContent=`(+$${EXTRA_PRICE_ONION})`;}
});

let isOrderPaid=false;
window.setPaymentStatus=function(isPaid){isOrderPaid=isPaid;const bp=document.getElementById("btnPayPaid"),bq=document.getElementById("btnPayPending");if(isPaid){bp.classList.add("active");bq.classList.remove("active");}else{bp.classList.remove("active");bq.classList.add("active");}};

let PRODUCTS={burgers:[],sandwiches:[],drinks:[],sides:[]};
let MENU_ORDER={};
let availability=new Map();
let GLOBAL_SIDES={con_sazon:true,con_sazon_bacon:true,con_sal:true,sin_sal:true};
let SIDE_TYPES_CFG={};

db.collection("config").doc("sides").onSnapshot(doc=>{if(doc.exists){const d=doc.data();GLOBAL_SIDES={con_sazon:d.con_sazon!==false,con_sazon_bacon:d.con_sazon_bacon!==false,con_sal:d.con_sal!==false,sin_sal:d.sin_sal!==false};}if($("#overlayCustomize")?.style.display==="flex"&&currentItem)window.buildFriesChipsMostrador(currentItem);});

function isPapasSide(item){if(!item)return false;const cat=(item.category||"").toLowerCase();if(cat.includes("burger")||cat.includes("hamburguesa")||cat.includes("sandwich")||cat.includes("sándwich"))return false;const n=((item.name||"")+" "+(item.id||"")).toLowerCase();return n.includes("papa")||n.includes("fritas")||n.includes("crinkle")||n.includes("rejilla");}
const SIDES_MAP_LABELS={con_sazon:"Sazón Queso",con_sazon_bacon:"Sazón Bacon",con_sal:"Con Sal",sin_sal:"Sin Sal"};
const SEASON_MAP={con_sazon:"Sazón Queso",con_sazon_bacon:"Sazón Bacon",con_sal:"Con sal",sin_sal:"Sin sal"};
db.collection("config").doc("menuOrder").onSnapshot(snap=>{MENU_ORDER=snap.exists?snap.data():{};mountMenu();});

const isAvailable=id=>availability.get(id)!==false;

db.collection("products").onSnapshot(snap=>{
  availability.clear();PRODUCTS={burgers:[],sandwiches:[],drinks:[],sides:[]};
  snap.forEach(doc=>{const d=doc.data();const item={id:doc.id,name:d.name,price:d.price,img:d.img||FALLBACK_IMG,description:d.description||"",category:d.category,kind:d.kind||"",allowedExtras:d.allowedExtras||{},potatoOptions:d.potatoOptions||null};if(d.available===false)availability.set(doc.id,false);const cat=(d.category||"").toLowerCase();if(cat.includes("burger")||cat.includes("hamburguesa"))PRODUCTS.burgers.push(item);else if(cat.includes("sandwich")||cat.includes("sándwich"))PRODUCTS.sandwiches.push(item);else if(cat.includes("drink")||cat.includes("bebida"))PRODUCTS.drinks.push(item);else if(cat.includes("side")||cat.includes("guarnicion")||cat.includes("papas"))PRODUCTS.sides.push(item);});
  mountMenu();
});

function orderedList(category,arr){const order=MENU_ORDER[category]||[];const map=new Map(order.map((id,i)=>[id,i]));return[...arr].sort((a,b)=>{const A=map.has(a.id)?map.get(a.id):9999,B=map.has(b.id)?map.get(b.id):9999;return A-B;});}

const elBurgersGrid=$("#burgersGrid"),elSandwichesGrid=$("#sandwichesGrid"),elDrinksGrid=$("#drinksGrid"),elSidesGrid=$("#sidesGrid");

function renderCard(item){
  const ok=isAvailable(item.id);
  const card=document.createElement("div");card.className="card";
  if(!ok)card.style.opacity=".4";
  card.innerHTML=`<img src="${item.img}" onerror="this.src='${FALLBACK_IMG}'"><div class="content"><h3>${item.name}</h3>${item.description?`<div style="font-size:12px;color:var(--muted);margin-bottom:auto">${item.description}</div>`:"<div style='margin-bottom:auto'></div>"}<div class="row"><span class="price">${money(item.price)}</span><button class="btn addBtn" ${ok?"":"disabled"}>+ Agregar</button></div></div>`;
  const btn=card.querySelector(".addBtn");
  const cat=(item.category||"").toLowerCase();
  if(cat.includes("bebida")||cat.includes("drink")){btn.onclick=()=>{if(!cart.drink[item.id])cart.drink[item.id]={qty:0,item};cart.drink[item.id].qty++;renderCart();};}
  else{btn.onclick=()=>openCustomize(item);}
  return card;
}

function mountMenu(){
  elBurgersGrid.innerHTML="";elSandwichesGrid.innerHTML="";elDrinksGrid.innerHTML="";elSidesGrid.innerHTML="";
  orderedList("hamburguesas",PRODUCTS.burgers).forEach(x=>elBurgersGrid.appendChild(renderCard(x)));
  orderedList("sandwiches",PRODUCTS.sandwiches).forEach(x=>elSandwichesGrid.appendChild(renderCard(x)));
  orderedList("guarniciones",PRODUCTS.sides).forEach(x=>elSidesGrid.appendChild(renderCard(x)));
  orderedList("bebidas",PRODUCTS.drinks).forEach(x=>elDrinksGrid.appendChild(renderCard(x)));
  if(PRODUCTS.sandwiches.length===0){elSandwichesGrid.style.display='none';elSandwichesGrid.previousElementSibling.style.display='none';}
  else{elSandwichesGrid.style.display='grid';elSandwichesGrid.previousElementSibling.style.display='block';}
}

let cart={burger:{},drink:{},side:{}};

function renderCart(){
  let html="",subtotal=0;
  const wrap=$("#cartItems"),totalEl=$("#cartTotal");
  for(const id in cart.burger){const b=cart.burger[id];let unit=b.item.price+b.extras.patty*EXTRA_PRICE_PATTY+b.extras.cheddar*EXTRA_PRICE_CHEDDAR+(b.extras.bacon||0)*EXTRA_PRICE_BACON;if(b.sideType==='aros')unit+=EXTRA_PRICE_ONION;subtotal+=unit*b.qty;
  const extras=[];
  if(b.isPromo&&b.comboItems?.length){
    b.comboItems.forEach(i=>extras.push(`${i.qty}× ${i.name}`));
  } else {
    if(b.friesRaw||b.fries)extras.push(`🍟 ${b.fries}`);else if(!b.isPromo)extras.push(`<div class="missing-fries-alert">⚠️ FALTAN ELEGIR PAPAS</div>`);
    if(b.extras.patty)extras.push("+"+b.extras.patty+" carne");
    if(b.extras.cheddar)extras.push("+"+b.extras.cheddar+" cheddar");
    if(b.extras.bacon)extras.push("+"+b.extras.bacon+" bacon");
    if(b.notes&&!b.isPromo)extras.push("📝 "+b.notes);
  }
  const promoBadge=b.isPromo?` <span style="background:var(--gold);color:#1a1710;font-family:var(--fh);font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:99px">🔥</span>`:'';
  html+=`<div class="cart-item"><div class="cart-item-info"><span class="cart-item-name">${b.qty}× ${b.item.name}${promoBadge}</span><div class="cart-item-desc">${extras.join(" · ")}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end"><span class="cart-item-price">${money(unit*b.qty)}</span><div class="cart-actions">${b.isPromo?'':'<button class="btn-icon" onclick="editBurger(\''+id+'\')" title="Editar">✏️</button>'}<button class="btn-icon" onclick="removeFromCart('${id}','burger')" style="color:var(--red)" title="Eliminar">✕</button></div></div></div>`;}
  for(const id in cart.side){const s=cart.side[id];subtotal+=s.item.price*s.qty;const extras=[];const needsPrep=isPapasSide(s.item);if(needsPrep){if(s.friesRaw||s.fries)extras.push(`🍟 ${s.fries}`);else extras.push(`<div class="missing-fries-alert">⚠️ FALTAN ELEGIR PREPARACIÓN</div>`);}if(s.notes)extras.push("📝 "+s.notes);html+=`<div class="cart-item"><div class="cart-item-info"><span class="cart-item-name">${s.qty}× ${s.item.name}</span><div class="cart-item-desc">${extras.join(" ")}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end"><span class="cart-item-price">${money(s.item.price*s.qty)}</span><div class="cart-actions"><button class="btn-icon" onclick="editSide('${id}')" title="Editar">✏️</button><button class="btn-icon" onclick="removeFromCart('${id}','side')" style="color:var(--red)" title="Eliminar">✕</button></div></div></div>`;}
  for(const id in cart.drink){const d=cart.drink[id];subtotal+=d.item.price*d.qty;html+=`<div class="cart-item"><div class="cart-item-info"><span class="cart-item-name">${d.qty}× ${d.item.name}</span><div class="cart-item-desc" style="color:var(--blue)">🥤 Bebida</div></div><div style="display:flex;flex-direction:column;align-items:flex-end"><span class="cart-item-price">${money(d.item.price*d.qty)}</span><div class="cart-actions"><button class="btn-icon" onclick="removeFromCart('${id}','drink')" style="color:var(--red)">✕</button></div></div></div>`;}

  // Descuento
  const pct = Math.max(0, Math.min(100, Number(document.getElementById('inpDiscountPct')?.value)||0));
  const discountAmt = Math.round(subtotal * pct / 100);
  const finalTotal = subtotal - discountAmt;

  if(pct > 0 && subtotal > 0){
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-top:4px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:9px;font-family:var(--fh);font-size:15px;font-weight:800;color:var(--green)">
      <span>🏷️ Descuento ${pct}%</span><span>-${money(discountAmt)}</span>
    </div>`;
  }

  // Preview descuento
  const dp = document.getElementById('discountPreview');
  if(dp) dp.textContent = pct > 0 && subtotal > 0 ? `-${money(discountAmt)}` : '—';

  wrap.innerHTML=html||`<span style="display:block;text-align:center;padding-top:28px;font-size:13px;color:var(--muted);font-family:var(--fh);text-transform:uppercase;letter-spacing:.06em">Carrito vacío.</span>`;
  totalEl.textContent=money(finalTotal);
  if(window.updateCliStampHint)window.updateCliStampHint(subtotal);
}

let PROMOS_MOSTRADOR=[];

db.collection('promos').where('active','==',true).onSnapshot(snap=>{
  const now=new Date();
  PROMOS_MOSTRADOR=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>{
    const from=p.from?.toDate?.()||new Date(0),to=p.to?.toDate?.()||new Date(0);
    return now>=from&&now<=to;
  });
  renderPromosMostrador();
});

function renderPromosMostrador(){
  const sec=document.getElementById('promosSection'),grid=document.getElementById('promosGrid');
  if(!sec||!grid)return;
  if(!PROMOS_MOSTRADOR.length){sec.style.display='none';return;}
  sec.style.display='block';
  grid.innerHTML=PROMOS_MOSTRADOR.map(p=>`
    <div class="card" style="position:relative;display:block;aspect-ratio:3/4;border-color:rgba(212,168,71,.4);overflow:hidden;cursor:pointer" onclick="addPromoMostrador('${p.id}')">
      <div style="position:absolute;top:10px;left:10px;z-index:2;background:var(--gold);color:#1a1710;font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:99px">🔥 Promo</div>
      <img src="${p.img||'images/logo.png'}" onerror="this.src='images/logo.png'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(26,23,16,.97) 0%,rgba(26,23,16,.65) 40%,rgba(26,23,16,.1) 70%,transparent 100%)"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;z-index:3;padding:12px">
        <div style="font-family:var(--fh);font-size:18px;font-weight:900;text-transform:uppercase;color:var(--white);letter-spacing:.02em;line-height:1;margin-bottom:4px">${p.name}</div>
        ${p.description?`<div style="font-size:11px;color:rgba(240,234,224,.6);margin-bottom:6px;line-height:1.3">${p.description}</div>`:''}
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-family:var(--fh);font-size:16px;font-weight:800;color:var(--gold)">$${(p.price||0).toLocaleString('es-AR')}</div>
          ${p.originalPrice?`<div style="font-size:12px;color:var(--muted);text-decoration:line-through">$${p.originalPrice.toLocaleString('es-AR')}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button onclick="event.stopPropagation();addPromoMostrador('${p.id}')" style="width:36px;height:36px;border-radius:9px;border:none;background:var(--gold);color:#1a1710;font-family:var(--fh);font-size:22px;font-weight:700;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">+</button>
        </div>
      </div>
    </div>`).join('');
}

db.collection('config').doc('sideTypes').onSnapshot(snap=>{
  const d=snap.exists?snap.data():{};
  SIDE_TYPES_CFG=d;
  // Rebuild side type chips in modal
  const containers=document.querySelectorAll('#sideTypeOptions,#sideTypeSection .chip-group');
  containers.forEach(chips=>{
    if(!chips) return;
    chips.innerHTML='';
    const types=[
        {key:'crinkles',label:'🍟 Papas Crinkles'},
        {key:'rejillas',label:'🍟 Papas Rejillas'},
        {key:'aros',    label:'🧅 Aros de Cebolla'},
    ];
    types.forEach(t=>{
        if(d[t.key]===false) return;
        const lbl=document.createElement('label');
        lbl.className='chip';
        const extra=t.key==='aros'?`<span id="lblPriceOnion" style="font-size:11px;color:var(--gold)"></span>`:'';
        lbl.innerHTML=`<input type="radio" name="sideType" value="${t.key}" onchange="window.toggleSeasoning()"> ${t.label}${extra}`;
        chips.appendChild(lbl);
    });
  });
},()=>{});

function _pushPromoMostradorToCart(p, potatoSelections){
  const comboDesc=p.type==='combo'&&p.items?.length
    ? p.items.map(i=>`${i.qty}× ${i.name}`).join(', ')
    : (p.description||'');
  const friesStr = potatoSelections&&potatoSelections.length
    ? potatoSelections.map((s,i)=>`#${i+1} ${s.label}`).join(' · ')
    : null;
  cart.burger['promo_'+p.id+'_'+Date.now()]={
    item:{id:p.id,name:p.name,price:p.price,img:p.img,category:'promos'},
    qty:1,sideType:null,fries:friesStr,friesRaw:null,
    extras:{patty:0,cheddar:0,bacon:0},
    notes:comboDesc,
    isPromo:true,
    comboItems:p.items||[],
    potatoSelections:potatoSelections||null
  };
  renderCart();
}

window.addPromoMostrador=function(id){
  const p=PROMOS_MOSTRADOR.find(x=>x.id===id);if(!p)return;
  if(p.askPotato && Number(p.potatoCount||0)>0){
    openPromoPotato(p);
    return;
  }
  _pushPromoMostradorToCart(p,null);
};

let _PROMO_POTATO_CTX=null;
window.openPromoPotato=function(p){
  _PROMO_POTATO_CTX={promo:p,count:Math.max(1,Number(p.potatoCount||1))};
  document.getElementById('promoPotatoTitle').textContent=p.name;
  document.getElementById('promoPotatoSub').textContent=
    `Elegí ${_PROMO_POTATO_CTX.count} ${_PROMO_POTATO_CTX.count===1?'porción':'porciones'} de papas`;

  const allTypes=[
    {key:'crinkles', label:'🍟 Papas Crinkles', hasPrep:true},
    {key:'rejillas', label:'🍟 Papas Rejillas', hasPrep:true},
    {key:'aros',     label:'🧅 Aros de Cebolla',hasPrep:false},
  ].filter(t => SIDE_TYPES_CFG[t.key] !== false);

  const prepMap={con_sazon:'Sazón Queso', con_sazon_bacon:'Sazón Bacon', con_sal:'Con Sal', sin_sal:'Sin Sal'};
  const allPreps=Object.entries(prepMap)
    .filter(([k]) => GLOBAL_SIDES[k] !== false)
    .map(([k,label]) => ({key:k, label}));

  const steps=document.getElementById('promoPotatoSteps');
  let html='';
  for(let i=0; i<_PROMO_POTATO_CTX.count; i++){
    const typesHtml=allTypes.map(t =>
      `<label class="chip"><input type="radio" name="pp_type_${i}" value="${t.key}" data-label="${t.label.replace(/"/g,'&quot;')}" data-prep="${t.hasPrep?1:0}" onchange="_ppToggle(${i})"> ${t.label}</label>`
    ).join('');
    const prepsHtml=allPreps.map(pr =>
      `<label class="chip"><input type="radio" name="pp_prep_${i}" value="${pr.key}" data-label="${pr.label}"> 🍟 ${pr.label}</label>`
    ).join('');
    html += `
      <div style="border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px;background:rgba(212,168,71,.03)">
        <div style="font-family:var(--fh);font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Porción #${i+1}</div>
        <div style="font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Guarnición que acompaña</div>
        <div class="chip-group">${typesHtml}</div>
        <div data-pi="${i}" data-role="prep" style="display:none;margin-top:10px">
          <div style="font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Preparación</div>
          <div class="chip-group">${prepsHtml}</div>
        </div>
      </div>`;
  }
  steps.innerHTML=html;
  document.getElementById('promoPotatoOvl').style.display='flex';
};

window._ppToggle=function(i){
  const sel=document.querySelector(`input[name="pp_type_${i}"]:checked`);
  const prepBlock=document.querySelector(`[data-pi="${i}"][data-role="prep"]`);
  if(!sel||!prepBlock)return;
  if(sel.dataset.prep==='1'){
    prepBlock.style.display='block';
  } else {
    prepBlock.style.display='none';
    document.querySelectorAll(`input[name="pp_prep_${i}"]`).forEach(x=>x.checked=false);
  }
};

window.closePromoPotato=function(){
  document.getElementById('promoPotatoOvl').style.display='none';
  _PROMO_POTATO_CTX=null;
};

document.getElementById('promoPotatoOvl').addEventListener('click',e=>{
  if(e.target.id==='promoPotatoOvl')closePromoPotato();
});

document.getElementById('btnPromoPotatoConfirm').onclick=()=>{
  if(!_PROMO_POTATO_CTX)return;
  const sels=[];
  for(let i=0;i<_PROMO_POTATO_CTX.count;i++){
    const tEl=document.querySelector(`input[name="pp_type_${i}"]:checked`);
    if(!tEl){alert(`Elegí tipo de papas para la porción #${i+1}`);return;}
    const needsPrep=tEl.dataset.prep==='1';
    let prepLabel='';
    if(needsPrep){
      const pEl=document.querySelector(`input[name="pp_prep_${i}"]:checked`);
      if(!pEl){alert(`Elegí preparación para la porción #${i+1}`);return;}
      prepLabel=pEl.dataset.label;
    }
    sels.push({
      type:tEl.value,typeLabel:tEl.dataset.label,
      prep:needsPrep?document.querySelector(`input[name="pp_prep_${i}"]:checked`).value:null,
      prepLabel,
      label: needsPrep ? `${tEl.dataset.label} (${prepLabel})` : tEl.dataset.label
    });
  }
  const p=_PROMO_POTATO_CTX.promo;
  closePromoPotato();
  _pushPromoMostradorToCart(p,sels);
};

let currentItem=null;

window.buildFriesChipsMostrador=function(item,preselectedKey){
  const fc=$("#friesOptions");if(!fc||!item)return;
  const prev=preselectedKey!==undefined?preselectedKey:(document.querySelector('input[name="fries"]:checked')?.value||'');
  fc.innerHTML='';
  const pOpts=item.potatoOptions||{};
  const useGlobal=!pOpts.sazon&&!pOpts.sazonBacon&&!pOpts.sal&&!pOpts.sinSal;
  for(const[key,label]of Object.entries(SIDES_MAP_LABELS)){

/* SLOTS */
const SLOT_START="19:15",SLOT_END="23:50",SLOT_INTERVAL_MIN=15,SLOT_INTERVAL_LATE=10,GRAMOS_POR_BLOQUE=1500;
function parseHHMM(str){const[h,m]=str.split(":").map(Number);const now=new Date();return new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m);}
function formatHHMM(d){return d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",hour12:false});}
function slotKey(d){const y=d.getFullYear(),M=String(d.getMonth()+1).padStart(2,"0"),D=String(d.getDate()).padStart(2,"0"),H=String(d.getHours()).padStart(2,"0"),m=String(d.getMinutes()).padStart(2,"0");return`${y}${M}${D}_${H}${m}`;}
let slotObjects=[],slotSubs=[],currentSlotIndex=0;

function loadSlotsMostrador(){
  slotSubs.forEach(u=>{try{u();}catch{}});slotSubs=[];
  const start=parseHHMM(SLOT_START),end=parseHHMM(SLOT_END),arr=[];let cur=new Date(start);
  while(cur<=end){arr.push(new Date(cur));const iv=cur.getHours()>=23?SLOT_INTERVAL_LATE:SLOT_INTERVAL_MIN;cur=new Date(cur.getTime()+iv*60000);}
  slotObjects=arr.map(d=>({date:d,key:slotKey(d),gramsUsed:0,full:false}));
  $("#slotLabel").textContent="Cargando...";
  updateRealTimeSlot();
  slotObjects.forEach(s=>{const ref=db.collection("slots_grams").doc(s.key);const unsub=ref.onSnapshot(doc=>{if(!doc.exists){ref.set({gramsUsed:0},{merge:true});}const d=doc.data()||{};s.gramsUsed=Number(d.gramsUsed||0);s.full=s.gramsUsed>=GRAMOS_POR_BLOQUE;updateRealTimeSlot();});slotSubs.push(unsub);});
}

function updateRealTimeSlot(){
  const now=new Date(),minutes=now.getMinutes(),quarter=Math.floor(minutes/15)*15;
  const baseTime=new Date(now);baseTime.setMinutes(quarter);baseTime.setSeconds(0);baseTime.setMilliseconds(0);
  const cutoff=new Date(baseTime.getTime()+30*60000);
  let futureIdx=slotObjects.findIndex(s=>s.date.getTime()>=cutoff.getTime()&&!s.full);
  if(futureIdx===-1){if(now<slotObjects[0].date)futureIdx=0;else futureIdx=slotObjects.length-1;}
  currentSlotIndex=futureIdx;renderSlotMostrador();
}
setInterval(updateRealTimeSlot,10000);

function renderSlotMostrador(){
  if(slotObjects.length===0){$("#slotLabel").textContent="Cerrado";return;}
  if(currentSlotIndex<0)currentSlotIndex=0;if(currentSlotIndex>=slotObjects.length)currentSlotIndex=slotObjects.length-1;
  const s=slotObjects[currentSlotIndex],pretty=formatHHMM(s.date);
  $("#slotLabel").textContent=pretty;
  if(s.full){$("#slotLabel").style.background="rgba(239,68,68,.1)";$("#slotLabel").style.borderColor="rgba(239,68,68,.3)";$("#slotLabel").style.color="var(--red)";}
  else{$("#slotLabel").style.background="rgba(255,255,255,.04)";$("#slotLabel").style.borderColor="var(--border)";$("#slotLabel").style.color="var(--gold)";}
  window.selectedSlot={key:s.key,pretty,iso:s.date.toISOString(),full:s.full};
  $("#miniSlotSub").textContent="Seleccionado: "+pretty;
  $("#slotPrev").classList.toggle("disabled",currentSlotIndex===0);
  $("#slotNext").classList.toggle("disabled",currentSlotIndex===slotObjects.length-1);
}

$("#slotPrev").onclick=()=>{if(currentSlotIndex>0){currentSlotIndex--;renderSlotMostrador();}};
$("#slotNext").onclick=()=>{if(currentSlotIndex<slotObjects.length-1){currentSlotIndex++;renderSlotMostrador();}};
window.addEventListener("DOMContentLoaded",loadSlotsMostrador);

async function sendToFirestore(){
  const btn=$("#btnCargarPedido"),nombre=$("#inpNombre").value.trim();
  if(!nombre){alert("⚠️ Faltó el nombre del cliente.");$("#inpNombre").focus();return;}
  let pago=$("#selPago").value.trim();if(!pago)pago="mostrador_sin_especificar";
  let slot=window.selectedSlot;const manual=$("#manualTime").value;
  if(manual){const now=new Date();slot={pretty:manual,iso:new Date(now.getFullYear(),now.getMonth(),now.getDate(),manual.split(":")[0],manual.split(":")[1]).toISOString()};}
  if(!slot){alert("Elegí un horario");return;}
  for(const id in cart.burger){const burger=cart.burger[id];if(burger.isPromo)continue;const name=burger.item.name.toLowerCase(),cat=(burger.item.category||"").toLowerCase();const isSimple=!name.includes("doble")&&!name.includes("pollo")&&!cat.includes("sandwich")&&!cat.includes("sándwich");if(!isSimple&&!burger.friesRaw){alert(`⚠️ ATENCIÓN:\n\nEl producto "${burger.item.name}" no tiene guarnición seleccionada.\n\nPor favor, tocá el lápiz ✏️ para editarla.`);return;}}
  for(const id in cart.side){const side=cart.side[id];if(isPapasSide(side.item)&&!side.friesRaw){alert(`⚠️ ATENCIÓN:\n\nLa guarnición "${side.item.name}" no tiene preparación seleccionada.\n\nPor favor, tocá el lápiz ✏️ para editarla.`);return;}}
  if(Object.keys(cart.burger).length===0&&Object.keys(cart.drink).length===0&&Object.keys(cart.side).length===0){alert("El carrito está vacío");return;}
  if(btn.disabled)return;btn.disabled=true;const originalText=btn.textContent;btn.textContent="Procesando...";
  try{
    const items=[];let rawTotal=0;
    for(const id in cart.burger){const b=cart.burger[id];let unit=b.item.price+b.extras.patty*EXTRA_PRICE_PATTY+b.extras.cheddar*EXTRA_PRICE_CHEDDAR+(b.extras.bacon||0)*EXTRA_PRICE_BACON;if(b.sideType==='aros')unit+=EXTRA_PRICE_ONION;rawTotal+=unit*b.qty;const cat=(b.item.category||"").toLowerCase();const itemType=(cat.includes("sandwich")||cat.includes("sándwich"))?"sandwich":"burger";items.push({type:itemType,id:b.item.id,name:b.item.name,qty:b.qty,quantity:b.qty,price:b.item.price,category:b.item.category,sideType:b.sideType,fries:b.fries,friesRaw:b.friesRaw,extras:b.extras,notes:b.notes||""});}
    for(const id in cart.drink){const d=cart.drink[id];rawTotal+=d.item.price*d.qty;items.push({type:"drink",id:d.item.id,name:d.item.name,qty:d.qty,quantity:d.qty,price:d.item.price,category:d.item.category});}
    for(const id in cart.side){const s=cart.side[id];rawTotal+=s.item.price*s.qty;items.push({type:"side",id:s.item.id,name:s.item.name,qty:s.qty,quantity:s.qty,price:s.item.price,category:s.item.category,fries:s.fries,friesRaw:s.friesRaw,notes:s.notes||""});}
    const refCounters=db.collection("config").doc("counters");
    const orderNumber=await db.runTransaction(async tx=>{const snap=await tx.get(refCounters);const cur=snap.exists?Number(snap.data().orderNumber||0):0;const nxt=cur+1;tx.set(refCounters,{orderNumber:nxt},{merge:true});return nxt;});
    const payStatusFinal=isOrderPaid?'paid':'pending_payment';
    const now=new Date(),offset=now.getTimezoneOffset()*60000,localDate=new Date(now.getTime()-offset),createdAtLocal=localDate.toISOString().slice(0,-1);
    const pct = Math.max(0, Math.min(100, Number(document.getElementById('inpDiscountPct')?.value)||0));
    const discountAmt = Math.round(rawTotal * pct / 100);
    const finalTotal = rawTotal - discountAmt;
    const discountDesc = document.getElementById('inpDiscountDesc')?.value.trim() || (pct > 0 ? `Descuento ${pct}%` : '');

    // Sellos: ¿hay cliente seleccionado? ¿canjea el 10%? ¿suma sello? (mínimo sobre el subtotal de comida = rawTotal)
    const usedReward = !!(selectedCustomer && loyaltyUseReward && selectedCustomer.rewardAvailable);
    const willStamp  = !!(selectedCustomer && !usedReward && rawTotal >= MIN_FOR_STAMP);

    const order={orderNumber,number:orderNumber,nombre,telefono:$("#inpTel").value.trim(),entrega:"take_away",pago,notes:"",pickup_slot:slot.pretty,pickup_time:slot.iso,status:'accepted',payment_status:payStatusFinal,items,total:finalTotal,rawTotal,discount:discountAmt,discountPct:pct,coupon:discountDesc,customerUid:selectedCustomer?selectedCustomer.uid:'',loyaltyApplied:usedReward,loyaltyPercent:usedReward?10:0,loyaltyStamped:willStamp,source:"mostrador",createdAt:createdAtLocal,createdAt_server:firebase.firestore.FieldValue.serverTimestamp()};
    await db.collection("orders").doc().set(order);
    // Aplicar el sello (o canjear el premio) al cliente registrado
    if(selectedCustomer){
      try{ await applyStampToCustomer(selectedCustomer.uid, usedReward, rawTotal); }catch(e){ console.error('sellos', e); }
    }
    alert(`✅ Pedido cargado: #${orderNumber}`);
    cart={burger:{},drink:{},side:{}};renderCart();$("#inpNombre").value="";$("#selPago").value="";$("#manualTime").value="";if(document.getElementById('inpDiscountPct')){document.getElementById('inpDiscountPct').value="";document.getElementById('inpDiscountPct').disabled=false;}if(document.getElementById('inpDiscountDesc')){document.getElementById('inpDiscountDesc').value="";document.getElementById('inpDiscountDesc').disabled=false;}setPaymentStatus(false);updateRealTimeSlot();
    // Limpiar selección de cliente y refrescar caché de sellos para el próximo pedido
    selectedCustomer=null;loyaltyUseReward=false;CUSTOMERS=null;renderClienteSelected();
    if($("#inpClienteSearch"))$("#inpClienteSearch").value="";
    if($("#clienteResults")){$("#clienteResults").style.display="none";$("#clienteResults").innerHTML="";}
  }catch(e){console.error(e);alert("Error de conexión. No se cargó el pedido.");}
  finally{btn.disabled=false;btn.textContent=originalText;}
}
/* ════════ CLIENTE / SELLOS ════════ */
const MIN_FOR_STAMP=20000;            // subtotal mínimo (comida) para sumar sello
let CUSTOMERS=null;                   // caché de la colección customers
let selectedCustomer=null;            // cliente elegido para este pedido
let loyaltyUseReward=false;           // ¿este pedido canjea su 10%?

const _norm=s=>(s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

async function ensureCustomers(){
  if(CUSTOMERS)return CUSTOMERS;
  const snap=await db.collection('customers').get();
  CUSTOMERS=snap.docs.map(d=>Object.assign({uid:d.id},d.data()));
  return CUSTOMERS;
}

let _cliTimer=null;
const _inpCli=document.getElementById('inpClienteSearch');
if(_inpCli){
  _inpCli.addEventListener('input',()=>{
    clearTimeout(_cliTimer);
    const q=_inpCli.value.trim();
    const box=document.getElementById('clienteResults');
    if(q.length<2){box.style.display='none';box.innerHTML='';return;}
    _cliTimer=setTimeout(()=>doClienteSearch(q),200);
  });
}

async function doClienteSearch(q){
  const box=document.getElementById('clienteResults');
  box.style.display='block';
  box.innerHTML='<div class="cli-empty">Buscando…</div>';
  let list;
  try{ list=await ensureCustomers(); }catch(e){ console.error(e); box.innerHTML='<div class="cli-empty">Error al buscar.</div>'; return; }
  const nq=_norm(q);
  const res=list.filter(c=>_norm(c.name).includes(nq)||_norm(c.email).includes(nq)||_norm(c.phone).includes(nq)).slice(0,8);
  if(!res.length){ box.innerHTML='<div class="cli-empty">Sin resultados. (Solo aparecen clientes que iniciaron sesión en la web)</div>'; return; }
  box.innerHTML=res.map(c=>{
    const st=Number(c.stamps||0);
    const rw=c.rewardAvailable?' · <span class="cli-st">10% 🎉</span>':'';
    const sub=[c.email||'',c.phone||''].filter(Boolean).join(' · ');
    return `<div class="cli-result" onclick="selectCliente('${c.uid}')"><b>${c.name||'(sin nombre)'}</b> <span class="cli-st">${st}/10${rw}</span>${sub?`<small>${sub}</small>`:''}</div>`;
  }).join('');
}

window.selectCliente=function(uid){
  const c=(CUSTOMERS||[]).find(x=>x.uid===uid); if(!c)return;
  selectedCustomer=c; loyaltyUseReward=false;
  if(_inpCli)_inpCli.value='';
  const box=document.getElementById('clienteResults'); box.style.display='none'; box.innerHTML='';
  renderClienteSelected();
  renderCart();
};

window.clearCliente=function(){
  if(loyaltyUseReward)window.toggleUsarReward(false);
  selectedCustomer=null; loyaltyUseReward=false;
  renderClienteSelected(); renderCart();
};

function renderClienteSelected(){
  const el=document.getElementById('clienteSelected'); if(!el)return;
  if(!selectedCustomer){el.style.display='none';el.innerHTML='';return;}
  const c=selectedCustomer, st=Number(c.stamps||0);
  const rewardHtml=c.rewardAvailable
    ?`<label class="cli-reward-toggle"><input type="checkbox" id="chkUsarReward" ${loyaltyUseReward?'checked':''} onchange="toggleUsarReward(this.checked)"> Usar 10% de sellos en este pedido</label>`
    :'';
  el.style.display='block';
  el.innerHTML=`
    <div class="cli-card">
      <div class="cli-card-top">
        <strong>${c.name||'(sin nombre)'}</strong>
        <button class="cli-change" onclick="clearCliente()">cambiar</button>
      </div>
      <div class="cli-stamps">${c.rewardAvailable?`${st}/10 · <span class="cli-reward">¡10% disponible!</span>`:`${st}/10 sellos`}</div>
      ${rewardHtml}
      <div class="cli-hint" id="cliStampHint"></div>

}

window.toggleUsarReward=function(on){
  loyaltyUseReward=!!on;
  const pctEl=document.getElementById('inpDiscountPct'), descEl=document.getElementById('inpDiscountDesc');
  if(on){
    pctEl.value=20; descEl.value='Descuento sellos (20%)';
    pctEl.disabled=true; descEl.disabled=true;
  } else {
    if(pctEl.value==='20' && descEl.value==='Descuento sellos (20%)'){ pctEl.value=''; descEl.value=''; }
    pctEl.disabled=false; descEl.disabled=false;
  }
  renderCart();

window.updateCliStampHint=function(subtotal){
  const el=document.getElementById('cliStampHint'); if(!el)return;
  if(loyaltyUseReward){ el.textContent='Canjea el 10% — este pedido no suma sello.'; el.className='cli-hint'; return; }
  if(subtotal>=MIN_FOR_STAMP){ el.innerHTML='✅ Este pedido suma 1 sello'; el.className='cli-hint ok'; }
  else { el.innerHTML=`Faltan <strong>${money(MIN_FOR_STAMP-subtotal)}</strong> para sumar un sello (mínimo ${money(MIN_FOR_STAMP)})`; el.className='cli-hint'; }
};

// Aplica el sello (o canjea el premio) directo en customers/{uid}. Mismo criterio que loyalty.js.
async function applyStampToCustomer(uid, usedReward, amount){
  const ref=db.collection('customers').doc(uid);
  await db.runTransaction(async t=>{
    const snap=await t.get(ref);
    if(!snap.exists)return;
    const d=snap.data();
    let stamps=Number(d.stamps||0);
    let rewardAvailable=!!d.rewardAvailable;
    const ordersCount=Number(d.ordersCount||0)+1;
    if(usedReward){
      stamps=0; rewardAvailable=false;
    } else if(Number(amount||0)>=MIN_FOR_STAMP){
      stamps=stamps+1;
      if(stamps>=10){ stamps=10; rewardAvailable=true; }
    }
    t.set(ref,{stamps,rewardAvailable,ordersCount,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
  });
}

$("#btnCargarPedido").onclick=sendToFirestore;
