<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Menú • Rhodes Burgers</title>
<link rel="icon" href="images/logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#D4A847;--gold2:#f0c84a;
    --bg:#1a1710;--card:#2a2619;--card2:#302c1e;
    --border:rgba(212,168,71,.15);
    --txt:#F0EAE0;--muted:#7a7060;
    --fh:'Barlow Condensed',sans-serif;--fb:'DM Sans',sans-serif;
    --green:#22c55e;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--fb);}

  /* NOISE */
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity:.03;mix-blend-mode:overlay;}

  /* RADIAL GLOW */
  body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,168,71,.08) 0%, transparent 70%);}

  /* HEADER */
  .tv-header{
    position:relative;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:28px 60px 20px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .tv-brand{display:flex;align-items:center;gap:18px;}
  .tv-brand img{width:54px;height:54px;border-radius:12px;object-fit:cover;}
  .tv-brand-name{font-family:var(--fh);font-size:52px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--txt);line-height:1;}
  .tv-brand-name em{font-style:normal;color:var(--gold);}
  .tv-tagline{font-size:14px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
  .tv-clock{font-family:var(--fh);font-size:48px;font-weight:900;color:var(--gold);letter-spacing:.04em;line-height:1;}
  .tv-date{font-size:13px;color:var(--muted);text-align:right;letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}

  /* CATEGORY TABS */
  .tv-cats{
    position:relative;z-index:10;
    display:flex;gap:6px;padding:18px 60px 0;
    flex-shrink:0;
  }
  .tv-cat-tab{
    padding:10px 28px;border-radius:99px;
    font-family:var(--fh);font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    color:var(--muted);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
    cursor:none;transition:all .4s ease;
  }
  .tv-cat-tab.active{background:var(--gold);color:#1a1710;border-color:var(--gold);}

  /* CONTENT */
  .tv-content{
    position:relative;z-index:5;
    flex:1;overflow:hidden;
    padding:24px 60px 36px;
  }

  /* PANEL (one per category, fade in/out) */
  .tv-panel{
    position:absolute;inset:0;padding:24px 60px 36px;
    display:grid;
    align-content:start;
    gap:16px;
    opacity:0;pointer-events:none;
    transition:opacity .6s ease;
  }
  .tv-panel.active{opacity:1;pointer-events:auto;}

  /* GRID */
  .tv-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:16px;
  }

  /* PRODUCT CARD */
  .tv-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:border-color .3s;
    animation:cardIn .5s ease both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .tv-card:hover{border-color:rgba(212,168,71,.4);}

  .tv-card-img{
    width:100%;height:160px;object-fit:cover;
    background:var(--card2);
    flex-shrink:0;
  }
  .tv-card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;justify-content:space-between;}
  .tv-card-name{font-family:var(--fh);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.02em;color:var(--txt);line-height:1.1;margin-bottom:5px;}
  .tv-card-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:10px;flex:1;}
  .tv-card-price{font-family:var(--fh);font-size:30px;font-weight:900;color:var(--gold);line-height:1;}
  .tv-card-soldout{font-family:var(--fh);font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}

  /* SOLDOUT OVERLAY */
  .tv-card.soldout{opacity:.4;}
  .tv-card.soldout .tv-card-price{display:none;}

  /* SECTION TITLE (within panel for large text) */
  .tv-section-title{
    font-family:var(--fh);font-size:clamp(36px,4vw,54px);font-weight:900;
    text-transform:uppercase;letter-spacing:.04em;color:var(--white);
    margin-bottom:4px;line-height:1;
  }
  .tv-section-title em{font-style:italic;color:var(--gold);}

  /* PRICE HIGHLIGHT CARD (for guarniciones/bebidas — fewer items, bigger) */
  .tv-grid-big{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:18px;
  }
  .tv-card-big .tv-card-img{height:200px;}
  .tv-card-big .tv-card-name{font-size:28px;}
  .tv-card-big .tv-card-price{font-size:38px;}

  /* PROMO BANNER */
  .tv-promo{
    background:linear-gradient(135deg,rgba(212,168,71,.15),rgba(212,168,71,.05));
    border:1px solid var(--gold-border);
    border-radius:14px;
    padding:16px 24px;
    display:flex;align-items:center;gap:16px;
    font-family:var(--fh);
    animation:pulse 4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{border-color:rgba(212,168,71,.2)}50%{border-color:rgba(212,168,71,.6)}}
  .tv-promo-ico{font-size:32px;}
  .tv-promo-text{font-size:20px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;}

  /* PROGRESS BAR (category rotation) */
  .tv-progress{
    position:fixed;bottom:0;left:0;right:0;height:3px;z-index:100;
    background:rgba(255,255,255,.05);
  }
  .tv-progress-bar{
    height:100%;background:var(--gold);
    transition:none;
    transform-origin:left;
  }

  /* LOADING */
  #tvLoader{
    position:fixed;inset:0;background:var(--bg);z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    transition:opacity .6s ease;
  }
  #tvLoader.hide{opacity:0;pointer-events:none;}
  .loader-logo{width:80px;height:80px;border-radius:18px;object-fit:cover;}
  .loader-text{font-family:var(--fh);font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
  .loader-bar{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
  .loader-bar-inner{height:100%;background:var(--gold);border-radius:2px;animation:loadbar 1.5s ease-in-out infinite;}
  @keyframes loadbar{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

  /* LAYOUT */
  #tvApp{display:flex;flex-direction:column;height:100vh;}
</style>
</head>
<body>

<!-- LOADER -->
<div id="tvLoader">
  <img src="images/logo.png" class="loader-logo" alt="Rhodes">
  <div class="loader-text">Rhodes Burgers</div>
  <div class="loader-bar"><div class="loader-bar-inner"></div></div>
</div>

<div id="tvApp" style="display:none">
  <!-- HEADER -->
  <div class="tv-header">
    <div class="tv-brand">
      <img src="images/logo.png" alt="Rhodes" onerror="this.style.display='none'">
      <div>
        <div class="tv-brand-name">Rhodes<em>.</em></div>
        <div class="tv-tagline">Escobar, Buenos Aires</div>
      </div>
    </div>
    <div style="text-align:right">
      <div class="tv-clock" id="tvClock">--:--</div>
      <div class="tv-date" id="tvDate">—</div>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="tv-cats" id="tvCats"></div>

  <!-- PANELS -->
  <div class="tv-content" id="tvPanels"></div>

  <!-- PROGRESS BAR -->
  <div class="tv-progress"><div class="tv-progress-bar" id="tvProgressBar"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
try{firebase.initializeApp({apiKey:"AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",authDomain:"rhodes-burguers.firebaseapp.com",projectId:"rhodes-burguers",storageBucket:"rhodes-burguers.firebasestorage.app",messagingSenderId:"951646688091",appId:"1:951646688091:web:05db5fadb4150d1fa9c07e"});}catch(e){}
const db=firebase.firestore();
try{db.settings({experimentalForceLongPolling:true,experimentalAutoDetectLongPolling:false});db.enablePersistence({synchronizeTabs:true}).catch(()=>{});}catch(e){}

const money = n => '$'+(Number(n)||0).toLocaleString("es-AR",{maximumFractionDigits:0});

// ── RELOJ ──
function updateClock(){
  const now=new Date();
  document.getElementById('tvClock').textContent=now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',hour12:false});
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('tvDate').textContent=`${days[now.getDay()]} ${now.getDate()} de ${months[now.getMonth()]}`;
}
updateClock();
setInterval(updateClock,1000);

// ── DATA ──
let PRODUCTS=[], MENU_ORDER={}, currentCatIdx=0, rotateTimer=null, progressAnim=null;
const ROTATE_SEC=12; // segundos por categoría
const FALLBACK='images/logo.png';

const CATEGORIES=[
  {key:'hamburguesas', label:'🍔 Hamburguesas', big:false},
  {key:'sandwiches',   label:'🥪 Sándwiches',   big:false},
  {key:'guarniciones', label:'🍟 Guarniciones',  big:true},
  {key:'bebidas',      label:'🥤 Bebidas',        big:true},
];

db.collection('config').doc('menuOrder').onSnapshot(snap=>{MENU_ORDER=snap.exists?snap.data():{};buildMenu();}, err=>console.warn('menuOrder:',err));
db.collection('products').onSnapshot(snap=>{PRODUCTS=snap.docs.map(d=>({id:d.id,...d.data()}));buildMenu();}, err=>console.warn('products:',err));

// Si después de 8s no cargó, mostrar pantalla de error amigable
setTimeout(()=>{
  if(document.getElementById('tvApp').style.display==='none'){
    document.getElementById('tvLoader').innerHTML=`
      <img src="images/logo.png" class="loader-logo" alt="Rhodes">
      <div style="font-family:var(--fh);font-size:24px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;text-align:center">
        Sin conexión<br>
        <span style="font-size:16px">Verificá el internet y recargá la página</span>
      </div>`;
  }
}, 8000);

function orderedList(cat){
  const order=MENU_ORDER[cat]||[];
  const map=new Map(order.map((id,i)=>[id,i]));
  return PRODUCTS.filter(p=>(p.category||'').toLowerCase()===cat).sort((a,b)=>(map.has(a.id)?map.get(a.id):9999)-(map.has(b.id)?map.get(b.id):9999));
}

function buildMenu(){
  const activeCats=CATEGORIES.filter(c=>orderedList(c.key).length>0);
  if(!activeCats.length) return;

  // Tabs
  const catsEl=document.getElementById('tvCats');
  catsEl.innerHTML=activeCats.map((c,i)=>`<div class="tv-cat-tab${i===0?' active':''}" id="tab-${c.key}">${c.label}</div>`).join('');

  // Panels
  const panelsEl=document.getElementById('tvPanels');
  panelsEl.innerHTML='';
  activeCats.forEach((c,i)=>{
    const items=orderedList(c.key);
    const panel=document.createElement('div');
    panel.className='tv-panel'+(i===0?' active':'');
    panel.id='panel-'+c.key;

    const cards=items.map(p=>{
      const soldout=p.available===false;
      const imgEl=p.img?`<img class="tv-card-img" src="${p.img}" onerror="this.src='${FALLBACK}'" alt="${p.name}">`:`<img class="tv-card-img" src="${FALLBACK}" alt="${p.name}">`;
      return`<div class="tv-card${c.big?' tv-card-big':''}${soldout?' soldout':''}">
        ${imgEl}
        <div class="tv-card-body">
          <div>
            <div class="tv-card-name">${p.name}</div>
            ${p.description?`<div class="tv-card-desc">${p.description}</div>`:''}
          </div>
          ${soldout?`<div class="tv-card-soldout">Agotado</div>`:`<div class="tv-card-price">${money(p.price)}</div>`}
        </div>
      </div>`;
    }).join('');

    panel.innerHTML=`<div class="${c.big?'tv-grid-big':'tv-grid'}">${cards}</div>`;
    panelsEl.appendChild(panel);
  });

  // Hide loader, show app
  const loader=document.getElementById('tvLoader');
  loader.classList.add('hide');
  setTimeout(()=>{loader.style.display='none'; document.getElementById('tvApp').style.display='flex';},700);

  // Start rotation
  startRotation(activeCats);
}

// ── ROTACIÓN ──
function startRotation(cats){
  if(rotateTimer) clearInterval(rotateTimer);
  if(progressAnim) cancelAnimationFrame(progressAnim);
  currentCatIdx=0;
  showCat(cats, 0);
  animateProgress(cats);
  rotateTimer=setInterval(()=>{
    currentCatIdx=(currentCatIdx+1)%cats.length;
    showCat(cats,currentCatIdx);
  }, ROTATE_SEC*1000);
}

function showCat(cats,idx){
  // Tabs
  cats.forEach((c,i)=>{
    const t=document.getElementById('tab-'+c.key);
    if(t) t.classList.toggle('active',i===idx);
  });
  // Panels
  cats.forEach((c,i)=>{
    const p=document.getElementById('panel-'+c.key);
    if(p) p.classList.toggle('active',i===idx);
  });
}

// Barra de progreso animada
let progressStart=null;
function animateProgress(cats){
  const bar=document.getElementById('tvProgressBar');
  const total=ROTATE_SEC*1000;

  function step(ts){
    if(!progressStart) progressStart=ts;
    const elapsed=(ts-progressStart)%total;
    const pct=(elapsed/total)*100;
    bar.style.width=pct+'%';
    bar.style.transition='none';
    progressAnim=requestAnimationFrame(step);
  }
  progressAnim=requestAnimationFrame(step);
}
</script>
</body>
</html>
