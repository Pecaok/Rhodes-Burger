<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rhodes Burgers — Panel de Tráfico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; }

  :root {
    --bg:        #0a0907;
    --bg-panel:  rgba(20, 17, 14, 0.72);
    --border:    rgba(255, 255, 255, 0.06);
    --text:      #e8e4d8;
    --text-mut:  #888780;
    --text-dim:  #5f5e5a;
    --accent:    #e8593c;
    --gold:      #fcde5a;
  }

  html, body { height: 100%; margin: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 20% 0%, rgba(232,89,60,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(252,222,90,0.04) 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    overflow: hidden;
    letter-spacing: -0.005em;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 1;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 2;
  }

  #graph {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 3;
    cursor: grab;
  }
  #graph:active { cursor: grabbing; }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 22px 32px;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(10,9,7,0.9) 0%, rgba(10,9,7,0.5) 60%, transparent 100%);
  }

  .brand { display: flex; align-items: center; gap: 14px; }

  .brand-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #ff6b3d 0%, #e8593c 100%);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 15px;
    color: #1a0f08;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1) inset,
      0 4px 20px rgba(232,89,60,0.4);
    font-family: 'JetBrains Mono', monospace;
  }

  .brand h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.015em;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--text-mut);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 3px;
    font-weight: 500;
  }

  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #97c459;
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 2s infinite;
    vertical-align: middle;
    box-shadow: 0 0 8px rgba(151,196,89,0.6);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.75); }
  }

  #stats {
    display: flex;
    gap: 36px;
    pointer-events: auto;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    min-width: 72px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-mut);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 7px;
    font-weight: 500;
  }

  .panel {
    position: fixed;
    background: var(--bg-panel);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 12px;
    z-index: 5;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 20px 40px -20px rgba(0,0,0,0.6);
  }

  #legend { bottom: 28px; left: 28px; }

  .panel-title {
    font-weight: 600;
    margin-bottom: 12px;
    color: #fff;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 4px 0;
    color: #b4b2a9;
    font-size: 12px;
  }

  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    box-shadow: 0 0 10px currentColor;
  }

  #activity-log {
    bottom: 28px;
    right: 28px;
    width: 340px;
    max-height: 280px;
    overflow-y: auto;
  }

  #activity-log::-webkit-scrollbar { width: 4px; }
  #activity-log::-webkit-scrollbar-track { background: transparent; }
  #activity-log::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
  }

  .log-entry {
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: #b4b2a9;
    line-height: 1.5;
    animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-entry:last-child { border-bottom: none; }
  .log-time {
    color: var(--text-dim);
    margin-right: 10px;
    font-variant-numeric: tabular-nums;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .log-entry b { color: var(--text); font-weight: 600; }

  #detail {
    top: 100px;
    left: 28px;
    width: 290px;
    display: none;
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #detail.visible { display: block; }
  #detail h3 {
    margin: 0 0 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 12px;
  }
  .detail-row span:first-child { color: var(--text-mut); }
  .detail-row span:last-child { font-weight: 500; }

  .items-list {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .item-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 11px;
    color: #b4b2a9;
  }
  .item-row span:last-child {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--text-mut);
  }

  #zoom-controls {
    position: fixed;
    top: 100px;
    right: 28px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 5;
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6);
  }

  .zoom-btn {
    width: 30px; height: 30px;
    background: transparent;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: background 0.15s;
    font-family: inherit;
  }

  .zoom-btn:hover { background: rgba(255,255,255,0.06); }
  .zoom-btn:active { background: rgba(255,255,255,0.1); }

  .zoom-level {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    padding: 2px 0;
    font-family: 'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
  }

  .link {
    stroke: rgba(255,255,255,0.1);
    stroke-width: 1px;
    transition: stroke 0.3s;
  }

  .node { cursor: pointer; }
  .node-item { cursor: default; }

  .node circle.ring {
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5px;
    opacity: 0;
  }

  .node circle.core {
    transition: fill 0.5s cubic-bezier(0.22, 1, 0.36, 1), r 0.4s ease;
  }

  .node:hover circle.core {
    filter: brightness(1.2);
  }

  .node-label {
    fill: var(--text);
    font-size: 11px;
    font-weight: 600;
    text-anchor: middle;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.02em;
  }

  .node-sublabel {
    fill: var(--text-dim);
    font-size: 9px;
    text-anchor: middle;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  .hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    z-index: 4;
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 100px;
    font-weight: 500;
  }

  .hint kbd {
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    margin: 0 2px;
  }
</style>
</head>
<body>

<div id="header">
  <div class="brand">
    <div class="brand-mark">R</div>
    <div>
      <h1>Rhodes Burgers</h1>
      <div class="brand-sub"><span class="live-dot"></span>Tráfico en vivo</div>
    </div>
  </div>
  <div id="stats">
    <div class="stat"><div class="stat-value" id="active-users">0</div><div class="stat-label">Activos</div></div>
    <div class="stat"><div class="stat-value" id="active-orders">0</div><div class="stat-label">En proceso</div></div>
    <div class="stat"><div class="stat-value" id="total-delivered">0</div><div class="stat-label">Entregadas</div></div>
    <div class="stat"><div class="stat-value" id="revenue">$0</div><div class="stat-label">Facturación</div></div>
  </div>
</div>

<svg id="graph"></svg>

<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in" title="Acercar">+</button>
  <div class="zoom-level" id="zoom-level">100%</div>
  <button class="zoom-btn" id="zoom-out" title="Alejar">−</button>
  <button class="zoom-btn" id="zoom-reset" title="Resetear" style="font-size:11px">⊙</button>
</div>

<div id="legend" class="panel">
  <div class="panel-title">Estados</div>
  <div class="legend-item"><span class="legend-dot" style="background:#5DCAA5;color:#5DCAA5"></span>Navegando</div>
  <div class="legend-item"><span class="legend-dot" style="background:#378ADD;color:#378ADD"></span>Armando pedido</div>
  <div class="legend-item"><span class="legend-dot" style="background:#EF9F27;color:#EF9F27"></span>Pagando</div>
  <div class="legend-item"><span class="legend-dot" style="background:#E85D24;color:#E85D24"></span>En cocina</div>
  <div class="legend-item"><span class="legend-dot" style="background:#AFA9EC;color:#AFA9EC"></span>En delivery</div>
  <div class="legend-item"><span class="legend-dot" style="background:#97C459;color:#97C459"></span>Entregado</div>
</div>

<div id="detail" class="panel">
  <h3 id="detail-title">Usuario</h3>
  <div class="detail-row"><span>Estado</span><span id="detail-state">-</span></div>
  <div class="detail-row"><span>Canal</span><span id="detail-channel">-</span></div>
  <div class="detail-row"><span>Tiempo</span><span id="detail-time">-</span></div>
  <div class="detail-row"><span>Total</span><span id="detail-total">$0</span></div>
  <div class="items-list" id="detail-items"></div>
</div>

<div id="activity-log" class="panel">
  <div class="panel-title">Actividad reciente</div>
  <div id="log-content"></div>
</div>

<div class="hint">
  <kbd>Scroll</kbd> Zoom · <kbd>Arrastrar</kbd> Mover · <kbd>Clic</kbd> Ver detalle
</div>

<script type="module">

const CONFIG = {
  mode: 'firestore',
  firebase: {
    apiKey: "AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",
    authDomain: "rhodes-burguers.firebaseapp.com",
    projectId: "rhodes-burguers",
    storageBucket: "rhodes-burguers.firebasestorage.app",
    messagingSenderId: "951646688091",
    appId: "1:951646688091:web:05db5fadb4150d1fa9c07e",
    measurementId: "G-LQVYTJWHSM"
  },
  collectionName: 'orders',
  fieldMap: {
    estado:     'estado',     
    canal:      'canal',      
    items:      'items',      
    total:      'total',      
    itemNombre: 'nombre',     
    itemPrecio: 'precio',     
    createdAt:  'createdAt'   
  },
  stateMap: {
    'browsing':  'browsing',
    'building':  'building',
    'paying':    'paying',
    'kitchen':   'kitchen',
    'delivery':  'delivery',
    'delivered': 'delivered'
  }
};

const STATES = {
  browsing:  { color: '#5DCAA5', name: 'Navegando' },
  building:  { color: '#378ADD', name: 'Armando pedido' },
  paying:    { color: '#EF9F27', name: 'Pagando' },
  kitchen:   { color: '#E85D24', name: 'En cocina' },
  delivery:  { color: '#AFA9EC', name: 'En delivery' },
  delivered: { color: '#97C459', name: 'Entregado' }
};

let width = window.innerWidth;
let height = window.innerHeight;

const svg = d3.select('#graph').attr('viewBox', `0 0 ${width} ${height}`);
const defs = svg.append('defs');

const glowFilter = defs.append('filter')
  .attr('id', 'glow')
  .attr('x', '-50%').attr('y', '-50%')
  .attr('width', '200%').attr('height', '200%');
glowFilter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'coloredBlur');
const feMerge = glowFilter.append('feMerge');
feMerge.append('feMergeNode').attr('in', 'coloredBlur');
feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

Object.keys(STATES).forEach(s => {
  const c = STATES[s].color;
  const grad = defs.append('radialGradient').attr('id', `grad-${s}`).attr('cx', '35%').attr('cy', '35%');
  grad.append('stop').attr('offset', '0%').attr('stop-color', c).attr('stop-opacity', 1);
  grad.append('stop').attr('offset', '100%').attr('stop-color', c).attr('stop-opacity', 0.72);
});

const zoomG = svg.append('g').attr('class', 'zoom-layer');
const linkGroup = zoomG.append('g').attr('class', 'links');
const nodeGroup = zoomG.append('g').attr('class', 'nodes');

const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on('zoom', (event) => {
    zoomG.attr('transform', event.transform);
    document.getElementById('zoom-level').textContent = Math.round(event.transform.k * 100) + '%';
  });

svg.call(zoom);

document.getElementById('zoom-in').addEventListener('click', () => {
  svg.transition().duration(250).call(zoom.scaleBy, 1.35);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  svg.transition().duration(250).call(zoom.scaleBy, 1/1.35);
});
document.getElementById('zoom-reset').addEventListener('click', () => {
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
});

let nodes = [];
let links = [];
let selectedUserId = null;
let userIdCounter = 0;
let totalDelivered = 0;
let totalRevenue = 0;

const simulation = d3.forceSimulation(nodes)
  .force('charge', d3.forceManyBody()
    .strength(d => d.type === 'user' ? -180 : -25)
    .distanceMax(260))
  .force('center', d3.forceCenter(width / 2, height / 2).strength(0.08))
  .force('x', d3.forceX(width / 2).strength(0.045))
  .force('y', d3.forceY(height / 2).strength(0.045))
  .force('collision', d3.forceCollide()
    .radius(d => d.radius + 5)
    .strength(0.85))
  .force('link', d3.forceLink(links).id(d => d.id)
    .distance(d => d.type === 'user-item' ? 26 : 80)
    .strength(0.9))
  .alphaDecay(0.028)
  .velocityDecay(0.5)
  .on('tick', ticked);

function update() {
  const link = linkGroup.selectAll('line')
    .data(links, d => `${typeof d.source === 'object' ? d.source.id : d.source}-${typeof d.target === 'object' ? d.target.id : d.target}`);

  link.exit().transition().duration(400).attr('opacity', 0).remove();
  link.enter().append('line')
    .attr('class', 'link')
    .attr('opacity', 0)
    .transition().duration(400).attr('opacity', 1);

  const node = nodeGroup.selectAll('g.node').data(nodes, d => d.id);

  node.exit().transition().duration(500).attr('opacity', 0).remove();

  const nodeEnter = node.enter().append('g')
    .attr('class', d => d.type === 'user' ? 'node' : 'node node-item')
    .attr('opacity', 0)
    .on('click', (event, d) => {
      event.stopPropagation();
      if (d.type === 'user') selectUser(d);
    });

  nodeEnter.filter(d => d.type === 'user')
    .append('circle')
    .attr('class', 'ring')
    .attr('r', d => d.radius);

  nodeEnter.append('circle')
    .attr('class', 'core')
    .attr('r', d => d.radius)
    .attr('fill', d => d.type === 'user' ? `url(#grad-${d.state})` : d.color)
    .style('filter', d => d.type === 'user' ? 'url(#glow)' : 'none');

  nodeEnter.transition().duration(500).ease(d3.easeBackOut.overshoot(1.2)).attr('opacity', 1);

  nodeEnter.filter(d => d.type === 'user')
    .append('text')
    .attr('class', 'node-label')
    .attr('dy', d => d.radius + 16)
    .text(d => d.label);

  nodeEnter.filter(d => d.type === 'user')
    .append('text')
    .attr('class', 'node-sublabel')
    .attr('dy', d => d.radius + 28)
    .text(d => d.channel);

  node.select('circle.core')
    .transition().duration(500).ease(d3.easeCubicOut)
    .attr('fill', d => d.type === 'user' ? `url(#grad-${d.state})` : d.color);

  node.filter(d => d.stateChanged).each(function(d) {
    d.stateChanged = false;
    const ring = d3.select(this).select('circle.ring')
      .attr('r', d.radius)
      .attr('opacity', 0.85)
      .style('color', d.color);
    ring.transition().duration(900).ease(d3.easeCubicOut)
      .attr('r', d.radius * 2.5)
      .attr('opacity', 0);
  });

  simulation.nodes(nodes);
  simulation.force('link').links(links);
  simulation.alpha(0.45).restart();
}

function ticked() {
  linkGroup.selectAll('line')
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeGroup.selectAll('g.node')
    .attr('transform', d => `translate(${d.x},${d.y})`);
}

function logActivity(text) {
  const log = document.getElementById('log-content');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const time = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  entry.innerHTML = `<span class="log-time">${time}</span>${text}`;
  log.insertBefore(entry, log.firstChild);
  while (log.children.length > 30) log.removeChild(log.lastChild);
}

function updateStats() {
  const activeUsers = nodes.filter(n => n.type === 'user' && n.state !== 'delivered').length;
  const activeOrders = nodes.filter(n => n.type === 'user' && ['paying','kitchen','delivery'].includes(n.state)).length;
  document.getElementById('active-users').textContent = activeUsers;
  document.getElementById('active-orders').textContent = activeOrders;
  document.getElementById('total-delivered').textContent = totalDelivered;
  document.getElementById('revenue').textContent = '$' + totalRevenue.toLocaleString('es-AR');
}

function selectUser(user) {
  selectedUserId = user.id;
  const panel = document.getElementById('detail');
  panel.classList.add('visible');
  document.getElementById('detail-title').textContent = `Usuario ${user.label}`;
  document.getElementById('detail-state').textContent = STATES[user.state].name;
  document.getElementById('detail-state').style.color = user.color;
  document.getElementById('detail-channel').textContent = user.channel;

  const secs = Math.floor((Date.now() - user.createdAt) / 1000);
  document.getElementById('detail-time').textContent = secs < 60 ? `${secs}s` : `${Math.floor(secs/60)}m ${secs%60}s`;
  document.getElementById('detail-total').textContent = '$' + user.total.toLocaleString('es-AR');

  const itemsHtml = user.items.length === 0
    ? '<div class="item-row"><span>Sin items aún</span><span></span></div>'
    : user.items.map(it => `<div class="item-row"><span>${it.menuItem.name}</span><span>$${it.menuItem.price.toLocaleString('es-AR')}</span></div>`).join('');
  document.getElementById('detail-items').innerHTML = itemsHtml;
}

function changeState(user, newState) {
  user.state = newState;
  user.color = STATES[newState].color;
  user.stateChanged = true;
}

function removeUser(user) {
  const itemIds = user.items.map(i => i.id);
  nodes = nodes.filter(n => n.id !== user.id && !itemIds.includes(n.id));
  links = links.filter(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return sid !== user.id && tid !== user.id;
  });
  if (selectedUserId === user.id) {
    selectedUserId = null;
    document.getElementById('detail').classList.remove('visible');
  }
  update(); updateStats();
}

function mapIncomingData(raw) {
  const f = CONFIG.fieldMap;
  const rawState = raw[f.estado] || 'browsing';
  const mappedState = CONFIG.stateMap[rawState] || 'browsing';
  const rawItems = raw[f.items] || [];

  return {
    state: mappedState,
    channel: raw[f.canal] || 'Sin canal',
    total: raw[f.total] || 0,
    items: rawItems.map(it => ({
      menuItem: {
        name: it[f.itemNombre] || 'Item',
        price: it[f.itemPrecio] || 0
      }
    })),
    createdAtRaw: raw[f.createdAt]
  };
}

function handleRemoteChange(type, id, raw) {
  const data = mapIncomingData(raw);
  const existing = nodes.find(n => n.id === id && n.type === 'user');
  
  // Extraemos la fecha de creación real de Firebase si existe, si no usamos Date.now()
  let realCreatedAt = Date.now();
  if (data.createdAtRaw && data.createdAtRaw.seconds) {
      realCreatedAt = data.createdAtRaw.seconds * 1000;
  }

  if (type === 'added' || (!existing && type === 'modified')) {
    if (data.state === 'delivered') return;

    const user = {
      id,
      type: 'user',
      state: data.state,
      color: STATES[data.state].color,
      radius: 14,
      label: `#${++userIdCounter}`,
      channel: data.channel,
      items: [],
      total: data.total,
      createdAt: realCreatedAt, // <-- Fecha real guardada para calcular los 15 min
      x: width/2 + (Math.random() - 0.5) * 120,
      y: height/2 + (Math.random() - 0.5) * 120
    };
    nodes.push(user);

    data.items.forEach((item, idx) => {
      const itemId = `${id}_item_${idx}`;
      const itemNode = {
        id: itemId, type: 'item', parentId: id,
        color: 'rgba(255,255,255,0.55)', radius: 4,
        menuItem: item.menuItem,
        x: user.x + (Math.random() - 0.5) * 20,
        y: user.y + (Math.random() - 0.5) * 20
      };
      nodes.push(itemNode);
      links.push({ source: id, target: itemId, type: 'user-item' });
      user.items.push(itemNode);
    });

    logActivity(`<b>Usuario ${user.label}</b> conectado · ${user.channel}`);
    update(); updateStats();

  } else if (type === 'modified' && existing) {
    if (existing.state !== data.state) {
      changeState(existing, data.state);
      logActivity(`${existing.label} → <b>${STATES[data.state].name}</b>`);
      
      if (data.state === 'delivered') {
        totalDelivered++;
        totalRevenue += data.total;
        setTimeout(() => { const u = nodes.find(n => n.id === id); if (u) removeUser(u); }, 4500);
      }
    }

    const currentItemCount = existing.items.length;
    if (data.items.length > currentItemCount) {
      for (let i = currentItemCount; i < data.items.length; i++) {
        const newItem = data.items[i];
        const itemId = `${id}_item_${i}`;
        const itemNode = {
          id: itemId, type: 'item', parentId: id,
          color: 'rgba(255,255,255,0.55)', radius: 4,
          menuItem: newItem.menuItem,
          x: existing.x + (Math.random() - 0.5) * 20,
          y: existing.y + (Math.random() - 0.5) * 20
        };
        nodes.push(itemNode);
        links.push({ source: id, target: itemId, type: 'user-item' });
        existing.items.push(itemNode);
        logActivity(`${existing.label} · <b>${newItem.menuItem.name}</b>`);
      }
    }

    existing.total = data.total;
    update(); updateStats();

  } else if (type === 'removed' && existing) {
    removeUser(existing);
  }
}

async function initFirebase() {
  try {
    // 1. Importamos la versión moderna de Firebase
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js');
    const { getFirestore, collection, onSnapshot, query, where, doc, deleteDoc } =
        await import('https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js');
        
    const app = initializeApp(CONFIG.firebase);
    logActivity('✓ Conectado a Firebase');

    const db = getFirestore(app);
    const ref = collection(db, CONFIG.collectionName);

    // 2. Guardamos las funciones en 'window' para que el Camión de Basura pueda usarlas
    window.db = db;
    window.doc = doc;
    window.deleteDoc = deleteDoc;

    const q = query(ref, where('estado', '!=', 'delivered'));

    onSnapshot(q, (snap) => {
      snap.docChanges().forEach(change => {
        handleRemoteChange(change.type, change.doc.id, change.doc.data());
      });
    }, (err) => {
      console.error('Firestore error:', err);
      logActivity(`<b>Error:</b> ${err.message}`);
    });
    
  } catch (err) {
    console.error('Error inicializando Firebase:', err);
    logActivity(`<b>Error Firebase:</b> ${err.message}`);
  }
}

initFirebase();

// ════ RUTINA DE ACTUALIZACIÓN Y LIMPIEZA DE FANTASMAS (El Camión de Basura) ════
setInterval(() => {
  // 1. Actualizar el panel lateral si hay alguien seleccionado
  if (selectedUserId) {
    const user = nodes.find(n => n.id === selectedUserId);
    if (user) selectUser(user);
    else {
      selectedUserId = null;
      document.getElementById('detail').classList.remove('visible');
    }
  }

  // 2. El camión de basura: Limpiar nodos abandonados (> 15 minutos inactivos)
  const ahora = Date.now();
  const limiteInactividad = 15 * 60 * 1000; // 15 minutos en milisegundos

  nodes.filter(n => n.type === 'user').forEach(user => {
    // Si está navegando o armando pedido y se pasó de tiempo...
    if (['browsing', 'building'].includes(user.state)) {
      if (ahora - user.createdAt > limiteInactividad) {
        logActivity(`🧹 Limpiando fantasma: <b>${user.label}</b>`);
        
        // Lo borramos de la pantalla visualmente
        removeUser(user);
        
        // Lo detonamos de Firebase (usando la sintaxis moderna v10)
        if (window.db && window.deleteDoc && window.doc) {
          window.deleteDoc(window.doc(window.db, CONFIG.collectionName, user.id)).catch(()=>{});
        }
      }
    }
  });
}, 1000);


window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  svg.attr('viewBox', `0 0 ${width} ${height}`);
  simulation.force('center', d3.forceCenter(width/2, height/2).strength(0.08));
  simulation.force('x', d3.forceX(width/2).strength(0.045));
  simulation.force('y', d3.forceY(height/2).strength(0.045));
  simulation.alpha(0.3).restart();
});
</script>
