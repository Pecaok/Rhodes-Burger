<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rhodes Burgers — Salón en vivo</title>
<link rel="icon" href="images/logo.png" />
<style>
:root{
  --bg:#0e0d12; --bg2:#16151c; --panel:#1c1b23; --border:#2a2832;
  --text:#f1eee9; --muted:#a39e96; --muted2:#6f6a63;
  --saffron:#f4a72c; --saffron-d:#d4881a;
  --wood:#7a5230; --wood-d:#4f3420; --wood-f:#3c2718;
  --green:#4ade80; --blue:#60a5fa; --red:#f87171; --amber:#fbbf24;
  --shadow:0 12px 40px rgba(0,0,0,.5);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:radial-gradient(1200px 600px at 70% -10%,rgba(244,167,44,.07),transparent 60%),var(--bg);
  color:var(--text);font-family:var(--font);overflow-x:hidden}
button{font-family:inherit;cursor:pointer}

.topbar{height:62px;display:flex;align-items:center;gap:14px;padding:0 22px;
  border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:30}
.topbar img{height:34px;width:34px;border-radius:8px;object-fit:cover}
.topbar .title{font-weight:800;letter-spacing:-.3px;font-size:17px}
.topbar .title span{color:var(--saffron)}
.topbar .right{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.live{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);
  background:var(--panel);border:1px solid var(--border);padding:6px 12px;border-radius:20px}
.live .pulse{width:9px;height:9px;border-radius:50%;background:var(--green);animation:livePulse 1.6s infinite}
.live.off .pulse{background:var(--muted2);animation:none}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.6)}50%{box-shadow:0 0 0 6px rgba(74,222,128,0)}}
.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);
  padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;transition:.15s;text-decoration:none;display:inline-block}
.btn:hover{border-color:var(--saffron);color:var(--saffron)}
.btn.on{background:var(--saffron);color:#1a1205;border-color:var(--saffron)}

.stats{display:flex;gap:12px;flex-wrap:wrap;padding:16px 22px 4px;max-width:1180px;margin:0 auto;width:100%}
.stat{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 16px}
.stat .n{font-size:26px;font-weight:800;letter-spacing:-1px}
.stat .l{font-size:12px;color:var(--muted);margin-top:1px}

.stage-wrap{max-width:1180px;margin:14px auto 40px;padding:0 22px}
.stage{position:relative;width:100%;aspect-ratio:16/10;min-height:470px;
  border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);
  background:linear-gradient(180deg,#241f2c 0%,#1a1820 44%,#141119 100%);
  perspective:1100px;perspective-origin:50% 30%}

/* pared del fondo con profundidad */
.wall{position:absolute;left:-6%;right:-6%;top:0;height:42%;
  background:linear-gradient(180deg,#2a2414 0%,#211d27 100%);
  border-bottom:3px solid #3a3530;
  transform:translateZ(-40px);
  background-image:repeating-linear-gradient(90deg,rgba(0,0,0,.16) 0 1px,transparent 1px 70px)}
.wall .neon{position:absolute;top:16px;left:50%;transform:translateX(-50%);
  font-weight:900;letter-spacing:3px;font-size:24px;color:var(--saffron);
  text-shadow:0 0 12px rgba(244,167,44,.6),0 0 30px rgba(244,167,44,.35);animation:flicker 5s infinite}
.wall .neon small{display:block;text-align:center;font-size:10px;letter-spacing:6px;color:#caa86a;text-shadow:none;margin-top:2px}
@keyframes flicker{0%,97%,100%{opacity:1}98%{opacity:.6}99%{opacity:.9}}

/* piso isométrico (en perspectiva) */
.floor{position:absolute;left:-30%;right:-30%;bottom:-12%;height:92%;
  transform-origin:center bottom;transform:rotateX(58deg);
  background-color:#15121c;
  background-image:
    linear-gradient(rgba(244,167,44,.04),transparent),
    repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 2px,transparent 2px 64px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 2px,transparent 2px 64px);
  box-shadow:inset 0 60px 80px rgba(0,0,0,.5)}

.zone-label{position:absolute;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted2);font-weight:700;z-index:5}

/* ===== props 3D (cajas con cara frontal) ===== */
.box3d{position:absolute;transform:translate(-50%,-50%);z-index:3}
.box3d .top{position:relative;border-radius:6px}
.box3d .front{position:absolute;left:0;right:0;top:100%;border-radius:0 0 6px 6px}

/* cocina / grill */
.kitchen{left:50%;top:33%;width:42%}
.kitchen .top{height:30px;background:linear-gradient(180deg,#322619,#211810);border:1px solid #3a2c1c;
  display:flex;align-items:center;justify-content:center;gap:12px;overflow:hidden}
.kitchen .top::before{content:'';position:absolute;inset:5px;border-radius:4px;
  background:repeating-linear-gradient(90deg,#160f08 0 7px,#241a0f 7px 14px)}
.kitchen .front{height:26px;background:linear-gradient(180deg,#1c150d,#120c06)}
.patty{position:relative;z-index:2;width:20px;height:20px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#7c4a26,#3a2213);box-shadow:0 0 10px rgba(244,120,40,.55);
  animation:sizzle 1.1s ease-in-out infinite}
.patty.flip{animation:flip 1.5s ease-in-out infinite}
@keyframes sizzle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes flip{0%,100%{transform:rotateX(0) translateY(0)}45%{transform:rotateX(180deg) translateY(-12px)}}
.smoke{position:absolute;top:-12px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);
  filter:blur(2px);animation:smoke 2.4s ease-out infinite;z-index:4}
@keyframes smoke{0%{opacity:.55;transform:translateY(0) scale(.5)}100%{opacity:0;transform:translateY(-40px) scale(1.7)}}

/* mostrador */
.counter{left:50%;top:53%;width:60%}
.counter .top{height:18px;background:linear-gradient(180deg,#8a5e36,var(--wood));box-shadow:inset 0 2px 0 #9a6c40}
.counter .front{height:34px;background:linear-gradient(180deg,var(--wood-d),var(--wood-f))}
.bag{position:absolute;top:-20px;width:18px;height:20px;border-radius:3px 3px 2px 2px;z-index:4;
  background:linear-gradient(180deg,#dcb67e,#b88c52);box-shadow:0 5px 9px rgba(0,0,0,.45);animation:bagpop .35s ease both}
.bag::before{content:'';position:absolute;left:3px;right:3px;top:4px;height:5px;background:rgba(0,0,0,.18);border-radius:2px}
.bag::after{content:'🍔';position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:10px}
@keyframes bagpop{from{opacity:0;transform:translateY(-6px) scale(.5)}to{opacity:1;transform:translateY(0) scale(1)}}

/* mesas con volumen */
.table{position:absolute;transform:translate(-50%,-50%);z-index:2;width:58px;height:34px}
.table .ttop{position:absolute;inset:0;border-radius:50%;background:radial-gradient(ellipse at 50% 32%,#403b46,#26232c);box-shadow:0 14px 16px rgba(0,0,0,.45)}
.table .leg{position:absolute;left:50%;top:60%;transform:translateX(-50%);width:6px;height:18px;background:#1c1a22;border-radius:0 0 3px 3px}
.plant{position:absolute;transform:translate(-50%,-100%);z-index:2;font-size:28px;filter:drop-shadow(0 8px 6px rgba(0,0,0,.4));animation:floaty 4s ease-in-out infinite}

/* ===== personajes 3D con piernas ===== */
.actor,.worker,.roamer{position:absolute;z-index:6;display:flex;flex-direction:column;align-items:center;
  transform:translate(-50%,-100%) scale(var(--s,1));
  transition:left .8s cubic-bezier(.45,.05,.3,1),top .8s cubic-bezier(.45,.05,.3,1),transform .8s ease,opacity .5s ease;
  will-change:left,top}
.actor{cursor:pointer}
.actor:hover{z-index:25}
.bubble{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:3px 8px;
  font-size:10.5px;font-weight:600;white-space:nowrap;margin-bottom:6px;box-shadow:0 4px 12px rgba(0,0,0,.45);position:relative}
.bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid var(--panel)}
.actor:hover .bubble{border-color:var(--saffron)}
.actor.cooking .bubble{color:var(--amber)} .actor.ready .bubble{color:var(--green)} .actor.queue .bubble{color:var(--muted)}

/* cuerpo */
.person{position:relative;width:34px;height:58px;transform-style:preserve-3d}
.head{position:absolute;left:50%;top:0;transform:translateX(-50%);width:17px;height:17px;border-radius:50%;
  background:radial-gradient(circle at 36% 30%,#f3c9a0,#c98e60);box-shadow:0 2px 3px rgba(0,0,0,.3)}
.head::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:19px;height:8px;border-radius:9px 9px 0 0;background:#2b2630}
.torso{position:absolute;left:50%;top:15px;transform:translateX(-50%);width:30px;height:26px;border-radius:13px 13px 6px 6px;
  background:linear-gradient(120deg,var(--shirt,#60a5fa),color-mix(in srgb,var(--shirt,#60a5fa) 70%,#000));
  box-shadow:inset -5px -4px 0 rgba(0,0,0,.18),0 3px 5px rgba(0,0,0,.3)}
.legs{position:absolute;left:50%;top:39px;transform:translateX(-50%);width:24px;height:18px}
.leg{position:absolute;top:0;width:9px;height:17px;background:linear-gradient(180deg,#3a3640,#23202a);border-radius:5px 5px 4px 4px;transform-origin:top center}
.leg.l{left:1px} .leg.r{right:1px}
.shadow{width:30px;height:9px;border-radius:50%;background:rgba(0,0,0,.4);filter:blur(2px);margin-top:2px;animation:shsquash 3s ease-in-out infinite}

/* idle: respira/se balancea */
.person{animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
@keyframes shsquash{0%,100%{transform:scaleX(1);opacity:.4}50%{transform:scaleX(.82);opacity:.3}}
@keyframes floaty{0%,100%{transform:translate(-50%,-100%) translateY(0)}50%{transform:translate(-50%,-100%) translateY(-4px)}}

/* caminando: piernas + cabeceo */
.person.walking{animation:walkbob .4s ease-in-out infinite}
.person.walking .leg.l{animation:stepL .42s linear infinite}
.person.walking .leg.r{animation:stepR .42s linear infinite}
@keyframes walkbob{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-3px) rotate(1.5deg)}}
@keyframes stepL{0%,100%{transform:rotate(22deg)}50%{transform:rotate(-22deg)}}
@keyframes stepR{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
.actor.flip .person,.roamer.flip .person{scale:-1 1}

/* trabajadores */
.worker .torso{background:linear-gradient(120deg,#c2402f,#7e2117)}
.worker .cap{position:absolute;left:50%;top:-7px;transform:translateX(-50%);width:21px;height:8px;border-radius:6px 6px 0 0;background:#f1eee9;z-index:3}
.worker .apron{position:absolute;left:50%;top:20px;transform:translateX(-50%);width:18px;height:20px;background:rgba(255,255,255,.85);border-radius:3px;z-index:2}
.worker.busy .person{animation:work .55s ease-in-out infinite}
@keyframes work{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-2px) rotate(-5deg)}}
.wlabel{font-size:9px;color:var(--muted2);margin-top:4px;font-weight:700;letter-spacing:.5px}

/* mozo que recorre (ambiente) */
.roamer .torso{background:linear-gradient(120deg,#3f7a4a,#22452b)}
.roamer .person{animation:walkbob .4s ease-in-out infinite}
.roamer .leg.l{animation:stepL .42s linear infinite}
.roamer .leg.r{animation:stepR .42s linear infinite}

.overflow{position:absolute;z-index:9;background:var(--saffron);color:#1a1205;font-weight:800;font-size:13px;
  padding:6px 12px;border-radius:20px;transform:translate(-50%,-50%);box-shadow:var(--shadow)}
.empty-note{position:absolute;left:50%;bottom:7%;transform:translateX(-50%);z-index:9;color:var(--muted);
  font-size:13px;background:var(--panel);border:1px solid var(--border);padding:8px 16px;border-radius:20px}

.legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:14px;color:var(--muted);font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:50%;display:inline-block}

@media (prefers-reduced-motion:reduce){*{animation:none!important}}
@media (max-width:680px){.stat .n{font-size:21px}.wall .neon{font-size:17px}}
</style>
</head>
<body>
  <div class="topbar">
    <img src="images/logo.png" alt="Rhodes" onerror="this.style.display='none'"/>
    <div class="title">Rhodes <span>Burgers</span> · Salón en vivo</div>
    <div class="right">
      <span class="live" id="live"><span class="pulse"></span><span id="liveTxt">Conectando…</span></span>
      <button class="btn" id="btnDemo">👁 Demo</button>
      <button class="btn" id="btnFs">⛶ Pantalla completa</button>
      <a class="btn" href="mostrador.html">← Mostrador</a>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="wall"><div class="neon">RHODES<small>BURGERS</small></div></div>
      <div class="floor"></div>

      <div class="zone-label" style="left:50%;top:27%;transform:translateX(-50%)">🔥 Cocina</div>
      <div class="zone-label" style="left:50%;top:48%;transform:translateX(-50%)">🛍 Retiro</div>
      <div class="zone-label" style="left:5%;top:58%">🚶 Entrada</div>

      <!-- cocina -->
      <div class="box3d kitchen"><div class="top" id="grill"></div><div class="front"></div></div>
      <div class="worker" id="cook1" style="left:38%;top:35%;--s:.95">
        <div class="person"><div class="cap"></div><div class="head"></div><div class="torso"></div><div class="apron"></div>
          <div class="legs"><div class="leg l"></div><div class="leg r"></div></div></div>
        <div class="shadow"></div><div class="wlabel">COCINA</div>
      </div>
      <div class="worker" id="cook2" style="left:62%;top:35%;--s:.95">
        <div class="person"><div class="cap"></div><div class="head"></div><div class="torso"></div><div class="apron"></div>
          <div class="legs"><div class="leg l"></div><div class="leg r"></div></div></div>
        <div class="shadow"></div><div class="wlabel">COCINA</div>
      </div>

      <!-- mostrador -->
      <div class="box3d counter"><div class="top" id="counter"></div><div class="front"></div></div>
      <div class="worker" id="cashier" style="left:50%;top:55%;--s:1">
        <div class="person"><div class="cap"></div><div class="head"></div><div class="torso"></div><div class="apron"></div>
          <div class="legs"><div class="leg l"></div><div class="leg r"></div></div></div>
        <div class="shadow"></div><div class="wlabel">CAJA</div>
      </div>

      <!-- decoración -->
      <div class="plant" style="left:9%;top:50%;--s:1">🪴</div>
      <div class="plant" style="left:91%;top:52%;--s:1">🪴</div>
      <div class="table" style="left:28%;top:76%;--s:1.1"><div class="ttop"></div><div class="leg"></div></div>
      <div class="table" style="left:72%;top:76%;--s:1.1"><div class="ttop"></div><div class="leg"></div></div>
      <div class="table" style="left:50%;top:90%;--s:1.2"><div class="ttop"></div><div class="leg"></div></div>

      <!-- mozos de ambiente (siempre en movimiento) -->
      <div class="roamer" id="roam1" style="left:20%;top:70%;--s:1.05">
        <div class="person"><div class="head"></div><div class="torso"></div>
          <div class="legs"><div class="leg l"></div><div class="leg r"></div></div></div>
        <div class="shadow"></div>
      </div>

      <!-- actores dinámicos (pedidos) -->
      <div id="actors"></div>
    </div>

    <div class="legend">
      <span><i style="background:var(--muted)"></i> En cola</span>
      <span><i style="background:var(--amber)"></i> En cocina</span>
      <span><i style="background:var(--green)"></i> Listo (retira)</span>
      <span>· Los clientes caminan a medida que avanza su pedido · clic para ver el detalle</span>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",authDomain:"rhodes-burguers.firebaseapp.com",projectId:"rhodes-burguers",storageBucket:"rhodes-burguers.firebasestorage.app",messagingSenderId:"951646688091",appId:"1:951646688091:web:05db5fadb4150d1fa9c07e"};
let db=null;
try{ if(window.firebase&&firebase.initializeApp){ if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
  db=firebase.firestore(); db.settings({experimentalForceLongPolling:true,experimentalAutoDetectLongPolling:false}); } }
catch(e){ console.warn('Firebase no disponible:',e); }

const $=s=>document.querySelector(s);
const money=n=>(Number(n)||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});
const itemsCount=o=>(Array.isArray(o.items)?o.items:[]).reduce((s,i)=>s+(Number(i.qty)||0),0);
const orderNum=o=>o.number||o.orderNumber||(o.id?String(o.id).slice(-4).toUpperCase():'?');
const SHIRTS=['#60a5fa','#a78bfa','#f472b6','#34d399','#fbbf24','#fb923c','#22d3ee','#f87171','#818cf8','#4ade80'];
function shirtColor(o){const k=String(orderNum(o));let h=0;for(let i=0;i<k.length;i++)h=(h*31+k.charCodeAt(i))>>>0;return SHIRTS[h%SHIRTS.length];}
function zoneOf(o){const s=o.status||'accepted';if(s==='in_prep')return'cooking';if(s==='ready')return'ready';return'queue';}
const depthScale=y=>Math.max(.72,Math.min(1.35,(0.72+(y-40)/100*0.75))).toFixed(3);

/* posiciones por zona */
const MAXZ={queue:6,cooking:8,ready:6};
function spot(zone,i){
  if(zone==='queue')  return {x:5+(i%2)*7, y:60+Math.floor(i/2)*11};
  if(zone==='cooking'){const cols=[24,40,60,76];return {x:cols[i%4]+(Math.floor(i/4)?6:0), y:74+Math.floor(i/4)*13};}
  /* ready: contra el mostrador */
  const cols=[32,44,56,68];return {x:cols[i%4], y:62+Math.floor(i/4)*7};
}

/* ====== diff de actores (con caminata) ====== */
const actors=()=> $('#actors');
const actorEls=new Map();
const DOOR={x:3,y:60};
function makeActor(d){
  const el=document.createElement('div');
  el.className='actor '+d.zone;
  el.style.left=DOOR.x+'%';el.style.top=DOOR.y+'%';el.style.setProperty('--s',depthScale(DOOR.y));
  el.innerHTML=`<div class="bubble"></div>
    <div class="person" style="--shirt:${d.shirt}">
      <div class="head"></div><div class="torso"></div>
      <div class="legs"><div class="leg l"></div><div class="leg r"></div></div>
    </div><div class="shadow"></div>`;
  actors().appendChild(el);
  actorEls.set(d.id,el);
  el.onclick=()=>{ const id=el.dataset.id,num=el.dataset.num;
    if(id&&!String(id).startsWith('demo')) window.open(`track.html?id=${encodeURIComponent(id)}&num=${encodeURIComponent(num)}`,'_blank'); };
  void el.offsetWidth; // reflow para que la primera caminata anime
  return el;
}
function moveActor(el,d){
  const cl=parseFloat(el.style.left)||DOOR.x, ct=parseFloat(el.style.top)||DOOR.y;
  const moving=Math.abs(cl-d.x)>0.4||Math.abs(ct-d.y)>0.4;
  const p=el.querySelector('.person');
  if(moving&&p){
    p.classList.add('walking');
    el.classList.toggle('flip', d.x<cl);
    clearTimeout(el._wt); el._wt=setTimeout(()=>p.classList.remove('walking'),820);
  }
  el.style.left=d.x+'%'; el.style.top=d.y+'%'; el.style.setProperty('--s',depthScale(d.y));
  el.className='actor '+d.zone+(el.classList.contains('flip')?' flip':'');
  el.dataset.id=d.id; el.dataset.num=d.num;
  el.querySelector('.bubble').innerHTML=`#${d.num} · ${d.items}🍔 · ${money(d.total)}`;
}
function updateActors(desired){
  const seen=new Set();
  desired.forEach(d=>{ seen.add(d.id); let el=actorEls.get(d.id)||makeActor(d); moveActor(el,d); });
  actorEls.forEach((el,id)=>{ if(!seen.has(id)){
    el.style.left=DOOR.x+'%'; el.style.top=DOOR.y+'%'; el.style.opacity='0';
    const p=el.querySelector('.person'); if(p){p.classList.add('walking');} el.classList.add('flip');
    clearTimeout(el._rt); el._rt=setTimeout(()=>el.remove(),760);
    actorEls.delete(id);
  }});
}

/* ====== render ====== */
function render(orders){
  orders=orders.slice().sort((a,b)=>String(a.createdAt||'').localeCompare(String(b.createdAt||'')));
  const cola=orders.filter(o=>zoneOf(o)==='queue');
  const cocina=orders.filter(o=>zoneOf(o)==='cooking');
  const listos=orders.filter(o=>zoneOf(o)==='ready');

  const ingresos=orders.reduce((s,o)=>s+(Number(o.total)||0),0);
  $('#stats').innerHTML=`
    <div class="stat"><div class="n">${orders.length}</div><div class="l">Pedidos activos</div></div>
    <div class="stat"><div class="n" style="color:var(--muted)">${cola.length}</div><div class="l">En cola</div></div>
    <div class="stat"><div class="n" style="color:var(--amber)">${cocina.length}</div><div class="l">En cocina</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${listos.length}</div><div class="l">Listos para retirar</div></div>
    <div class="stat"><div class="n" style="color:var(--saffron)">${money(ingresos)}</div><div class="l">En curso</div></div>`;

  // grill: una hamburguesa por pedido en cocina
  const nP=Math.min(cocina.length,6);
  $('#grill').innerHTML=Array.from({length:nP}).map((_,i)=>`<div class="patty ${i%2?'flip':''}"></div>`).join('')
    +(nP?`<div class="smoke" style="left:30%"></div><div class="smoke" style="left:62%;animation-delay:1.2s"></div>`:'');
  $('#cook1').classList.toggle('busy',cocina.length>0);
  $('#cook2').classList.toggle('busy',cocina.length>1);
  $('#cashier').classList.toggle('busy',listos.length>0);

  // bolsas en el mostrador
  const nB=Math.min(listos.length,6);
  $('#counter').innerHTML=Array.from({length:nB}).map((_,i)=>{
    const left=10+i*(80/Math.max(nB,1));return `<div class="bag" style="left:${left}%"></div>`;}).join('');

  // construir destinos (con tope por zona)
  const desired=[];
  const push=(arr,zone)=>arr.slice(0,MAXZ[zone]).forEach((o,i)=>{
    const p=spot(zone,i);
    desired.push({id:String(o.id||orderNum(o)),num:orderNum(o),items:itemsCount(o),total:o.total,zone,x:p.x,y:p.y,shirt:shirtColor(o)});
  });
  push(cola,'queue'); push(cocina,'cooking'); push(listos,'ready');
  updateActors(desired);

  // overflow badges
  document.querySelectorAll('.overflow').forEach(e=>e.remove());
  [['queue',cola],['cooking',cocina],['ready',listos]].forEach(([z,arr])=>{
    const extra=arr.length-MAXZ[z];
    if(extra>0){const p=spot(z,MAXZ[z]-1);const b=document.createElement('div');
      b.className='overflow';b.style.left=(p.x+9)+'%';b.style.top=(p.y-8)+'%';b.textContent='+'+extra;$('#stage').appendChild(b);}
  });

  // vacío
  const old=$('#emptyNote'); if(old)old.remove();
  if(orders.length===0){const n=document.createElement('div');n.id='emptyNote';n.className='empty-note';
    n.textContent='🍔 Local tranquilo — no hay pedidos activos en este momento.';$('#stage').appendChild(n);}
}

/* ====== demo ====== */
let demoOn=false,demoTimer=null,liveUnsub=null;
const DEMO_NAMES=['Sofía','Mateo','Valen','Ema','Lola','Bruno','Cata','Theo','Mia','Nico'];
let demoSeed=[];
function makeDemoOrders(){
  // evoluciona: a veces avanza un pedido de estado para que se vea caminar
  if(!demoSeed.length||Math.random()<0.25){
    const n=3+Math.floor(Math.random()*6);demoSeed=[];
    for(let i=0;i<n;i++)demoSeed.push({id:'demo'+i,number:100+Math.floor(Math.random()*899),
      nombre:DEMO_NAMES[i%DEMO_NAMES.length],status:'accepted',
      items:Array.from({length:1+Math.floor(Math.random()*3)}).map(()=>({type:'burger',name:'Burger',qty:1})),
      total:6000+Math.floor(Math.random()*18000),createdAt:new Date(Date.now()-i*60000).toISOString()});
  }else{
    // avanzar estados
    const flow={accepted:'in_prep',in_prep:'ready',ready:'done'};
    demoSeed.forEach(o=>{ if(Math.random()<0.45)o.status=flow[o.status]||o.status; });
    demoSeed=demoSeed.filter(o=>o.status!=='done');
  }
  return demoSeed.map(o=>({...o}));
}
function startDemo(){demoOn=true;$('#btnDemo').classList.add('on');if(liveUnsub){liveUnsub();liveUnsub=null;}
  setLive('demo');demoSeed=[];const tick=()=>render(makeDemoOrders());tick();demoTimer=setInterval(tick,2600);}
function stopDemo(){demoOn=false;$('#btnDemo').classList.remove('on');clearInterval(demoTimer);demoTimer=null;
  actorEls.forEach(el=>el.remove());actorEls.clear();connectLive();}

/* ====== en vivo ====== */
function setLive(state){const el=$('#live'),txt=$('#liveTxt');el.classList.remove('off');
  if(state==='live')txt.textContent='En vivo';else if(state==='demo')txt.textContent='Modo demo';
  else if(state==='off'){el.classList.add('off');txt.textContent='Sin conexión';}else txt.textContent='Conectando…';}
function connectLive(){
  if(!db){setLive('off');render([]);return;}
  setLive();
  try{ liveUnsub=db.collection('orders').where('status','in',['accepted','pending_payment','in_prep','ready'])
    .onSnapshot(snap=>{setLive('live');render(snap.docs.map(d=>({id:d.id,...d.data()})));},
      err=>{console.warn('orders snapshot:',err);setLive('off');render([]);}); }
  catch(e){console.warn(e);setLive('off');render([]);}
}

$('#btnDemo').onclick=()=>{demoOn?stopDemo():startDemo();};
$('#btnFs').onclick=()=>{const el=document.documentElement;
  if(!document.fullscreenElement){el.requestFullscreen&&el.requestFullscreen();}else{document.exitFullscreen&&document.exitFullscreen();}};

render([]); connectLive();
</script>
