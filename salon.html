<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rhodes Burgers — Salón en vivo</title>
<link rel="icon" href="images/logo.png" />
<style>
:root{
  --bg:#0e0d12; --bg2:#16151c; --panel:#1c1b23; --border:#2a2832;
  --text:#f1eee9; --muted:#a39e96; --muted2:#6f6a63;
  --saffron:#f4a72c; --saffron-d:#d4881a;
  --grill:#3a2a1c; --wood:#7a5230; --wood-d:#5e3f24;
  --green:#4ade80; --blue:#60a5fa; --red:#f87171; --amber:#fbbf24;
  --shadow:0 12px 40px rgba(0,0,0,.5);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:radial-gradient(1200px 600px at 70% -10%,rgba(244,167,44,.07),transparent 60%),var(--bg);
  color:var(--text);font-family:var(--font);overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer}

/* topbar */
.topbar{
  height:62px;display:flex;align-items:center;gap:14px;padding:0 22px;
  border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:30;
}
.topbar img{height:34px;width:34px;border-radius:8px;object-fit:cover}
.topbar .title{font-weight:800;letter-spacing:-.3px;font-size:17px}
.topbar .title span{color:var(--saffron)}
.topbar .right{margin-left:auto;display:flex;gap:10px;align-items:center}
.live{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);
  background:var(--panel);border:1px solid var(--border);padding:6px 12px;border-radius:20px}
.live .pulse{width:9px;height:9px;border-radius:50%;background:var(--green);animation:livePulse 1.6s infinite}
.live.off .pulse{background:var(--muted2);animation:none}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.6)}50%{box-shadow:0 0 0 6px rgba(74,222,128,0)}}
.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);
  padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;transition:.15s}
.btn:hover{border-color:var(--saffron);color:var(--saffron)}
.btn.on{background:var(--saffron);color:#1a1205;border-color:var(--saffron)}

/* stats */
.stats{display:flex;gap:12px;flex-wrap:wrap;padding:16px 22px 4px;max-width:1180px;margin:0 auto;width:100%}
.stat{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 16px}
.stat .n{font-size:26px;font-weight:800;letter-spacing:-1px}
.stat .l{font-size:12px;color:var(--muted);margin-top:1px}

/* escena */
.stage-wrap{max-width:1180px;margin:14px auto 40px;padding:0 22px}
.stage{
  position:relative;width:100%;aspect-ratio:16/10;min-height:460px;
  border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);
  background:linear-gradient(180deg,#201d27 0%,#1a1820 42%,#15131a 100%);
}
/* piso isométrico */
.floor{position:absolute;left:0;right:0;bottom:0;height:62%;
  background-color:#13111a;
  background-image:
    repeating-linear-gradient(63deg,rgba(255,255,255,.035) 0 1px,transparent 1px 52px),
    repeating-linear-gradient(-63deg,rgba(255,255,255,.035) 0 1px,transparent 1px 52px);
}
.wall{position:absolute;left:0;right:0;top:0;height:40%;
  background:linear-gradient(180deg,#241f12 0%,#1d1a24 100%);
  border-bottom:2px solid #34302a;
  background-image:repeating-linear-gradient(90deg,rgba(0,0,0,.18) 0 1px,transparent 1px 80px);}
.wall .neon{position:absolute;top:18px;left:50%;transform:translateX(-50%);
  font-weight:900;letter-spacing:3px;font-size:22px;color:var(--saffron);
  text-shadow:0 0 12px rgba(244,167,44,.6),0 0 28px rgba(244,167,44,.35)}
.wall .neon small{display:block;text-align:center;font-size:10px;letter-spacing:5px;color:#caa86a;text-shadow:none;margin-top:2px}

/* zonas */
.zone-label{position:absolute;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted2);font-weight:700;z-index:5}

/* cocina (grill) */
.kitchen{position:absolute;left:50%;top:30%;transform:translateX(-50%);width:46%;z-index:3}
.grill{position:relative;height:46px;border-radius:8px;
  background:linear-gradient(180deg,#2a2118,#191309);
  border:1px solid #3a2c1c;box-shadow:0 8px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;gap:10px;padding:0 14px}
.grill::before{content:'';position:absolute;inset:6px;border-radius:5px;
  background:repeating-linear-gradient(90deg,#1a130b 0 6px,#241a0f 6px 12px)}
.patty{position:relative;z-index:2;width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#7a4a28,#3c2415);
  box-shadow:0 0 8px rgba(244,120,40,.5);animation:sizzle 1.1s ease-in-out infinite}
.patty.flip{animation:flip 1.6s ease-in-out infinite}
@keyframes sizzle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes flip{0%,100%{transform:rotateX(0) translateY(0)}45%{transform:rotateX(180deg) translateY(-10px)}}
.smoke{position:absolute;top:-10px;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);
  filter:blur(2px);animation:smoke 2.4s ease-out infinite;z-index:3}
@keyframes smoke{0%{opacity:.5;transform:translateY(0) scale(.6)}100%{opacity:0;transform:translateY(-34px) scale(1.6)}}

/* mostrador / pickup */
.counter{position:absolute;left:50%;top:52%;transform:translateX(-50%);width:62%;height:34px;z-index:3;
  background:linear-gradient(180deg,var(--wood),var(--wood-d));border-radius:8px 8px 4px 4px;
  box-shadow:0 10px 22px rgba(0,0,0,.45);}
.counter::after{content:'';position:absolute;left:0;right:0;top:-7px;height:7px;background:#8a5e36;border-radius:6px 6px 0 0}
.bag{position:absolute;top:-20px;width:18px;height:20px;border-radius:3px 3px 2px 2px;
  background:linear-gradient(180deg,#d9b27a,#b98e54);box-shadow:0 4px 8px rgba(0,0,0,.4);z-index:4;animation:pop .3s ease both}
.bag::before{content:'';position:absolute;left:3px;right:3px;top:4px;height:5px;background:rgba(0,0,0,.18);border-radius:2px}

/* actores (personas) */
.actor{position:absolute;transform:translate(-50%,-100%);z-index:6;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;animation:fadeUp .4s ease both;transition:top .6s ease,left .6s ease}
.actor:hover{z-index:20}
.actor .bubble{
  background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:3px 8px;
  font-size:10.5px;font-weight:600;white-space:nowrap;margin-bottom:5px;box-shadow:0 4px 12px rgba(0,0,0,.4);position:relative}
.actor .bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid var(--panel)}
.actor:hover .bubble{border-color:var(--saffron)}
.person{position:relative;width:34px;height:46px}
.head{position:absolute;left:50%;top:0;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;
  background:#e8b98c;box-shadow:inset -2px -2px 0 rgba(0,0,0,.12)}
.torso{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:28px;height:30px;border-radius:14px 14px 7px 7px;
  background:var(--shirt,#60a5fa);box-shadow:inset -4px -4px 0 rgba(0,0,0,.14)}
.actor .shadow,.worker .shadow{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:30px;height:8px;border-radius:50%;background:rgba(0,0,0,.35);filter:blur(2px)}
.idle{animation:floaty 3s ease-in-out infinite}
.actor.ready .torso{box-shadow:inset -4px -4px 0 rgba(0,0,0,.14),0 0 0 2px var(--green)}
.actor.cooking .bubble{color:var(--amber)}
.actor.ready .bubble{color:var(--green)}
.actor.queue .bubble{color:var(--muted)}
@keyframes floaty{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,calc(-100% + 10px))}to{opacity:1;transform:translate(-50%,-100%)}}
@keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

/* trabajadores */
.worker{position:absolute;transform:translate(-50%,-100%);z-index:5;display:flex;flex-direction:column;align-items:center}
.worker .person .torso{background:#b23b2e}
.worker .cap{position:absolute;left:50%;top:-6px;transform:translateX(-50%);width:20px;height:8px;border-radius:5px 5px 0 0;background:#f1eee9;z-index:2}
.worker .apron{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:18px;height:18px;background:rgba(255,255,255,.85);border-radius:3px;z-index:3}
.worker.busy .person{animation:work .7s ease-in-out infinite}
@keyframes work{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-2px) rotate(-4deg)}}
.worker .wlabel{font-size:9px;color:var(--muted2);margin-top:4px;font-weight:700;letter-spacing:.5px}

/* tables */
.table{position:absolute;transform:translate(-50%,-50%);z-index:2;width:54px;height:30px;
  background:radial-gradient(ellipse at 50% 30%,#3a3640,#26232c);border-radius:50%;
  box-shadow:0 10px 18px rgba(0,0,0,.4)}
.plant{position:absolute;transform:translate(-50%,-100%);z-index:2;font-size:26px;filter:drop-shadow(0 6px 6px rgba(0,0,0,.4))}

/* overflow + vacío */
.overflow{position:absolute;z-index:8;background:var(--saffron);color:#1a1205;font-weight:800;
  font-size:13px;padding:6px 12px;border-radius:20px;transform:translate(-50%,-50%);box-shadow:var(--shadow)}
.empty-note{position:absolute;left:50%;bottom:8%;transform:translateX(-50%);z-index:8;color:var(--muted);
  font-size:13px;background:var(--panel);border:1px solid var(--border);padding:8px 16px;border-radius:20px}

.legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:14px;color:var(--muted);font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:50%;display:inline-block}

@media (max-width:680px){
  .stat .n{font-size:21px}
  .wall .neon{font-size:16px}
}
</style>
</head>
<body>
  <div class="topbar">
    <img src="images/logo.png" alt="Rhodes" onerror="this.style.display='none'"/>
    <div class="title">Rhodes <span>Burgers</span> · Salón en vivo</div>
    <div class="right">
      <span class="live" id="live"><span class="pulse"></span><span id="liveTxt">Conectando…</span></span>
      <button class="btn" id="btnDemo">👁 Demo</button>
      <button class="btn" id="btnFs">⛶ Pantalla completa</button>
      <a class="btn" href="mostrador.html">← Mostrador</a>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="wall"><div class="neon">RHODES<small>BURGERS</small></div></div>
      <div class="floor"></div>

      <div class="zone-label" style="left:50%;top:25%;transform:translateX(-50%)">🔥 Cocina</div>
      <div class="zone-label" style="left:50%;top:48%;transform:translateX(-50%)">🛍 Retiro</div>
      <div class="zone-label" style="left:6%;top:60%">🚶 Entrada</div>

      <!-- cocina -->
      <div class="kitchen">
        <div class="grill" id="grill"></div>
      </div>
      <!-- trabajadores cocina -->
      <div class="worker" id="cook1" style="left:40%;top:34%">
        <div class="person"><div class="cap"></div><div class="head"></div><div class="torso"></div><div class="apron"></div></div>
        <div class="shadow"></div><div class="wlabel">COCINA</div>
      </div>
      <div class="worker" id="cook2" style="left:60%;top:34%">
        <div class="person"><div class="cap"></div><div class="head"></div><div class="torso"></div><div class="apron"></div></div>
        <div class="shadow"></div><div class="wlabel">COCINA</div>
      </div>

      <!-- mostrador -->
      <div class="counter" id="counter"></div>
      <div class="worker" id="cashier" style="left:50%;top:54%">
        <div class="person"><div class="cap"></div><div class="head"></div><div class="torso"></div><div class="apron"></div></div>
        <div class="shadow"></div><div class="wlabel">CAJA</div>
      </div>

      <!-- decoración -->
      <div class="plant" style="left:10%;top:52%">🪴</div>
      <div class="plant" style="left:90%;top:54%">🪴</div>

      <!-- mesas (decorativas) -->
      <div class="table" style="left:30%;top:74%"></div>
      <div class="table" style="left:70%;top:74%"></div>
      <div class="table" style="left:50%;top:88%"></div>

      <!-- actores dinámicos -->
      <div id="actors"></div>
    </div>

    <div class="legend">
      <span><i style="background:var(--muted)"></i> En cola (recibido)</span>
      <span><i style="background:var(--amber)"></i> En cocina (preparando)</span>
      <span><i style="background:var(--green)"></i> Listo (retirando)</span>
      <span>· Clic en un cliente para ver su pedido</span>
    </div>
  </div>

<!-- Firebase (mismo proyecto que el resto del sitio) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
/* ====== config Firebase (idéntica al resto del sitio) ====== */
const firebaseConfig={apiKey:"AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",authDomain:"rhodes-burguers.firebaseapp.com",projectId:"rhodes-burguers",storageBucket:"rhodes-burguers.firebasestorage.app",messagingSenderId:"951646688091",appId:"1:951646688091:web:05db5fadb4150d1fa9c07e"};

let db=null;
try{
  if(window.firebase&&firebase.initializeApp){
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    db.settings({experimentalForceLongPolling:true,experimentalAutoDetectLongPolling:false});
  }
}catch(e){ console.warn('Firebase no disponible:',e); }

/* ====== helpers ====== */
const $=s=>document.querySelector(s);
const money=n=>(Number(n)||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});
const itemsCount=o=>(Array.isArray(o.items)?o.items:[]).reduce((s,i)=>s+(Number(i.qty)||0),0);
const orderNum=o=>o.number||o.orderNumber||(o.id?String(o.id).slice(-4).toUpperCase():'?');
const SHIRTS=['#60a5fa','#a78bfa','#f472b6','#34d399','#fbbf24','#fb923c','#22d3ee','#f87171','#818cf8','#4ade80'];
function shirtColor(o){
  const k=String(orderNum(o)); let h=0; for(let i=0;i<k.length;i++)h=(h*31+k.charCodeAt(i))>>>0;
  return SHIRTS[h%SHIRTS.length];
}
/* estado normalizado → zona */
function zoneOf(o){
  const s=o.status||'accepted';
  if(s==='in_prep')return 'cooking';
  if(s==='ready')return 'ready';
  return 'queue'; // accepted / pending_payment
}

/* posiciones de cada zona (left%/top%) */
const SPOTS={
  queue:[{x:9,y:72},{x:9,y:82},{x:9,y:92},{x:16,y:77},{x:16,y:88}],
  cooking:[{x:24,y:80},{x:38,y:90},{x:62,y:90},{x:76,y:80},{x:30,y:70},{x:70,y:70}],
  ready:[{x:34,y:58},{x:44,y:58},{x:56,y:58},{x:66,y:58},{x:50,y:64}],
};

/* ====== render principal ====== */
let lastActiveCount=-1;
function render(orders){
  // ordenar por antigüedad
  orders=orders.slice().sort((a,b)=>String(a.createdAt||'').localeCompare(String(b.createdAt||'')));
  const cola=orders.filter(o=>zoneOf(o)==='queue');
  const cocina=orders.filter(o=>zoneOf(o)==='cooking');
  const listos=orders.filter(o=>zoneOf(o)==='ready');

  // stats
  const totalActivos=orders.length;
  const ingresos=orders.reduce((s,o)=>s+(Number(o.total)||0),0);
  $('#stats').innerHTML=`
    <div class="stat"><div class="n">${totalActivos}</div><div class="l">Pedidos activos</div></div>
    <div class="stat"><div class="n" style="color:var(--muted)">${cola.length}</div><div class="l">En cola</div></div>
    <div class="stat"><div class="n" style="color:var(--amber)">${cocina.length}</div><div class="l">En cocina</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${listos.length}</div><div class="l">Listos para retirar</div></div>
    <div class="stat"><div class="n" style="color:var(--saffron)">${money(ingresos)}</div><div class="l">En curso</div></div>`;

  // grill: una hamburguesa por pedido en cocina (máx 6)
  const grill=$('#grill');
  const nP=Math.min(cocina.length,6);
  grill.innerHTML=Array.from({length:nP}).map((_,i)=>`<div class="patty ${i%2?'flip':''}"></div>`).join('')
    + (nP?`<div class="smoke" style="left:30%"></div><div class="smoke" style="left:60%;animation-delay:1.2s"></div>`:'');

  // trabajadores: ocupados si hay trabajo
  $('#cook1').classList.toggle('busy',cocina.length>0);
  $('#cook2').classList.toggle('busy',cocina.length>1);
  $('#cashier').classList.toggle('busy',listos.length>0);

  // bolsas en el mostrador = pedidos listos (máx 6)
  const counter=$('#counter');
  const nB=Math.min(listos.length,6);
  counter.innerHTML=Array.from({length:nB}).map((_,i)=>{
    const left=12+i*(76/Math.max(nB,1));
    return `<div class="bag" style="left:${left}%"></div>`;
  }).join('');

  // actores
  const place=(arr,zone)=>{
    const spots=SPOTS[zone];
    let html='';
    arr.forEach((o,i)=>{
      if(i>=spots.length)return; // overflow aparte
      const p=spots[i];
      html+=`<div class="actor ${zone}" style="left:${p.x}%;top:${p.y}%" data-id="${o.id||''}" data-num="${orderNum(o)}">
        <div class="bubble">#${orderNum(o)} · ${itemsCount(o)}🍔 · ${money(o.total)}</div>
        <div class="person idle" style="--shirt:${shirtColor(o)}"><div class="head"></div><div class="torso"></div></div>
        <div class="shadow"></div>
      </div>`;
    });
    // overflow
    const extra=arr.length-spots.length;
    if(extra>0){
      const p=spots[spots.length-1];
      html+=`<div class="overflow" style="left:${p.x+8}%;top:${p.y-6}%">+${extra}</div>`;
    }
    return html;
  };

  const actors=$('#actors');
  actors.innerHTML = place(cola,'queue')+place(cocina,'cooking')+place(listos,'ready');

  // vacío
  const old=$('#emptyNote'); if(old)old.remove();
  if(totalActivos===0){
    const n=document.createElement('div');
    n.id='emptyNote';n.className='empty-note';
    n.textContent='🍔 Local tranquilo — no hay pedidos activos en este momento.';
    $('#stage').appendChild(n);
  }

  // click → seguimiento del pedido
  actors.querySelectorAll('.actor').forEach(a=>{
    a.onclick=()=>{
      const id=a.dataset.id, num=a.dataset.num;
      if(id) window.open(`track.html?id=${encodeURIComponent(id)}&num=${encodeURIComponent(num)}`,'_blank');
    };
  });

  lastActiveCount=totalActivos;
}

/* ====== modo DEMO (sin Firebase) ====== */
let demoOn=false, demoTimer=null, liveUnsub=null;
const DEMO_NAMES=['Sofía','Mateo','Valen','Ema','Lola','Bruno','Cata','Theo','Mia','Nico','Pili','Faus'];
function makeDemoOrders(){
  const states=['accepted','accepted','in_prep','in_prep','in_prep','ready','ready'];
  const n=2+Math.floor(Math.random()*7);
  const arr=[];
  for(let i=0;i<n;i++){
    const qty=1+Math.floor(Math.random()*3);
    arr.push({
      id:'demo'+i,number:100+Math.floor(Math.random()*899),
      nombre:DEMO_NAMES[i%DEMO_NAMES.length],
      status:states[Math.floor(Math.random()*states.length)],
      items:Array.from({length:qty}).map(()=>({type:'burger',name:'Burger',qty:1})),
      total:6000+Math.floor(Math.random()*18000),
      createdAt:new Date(Date.now()-i*60000).toISOString(),
    });
  }
  return arr;
}
function startDemo(){
  demoOn=true; $('#btnDemo').classList.add('on');
  if(liveUnsub){liveUnsub();liveUnsub=null;}
  setLive('demo');
  const tick=()=>render(makeDemoOrders());
  tick(); demoTimer=setInterval(tick,3500);
}
function stopDemo(){
  demoOn=false; $('#btnDemo').classList.remove('on');
  clearInterval(demoTimer);demoTimer=null;
  connectLive();
}

/* ====== conexión en vivo ====== */
function setLive(state){
  const el=$('#live'),txt=$('#liveTxt');
  el.classList.remove('off');
  if(state==='live'){txt.textContent='En vivo';}
  else if(state==='demo'){txt.textContent='Modo demo';}
  else if(state==='off'){el.classList.add('off');txt.textContent='Sin conexión';}
  else{txt.textContent='Conectando…';}
}
function connectLive(){
  if(!db){ setLive('off'); render([]); return; }
  setLive();
  try{
    liveUnsub=db.collection('orders')
      .where('status','in',['accepted','pending_payment','in_prep','ready'])
      .onSnapshot(snap=>{
        const orders=snap.docs.map(d=>({id:d.id,...d.data()}));
        setLive('live'); render(orders);
      },err=>{ console.warn('orders snapshot:',err); setLive('off'); render([]); });
  }catch(e){ console.warn(e); setLive('off'); render([]); }
}

/* ====== UI ====== */
$('#btnDemo').onclick=()=>{ demoOn?stopDemo():startDemo(); };
$('#btnFs').onclick=()=>{ const el=document.documentElement;
