<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rhodes Burgers — Salón en vivo</title>
<link rel="icon" href="images/logo.png" />
<style>
:root{
  --bg:#0e0d12; --bg2:#16151c; --panel:#1c1b23; --border:#2a2832;
  --text:#f1eee9; --muted:#a39e96; --muted2:#6f6a63;
  --saffron:#f4a72c;
  --green:#4ade80; --blue:#60a5fa; --red:#f87171; --amber:#fbbf24;
  --shadow:0 12px 40px rgba(0,0,0,.5);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:radial-gradient(1200px 600px at 70% -10%,rgba(244,167,44,.07),transparent 60%),var(--bg);
  color:var(--text);font-family:var(--font);overflow-x:hidden}
button{font-family:inherit;cursor:pointer}

.topbar{height:62px;display:flex;align-items:center;gap:14px;padding:0 22px;
  border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:30}
.topbar img{height:34px;width:34px;border-radius:8px;object-fit:cover}
.topbar .title{font-weight:800;letter-spacing:-.3px;font-size:17px}
.topbar .title span{color:var(--saffron)}
.topbar .right{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.live{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);
  background:var(--panel);border:1px solid var(--border);padding:6px 12px;border-radius:20px}
.live .pulse{width:9px;height:9px;border-radius:50%;background:var(--green);animation:livePulse 1.6s infinite}
.live.off .pulse{background:var(--muted2);animation:none}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.6)}50%{box-shadow:0 0 0 6px rgba(74,222,128,0)}}
.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);
  padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;transition:.15s;text-decoration:none;display:inline-block}
.btn:hover{border-color:var(--saffron);color:var(--saffron)}
.btn.on{background:var(--saffron);color:#1a1205;border-color:var(--saffron)}

.stats{display:flex;gap:12px;flex-wrap:wrap;padding:16px 22px 4px;max-width:1180px;margin:0 auto;width:100%}
.stat{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 16px}
.stat .n{font-size:26px;font-weight:800;letter-spacing:-1px}
.stat .l{font-size:12px;color:var(--muted);margin-top:1px}

.stage-wrap{max-width:1180px;margin:14px auto 40px;padding:0 22px}
.stage{position:relative;width:100%;height:600px;max-height:72vh;
  border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);
  background:radial-gradient(900px 500px at 50% 12%,#241f2e,#141119 70%)}

/* tablero isométrico (px fijos, escalado por JS) */
.board{position:absolute;top:10px;left:50%;transform-origin:top center}

/* piso (rombo con grilla) */
.floor{position:absolute;inset:0}
.floor .tile-grid{position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(26.57deg,rgba(255,255,255,.045) 0 1px,transparent 1px 36px),
    repeating-linear-gradient(153.43deg,rgba(255,255,255,.045) 0 1px,transparent 1px 36px),
    linear-gradient(180deg,#1b1726,#120f19)}

/* paredes / caras de cajas (clip-path en JS) */
.poly{position:absolute;inset:0}

/* sombra de baldosa bajo personajes */
.fshadow{position:absolute;width:40px;height:20px;border-radius:50%;background:rgba(0,0,0,.45);
  filter:blur(3px);transform:translate(-50%,-50%);z-index:1;transition:left .8s,top .8s}

/* ===== personajes ===== */
.unit{position:absolute;transform-origin:bottom center;
  transition:left .85s cubic-bezier(.4,.05,.3,1),top .85s cubic-bezier(.4,.05,.3,1),transform .85s ease,opacity .5s;
  will-change:left,top}
.unit .body{position:relative;transform:translate(-50%,-100%) scale(var(--s,1));transform-origin:bottom center}
.actor{cursor:pointer}
.bubble{position:absolute;left:50%;bottom:62px;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:3px 8px;
  font-size:10.5px;font-weight:600;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.45);z-index:3}
.bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid var(--panel)}
.actor:hover .bubble{border-color:var(--saffron)}
.actor.cooking .bubble{color:var(--amber)} .actor.ready .bubble{color:var(--green)} .actor.queue .bubble{color:var(--muted)}

.person{position:relative;width:34px;height:58px}
.head{position:absolute;left:50%;top:0;transform:translateX(-50%);width:17px;height:17px;border-radius:50%;
  background:radial-gradient(circle at 36% 30%,#f3c9a0,#c98e60);box-shadow:0 2px 3px rgba(0,0,0,.35);z-index:2}
.head::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:19px;height:8px;border-radius:9px 9px 0 0;background:#2b2630}
.torso{position:absolute;left:50%;top:15px;transform:translateX(-50%);width:30px;height:26px;border-radius:13px 13px 6px 6px;
  background:linear-gradient(120deg,var(--shirt,#60a5fa),color-mix(in srgb,var(--shirt,#60a5fa) 65%,#000));
  box-shadow:inset -5px -4px 0 rgba(0,0,0,.2),0 3px 5px rgba(0,0,0,.3);z-index:1}
.legs{position:absolute;left:50%;top:39px;transform:translateX(-50%);width:24px;height:18px}
.leg{position:absolute;top:0;width:9px;height:17px;background:linear-gradient(180deg,#3a3640,#23202a);border-radius:5px 5px 4px 4px;transform-origin:top center}
.leg.l{left:1px} .leg.r{right:1px}

.person{animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
.person.walking{animation:walkbob .4s ease-in-out infinite}
.person.walking .leg.l{animation:stepL .42s linear infinite}
.person.walking .leg.r{animation:stepR .42s linear infinite}
@keyframes walkbob{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-3px) rotate(1.5deg)}}
@keyframes stepL{0%,100%{transform:rotate(24deg)}50%{transform:rotate(-24deg)}}
@keyframes stepR{0%,100%{transform:rotate(-24deg)}50%{transform:rotate(24deg)}}
.unit.flip .body{scale:-1 1}

/* trabajadores */
.worker .torso{background:linear-gradient(120deg,#c2402f,#7e2117)}
.worker .cap{position:absolute;left:50%;top:-7px;transform:translateX(-50%);width:21px;height:8px;border-radius:6px 6px 0 0;background:#f1eee9;z-index:3}
.worker .apron{position:absolute;left:50%;top:20px;transform:translateX(-50%);width:18px;height:20px;background:rgba(255,255,255,.85);border-radius:3px;z-index:2}
.worker.busy .person{animation:work .55s ease-in-out infinite}
@keyframes work{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-2px) rotate(-5deg)}}
.wlabel{position:absolute;left:50%;bottom:-13px;transform:translateX(-50%);font-size:9px;color:var(--muted2);font-weight:700;letter-spacing:.5px;white-space:nowrap}
.roamer .torso{background:linear-gradient(120deg,#3f7a4a,#22452b)}

/* objetos sobre cajas */
.grill-items,.counter-items{position:absolute;transform:translate(-50%,-50%);z-index:5;display:flex;gap:9px}
.patty{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#7c4a26,#3a2213);
  box-shadow:0 0 9px rgba(244,120,40,.6);animation:sizzle 1.1s ease-in-out infinite}
.patty.flip{animation:flip 1.5s ease-in-out infinite}
@keyframes sizzle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes flip{0%,100%{transform:rotateX(0) translateY(0)}45%{transform:rotateX(180deg) translateY(-10px)}}
.smoke{position:absolute;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);filter:blur(2px);animation:smoke 2.4s ease-out infinite}
@keyframes smoke{0%{opacity:.55;transform:translateY(0) scale(.5)}100%{opacity:0;transform:translateY(-42px) scale(1.7)}}
.bag{width:16px;height:18px;border-radius:3px 3px 2px 2px;background:linear-gradient(180deg,#dcb67e,#b88c52);
  box-shadow:0 5px 9px rgba(0,0,0,.45);position:relative;animation:bagpop .35s ease both}
.bag::after{content:'🍔';position:absolute;top:-11px;left:50%;transform:translateX(-50%);font-size:9px}
@keyframes bagpop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

.neon{position:absolute;z-index:6;font-weight:900;letter-spacing:3px;font-size:22px;color:var(--saffron);
  text-shadow:0 0 12px rgba(244,167,44,.6),0 0 30px rgba(244,167,44,.35);transform:translate(-50%,-50%);animation:flicker 5s infinite;text-align:center}
.neon small{display:block;font-size:9px;letter-spacing:6px;color:#caa86a;text-shadow:none}
@keyframes flicker{0%,97%,100%{opacity:1}98%{opacity:.6}99%{opacity:.9}}

.overflow{position:absolute;z-index:20;background:var(--saffron);color:#1a1205;font-weight:800;font-size:12px;
  padding:5px 10px;border-radius:20px;transform:translate(-50%,-50%);box-shadow:var(--shadow)}
.empty-note{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:20;color:var(--muted);
  font-size:13px;background:var(--panel);border:1px solid var(--border);padding:8px 16px;border-radius:20px}

.legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:14px;color:var(--muted);font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:50%;display:inline-block}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <div class="topbar">
    <img src="images/logo.png" alt="Rhodes" onerror="this.style.display='none'"/>
    <div class="title">Rhodes <span>Burgers</span> · Salón en vivo</div>
    <div class="right">
      <span class="live" id="live"><span class="pulse"></span><span id="liveTxt">Conectando…</span></span>
      <button class="btn" id="btnDemo">👁 Demo</button>
      <button class="btn" id="btnFs">⛶ Pantalla completa</button>
      <a class="btn" href="mostrador.html">← Mostrador</a>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="board" id="board"></div>
    </div>
    <div class="legend">
      <span><i style="background:var(--muted)"></i> En cola</span>
      <span><i style="background:var(--amber)"></i> En cocina</span>
      <span><i style="background:var(--green)"></i> Listo (retira)</span>
      <span>· Los clientes caminan en diagonal sobre el salón a medida que avanza su pedido · clic para ver el detalle</span>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBbt5YOWDE0ouLn-Ib_iD1yUesok5SEhB8",authDomain:"rhodes-burguers.firebaseapp.com",projectId:"rhodes-burguers",storageBucket:"rhodes-burguers.firebasestorage.app",messagingSenderId:"951646688091",appId:"1:951646688091:web:05db5fadb4150d1fa9c07e"};
let db=null;
try{ if(window.firebase&&firebase.initializeApp){ if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
  db=firebase.firestore(); db.settings({experimentalForceLongPolling:true,experimentalAutoDetectLongPolling:false}); } }
catch(e){ console.warn('Firebase no disponible:',e); }

const $=s=>document.querySelector(s);
const money=n=>(Number(n)||0).toLocaleString("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0});
const itemsCount=o=>(Array.isArray(o.items)?o.items:[]).reduce((s,i)=>s+(Number(i.qty)||0),0);
const orderNum=o=>o.number||o.orderNumber||(o.id?String(o.id).slice(-4).toUpperCase():'?');
const SHIRTS=['#60a5fa','#a78bfa','#f472b6','#34d399','#fbbf24','#fb923c','#22d3ee','#f87171','#818cf8','#4ade80'];
function shirtColor(o){const k=String(orderNum(o));let h=0;for(let i=0;i<k.length;i++)h=(h*31+k.charCodeAt(i))>>>0;return SHIRTS[h%SHIRTS.length];}
function zoneOf(o){const s=o.status||'accepted';if(s==='in_prep')return'cooking';if(s==='ready')return'ready';return'queue';}

/* ====== motor isométrico ====== */
const HW=32, HH=16, COLS=12, ROWS=9;
const ORX=ROWS*HW, ORY=126, WALLH=120;
const BW=(COLS+ROWS)*HW, BH=ORY+(COLS+ROWS)*HH+70;
const iso=(c,r)=>({l:ORX+(c-r)*HW, t:ORY+(c+r)*HH});
const depthScale=(c,r)=>(0.82+((c+r)/(COLS+ROWS))*0.45).toFixed(3);
const zOf=(c,r)=>100+Math.round((c+r)*4);
const P=(pts)=>'polygon('+pts.map(p=>p[0].toFixed(1)+'px '+p[1].toFixed(1)+'px').join(',')+')';

/* caja isométrica (3 caras) → devuelve HTML */
function isoBox(c,r,w,h,hpx,top,left,right){
  const g=(cc,rr)=>iso(cc,rr), up=(p)=>[p.l,p.t-hpx];
  const Pt=g(c,r),Pr=g(c+w,r),Pb=g(c+w,r+h),Pl=g(c,r+h);
  const Rt=up(Pt),Rr=up(Pr),Rb=up(Pb),Rl=up(Pl);
  const face=(pts,col,z)=>`<div class="poly" style="clip-path:${P(pts)};background:${col};z-index:${z}"></div>`;
  const z=zOf(c+w,r+h);
  return face([[Pl.l,Pl.t],Rl,Rb,[Pb.l,Pb.t]],left,z-1)   // cara izq
       + face([[Pr.l,Pr.t],Rr,Rb,[Pb.l,Pb.t]],right,z-1)  // cara der
       + face([Rt,Rr,Rb,Rl],top,z);                       // tapa
}
function boxTopCenter(c,r,w,h,hpx){const p=iso(c+w/2,r+h/2);return {l:p.l,t:p.t-hpx};}

/* ====== construir escena (una vez) ====== */
const board=$('#board');
function buildScene(){
  board.style.width=BW+'px';board.style.height=BH+'px';board.style.marginLeft=(-BW/2)+'px';

  const Pt=iso(0,0),Pr=iso(COLS,0),Pb=iso(COLS,ROWS),Pl=iso(0,ROWS);
  // piso (rombo)
  const floor=document.createElement('div');floor.className='floor';
  floor.innerHTML=`<div class="poly" style="clip-path:${P([[Pt.l,Pt.t],[Pr.l,Pr.t],[Pb.l,Pb.t],[Pl.l,Pl.t]])};
     box-shadow:inset 0 40px 90px rgba(0,0,0,.5)"><div class="tile-grid" style="clip-path:${P([[Pt.l,Pt.t],[Pr.l,Pr.t],[Pb.l,Pb.t],[Pl.l,Pl.t]])}"></div></div>`;
  board.appendChild(floor);

  // paredes del fondo (der e izq) con altura
  const wallR=[[Pt.l,Pt.t],[Pr.l,Pr.t],[Pr.l,Pr.t-WALLH],[Pt.l,Pt.t-WALLH]];
  const wallL=[[Pt.l,Pt.t],[Pl.l,Pl.t],[Pl.l,Pl.t-WALLH],[Pt.l,Pt.t-WALLH]];
  const walls=document.createElement('div');walls.className='floor';
  walls.innerHTML=`<div class="poly" style="clip-path:${P(wallL)};background:linear-gradient(180deg,#2a2414,#211d27);z-index:2"></div>
    <div class="poly" style="clip-path:${P(wallR)};background:linear-gradient(180deg,#231f12,#1a1722);z-index:2"></div>`;
  board.appendChild(walls);

  // cartel neón sobre la pared del fondo
  const nc=iso(COLS/2,0);const neon=document.createElement('div');neon.className='neon';
  neon.style.left=nc.l+'px';neon.style.top=(nc.t-WALLH+34)+'px';
  neon.innerHTML='RHODES<small>BURGERS</small>';board.appendChild(neon);

  // ===== muebles (cajas 3D) =====
  const props=document.createElement('div');props.className='floor';
  props.innerHTML =
      isoBox(4,0,4,2,30,'linear-gradient(180deg,#322619,#211810)','#160f08','#0f0a05')   // grill
    + isoBox(2,5,8,1,40,'linear-gradient(180deg,#8a5e36,#6f4a28)','#3c2718','#2e1d12')   // mostrador
    + isoBox(1.4,7.6,1.4,1.4,8,'radial-gradient(ellipse at 50% 30%,#403b46,#26232c)','#1c1a22','#15131a') // mesa
    + isoBox(9.2,7.6,1.4,1.4,8,'radial-gradient(ellipse at 50% 30%,#403b46,#26232c)','#1c1a22','#15131a');
  board.appendChild(props);

  // items sobre grill / mostrador
  const gt=boxTopCenter(4,0,4,2,30);
  const gi=document.createElement('div');gi.className='grill-items';gi.id='grill';gi.style.left=gt.l+'px';gi.style.top=gt.t+'px';board.appendChild(gi);
  const ct=boxTopCenter(2,5,8,1,40);
  const ci=document.createElement('div');ci.className='counter-items';ci.id='counter';ci.style.left=ct.l+'px';ci.style.top=(ct.t-2)+'px';board.appendChild(ci);

  // ===== trabajadores =====
  mkWorker('cook1','COCINA',5,2.6);
  mkWorker('cook2','COCINA',7,2.6);
  mkWorker('cashier','CAJA',6,4.2);

  // ===== mozo de ambiente que recorre =====
  const roam=mkUnit('roamer');roam.el.id='roam1';placeUnit(roam,2,6,false);board.appendChild(roam.el);roamers.push(roam);

  // capa de actores
  const al=document.createElement('div');al.className='floor';al.id='actors';al.style.zIndex='5';board.appendChild(al);

  fit();window.addEventListener('resize',fit);
  startRoaming();
}
function fit(){const s=Math.min((stage().clientWidth-20)/BW,(stage().clientHeight-20)/BH);
  board.style.transform='translateX(-50%) scale('+Math.max(.4,s)+')';}
const stage=()=>$('#stage');

/* crea un "unit" (persona) */
function mkUnit(cls){
  const el=document.createElement('div');el.className='unit '+cls;
  el.innerHTML=`<div class="body"><div class="person">
    <div class="head"></div><div class="torso"></div>
    <div class="legs"><div class="leg l"></div><div class="leg r"></div></div></div></div>`;
  return {el,c:0,r:0};
}
function mkWorker(id,label,c,r){
  const u=mkUnit('worker');u.el.id=id;
  u.el.querySelector('.body').insertAdjacentHTML('afterbegin','');
  u.el.querySelector('.person').insertAdjacentHTML('afterbegin','<div class="cap"></div>');
  u.el.querySelector('.person').insertAdjacentHTML('beforeend','<div class="apron"></div>');
  u.el.querySelector('.body').insertAdjacentHTML('beforeend',`<div class="wlabel">${label}</div>`);
  placeUnit(u,c,r,false);board.appendChild(u.el);
  return u;
}
/* ubica un unit en coords de baldosa */
function placeUnit(u,c,r,walk){
  const p=iso(c,r);const moving=walk&&(Math.abs(u.c-c)>0.05||Math.abs(u.r-r)>0.05);
  const per=u.el.querySelector('.person');
  if(moving){ u.el.classList.toggle('flip', (iso(c,r).l < u._lastL)); per.classList.add('walking');
    clearTimeout(u._wt);u._wt=setTimeout(()=>per.classList.remove('walking'),880); }
  u._lastL=p.l;u.c=c;u.r=r;
  u.el.style.left=p.l+'px';u.el.style.top=p.t+'px';u.el.style.zIndex=zOf(c,r);
  u.el.querySelector('.body').style.setProperty('--s',depthScale(c,r));
}

/* mozo recorre waypoints */
const roamers=[];const ROAM=[{c:2,r:6},{c:9,r:6},{c:9,r:3.2},{c:2,r:3.2}];
let roamIdx=0,roamTimer=null;
function startRoaming(){ clearInterval(roamTimer);
  roamTimer=setInterval(()=>{ roamIdx=(roamIdx+1)%ROAM.length;
    roamers.forEach((u,k)=>{const w=ROAM[(roamIdx+k)%ROAM.length];placeUnit(u,w.c,w.r,true);}); },2600);
  roamers.forEach((u,k)=>{const w=ROAM[k%ROAM.length];placeUnit(u,w.c,w.r,true);});
}

/* ====== spots de clientes (en baldosas) ====== */
const SPOTS={
  queue:[{c:0.6,r:6.6},{c:0.6,r:8},{c:1.8,r:8.6},{c:2.2,r:7},{c:1.2,r:5.6}],
  cooking:[{c:3,r:3.4},{c:6,r:3.4},{c:9,r:3.4},{c:4.4,r:4.3},{c:7.6,r:4.3},{c:2,r:4.4},{c:10,r:4.2},{c:5.8,r:2.9}],
  ready:[{c:3.2,r:6.6},{c:5,r:6.6},{c:6.8,r:6.6},{c:8.6,r:6.6},{c:4,r:7.4},{c:7.8,r:7.4}],
};
const MAXZ={queue:5,cooking:8,ready:6};
const DOOR={c:-0.5,r:9};

/* ====== diff de actores ====== */
const actorEls=new Map();
function makeActor(d){
  const u=mkUnit('actor '+d.zone);
  u.el.querySelector('.person').style.setProperty('--shirt',d.shirt);
  u.el.querySelector('.body').insertAdjacentHTML('afterbegin','<div class="bubble"></div>');
  const p=iso(DOOR.c,DOOR.r);u.el.style.left=p.l+'px';u.el.style.top=p.t+'px';u._lastL=p.l;u.c=DOOR.c;u.r=DOOR.r;
  u.el.querySelector('.body').style.setProperty('--s',depthScale(DOOR.c,DOOR.r));
  $('#actors').appendChild(u.el);actorEls.set(d.id,u);
  u.el.onclick=()=>{const id=u.el.dataset.id,num=u.el.dataset.num;
    if(id&&!String(id).startsWith('demo')) window.open(`track.html?id=${encodeURIComponent(id)}&num=${encodeURIComponent(num)}`,'_blank');};
  void u.el.offsetWidth;
  return u;
}
function updateActors(desired){
  const seen=new Set();
  desired.forEach(d=>{ seen.add(d.id); const u=actorEls.get(d.id)||makeActor(d);
    u.el.className='unit actor '+d.zone+(u.el.classList.contains('flip')?' flip':'');
    u.el.dataset.id=d.id;u.el.dataset.num=d.num;
    u.el.querySelector('.bubble').innerHTML=`#${d.num} · ${d.items}🍔 · ${money(d.total)}`;
    placeUnit(u,d.c,d.r,true);
  });
  actorEls.forEach((u,id)=>{ if(!seen.has(id)){ const p=iso(DOOR.c,DOOR.r);
    u.el.style.left=p.l+'px';u.el.style.top=p.t+'px';u.el.style.opacity='0';
    u.el.querySelector('.person').classList.add('walking');u.el.classList.add('flip');
    clearTimeout(u._rt);u._rt=setTimeout(()=>u.el.remove(),780);actorEls.delete(id); }});
}

/* ====== render ====== */
function render(orders){
  orders=orders.slice().sort((a,b)=>String(a.createdAt||'').localeCompare(String(b.createdAt||'')));
  const cola=orders.filter(o=>zoneOf(o)==='queue');
  const cocina=orders.filter(o=>zoneOf(o)==='cooking');
  const listos=orders.filter(o=>zoneOf(o)==='ready');
  const ingresos=orders.reduce((s,o)=>s+(Number(o.total)||0),0);

  $('#stats').innerHTML=`
    <div class="stat"><div class="n">${orders.length}</div><div class="l">Pedidos activos</div></div>
    <div class="stat"><div class="n" style="color:var(--muted)">${cola.length}</div><div class="l">En cola</div></div>
    <div class="stat"><div class="n" style="color:var(--amber)">${cocina.length}</div><div class="l">En cocina</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${listos.length}</div><div class="l">Listos para retirar</div></div>
    <div class="stat"><div class="n" style="color:var(--saffron)">${money(ingresos)}</div><div class="l">En curso</div></div>`;

  const nP=Math.min(cocina.length,6);
  $('#grill').innerHTML=Array.from({length:nP}).map((_,i)=>`<div class="patty ${i%2?'flip':''}"></div>`).join('')
    +(nP?`<div class="smoke" style="left:-6px;top:-10px"></div><div class="smoke" style="left:30px;top:-10px;animation-delay:1.2s"></div>`:'');
  $('#cook1').classList.toggle('busy',cocina.length>0);
  $('#cook2').classList.toggle('busy',cocina.length>1);
  $('#cashier').classList.toggle('busy',listos.length>0);

  const nB=Math.min(listos.length,6);
  $('#counter').innerHTML=Array.from({length:nB}).map(()=>`<div class="bag"></div>`).join('');

  const desired=[];
  const push=(arr,zone)=>arr.slice(0,MAXZ[zone]).forEach((o,i)=>{const p=SPOTS[zone][i];
    desired.push({id:String(o.id||orderNum(o)),num:orderNum(o),items:itemsCount(o),total:o.total,zone,c:p.c,r:p.r,shirt:shirtColor(o)});});
  push(cola,'queue');push(cocina,'cooking');push(listos,'ready');
  updateActors(desired);

  document.querySelectorAll('.overflow').forEach(e=>e.remove());
  [['queue',cola],['cooking',cocina],['ready',listos]].forEach(([z,arr])=>{const extra=arr.length-MAXZ[z];
    if(extra>0){const sp=SPOTS[z][MAXZ[z]-1];const p=iso(sp.c,sp.r);const b=document.createElement('div');
      b.className='overflow';b.style.left=p.l+'px';b.style.top=(p.t-60)+'px';b.style.zIndex=999;b.textContent='+'+extra;board.appendChild(b);}});

  const old=$('#emptyNote');if(old)old.remove();
  if(orders.length===0){const n=document.createElement('div');n.id='emptyNote';n.className='empty-note';
    n.textContent='🍔 Local tranquilo — no hay pedidos activos en este momento.';stage().appendChild(n);}
}

/* ====== demo ====== */
let demoOn=false,demoTimer=null,liveUnsub=null,demoSeed=[];
const DEMO_NAMES=['Sofía','Mateo','Valen','Ema','Lola','Bruno','Cata','Theo','Mia','Nico'];
function makeDemoOrders(){
  if(!demoSeed.length||Math.random()<0.22){const n=3+Math.floor(Math.random()*6);demoSeed=[];
    for(let i=0;i<n;i++)demoSeed.push({id:'demo'+i,number:100+Math.floor(Math.random()*899),
      status:'accepted',items:Array.from({length:1+Math.floor(Math.random()*3)}).map(()=>({type:'burger',name:'Burger',qty:1})),
      total:6000+Math.floor(Math.random()*18000),createdAt:new Date(Date.now()-i*60000).toISOString()});
  }else{const flow={accepted:'in_prep',in_prep:'ready',ready:'done'};
    demoSeed.forEach(o=>{if(Math.random()<0.5)o.status=flow[o.status]||o.status;});
    demoSeed=demoSeed.filter(o=>o.status!=='done');}
  return demoSeed.map(o=>({...o}));
}
function startDemo(){demoOn=true;$('#btnDemo').classList.add('on');if(liveUnsub){liveUnsub();liveUnsub=null;}
  setLive('demo');demoSeed=[];const tick=()=>render(makeDemoOrders());tick();demoTimer=setInterval(tick,2600);}
function stopDemo(){demoOn=false;$('#btnDemo').classList.remove('on');clearInterval(demoTimer);demoTimer=null;
  actorEls.forEach(u=>u.el.remove());actorEls.clear();connectLive();}

/* ====== en vivo ====== */
function setLive(state){const el=$('#live'),txt=$('#liveTxt');el.classList.remove('off');
  if(state==='live')txt.textContent='En vivo';else if(state==='demo')txt.textContent='Modo demo';
  else if(state==='off'){el.classList.add('off');txt.textContent='Sin conexión';}else txt.textContent='Conectando…';}
function connectLive(){
  if(!db){setLive('off');render([]);return;}
  setLive();
  try{liveUnsub=db.collection('orders').where('status','in',['accepted','pending_payment','in_prep','ready'])
    .onSnapshot(snap=>{setLive('live');render(snap.docs.map(d=>({id:d.id,...d.data()})));},
      err=>{console.warn('orders snapshot:',err);setLive('off');render([]);});}
  catch(e){console.warn(e);setLive('off');render([]);}
}

$('#btnDemo').onclick=()=>{demoOn?stopDemo():startDemo();};
$('#btnFs').onclick=()=>{const el=document.documentElement;
  if(!document.fullscreenElement){el.requestFullscreen&&el.requestFullscreen();}else{document.exitFullscreen&&document.exitFullscreen();}};

buildScene();
render([]);
connectLive();
</script>
